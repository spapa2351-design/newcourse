    ];

    const CATEGORIES = [
      { id: 'all', label: '전체', children: [] },
      { id: 'work', label: '업무 역량', children: [
        { id: 'job', label: '직무 역량' },
        { id: 'leader', label: '리더십' },
        { id: 'sales', label: '영업' },
      ]},
      { id: 'common', label: '공통/입사 교육', children: [] },
      { id: 'it', label: 'IT', children: [] },
      { id: 'dx', label: 'DX', children: [] },
    ];

    /* ── 상태 설정 맵 (newcourse 5종) ── */
    const STATUS_CFG = {
      draft:        { label: '초안',          bg: 'bg-slate-100',  text: 'text-slate-500',   dot: 'bg-slate-400' },
      running:      { label: '운영중',        bg: 'bg-emerald-50', text: 'text-emerald-600', dot: 'bg-emerald-500' },
      closed_apply: { label: '수강중',        bg: 'bg-amber-50',   text: 'text-amber-600',   dot: 'bg-amber-500' },
      ended:        { label: '종료',          bg: 'bg-slate-50',   text: 'text-slate-400',   dot: 'bg-slate-300' },
      admin_ended:  { label: '관리자 종료',   bg: 'bg-rose-50',    text: 'text-rose-600',    dot: 'bg-rose-500' },
    };

    const ENROLL_MODE_CFG = {
      admin: { label: '관리자 수동', color: 'text-slate-500' },
      self:  { label: '자율 신청',   color: 'text-indigo-500' },
      auto:  { label: '가입 시 자동', color: 'text-emerald-600' },
    };

    const CLASSIFICATION_CFG = {
      mandatory: { label: '필수', bg: 'bg-rose-50', text: 'text-rose-600', border: 'border-rose-200' },
      normal:    { label: '일반', bg: '', text: '', border: '' },
    };

    const TODAY = '2026-04-28';

    const fmtDate = (d) => d ? d.replace(/-/g, '.').slice(5) : '';
    const fmtRange = (s, e) => {
      if (!s) return '-';
      const fs = fmtDate(s);
      return e && e !== s ? `${fs} ~ ${fmtDate(e)}` : fs;
    };

    /* ══════════════════════════════════════
       App
    ══════════════════════════════════════ */
    const App = () => {
      const [coverImages, setCoverImages] = useState({});
      const [courses, setCourses] = useState(COURSES);

      useEffect(() => {
        const map = {};
        COURSES.forEach(c => {
          const saved = localStorage.getItem('lms_cover_' + c.id);
          if (saved) {
            try { map[c.id] = JSON.parse(saved); } catch(e) {}
          }
        });
        setCoverImages(map);
      }, []);
      const [statusFilter, setStatusFilter] = useState('all');
      const [search, setSearch] = useState('');
      const [expandedIds, setExpandedIds] = useState(new Set());
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [catFilter, setCatFilter] = useState('all');
      const [expandedCats, setExpandedCats] = useState(new Set(['work']));
      const [activeFilters, setActiveFilters] = useState([]);
      const [filterPopup, setFilterPopup] = useState(null); // null | 'select' | fieldKey
      const [filterInput, setFilterInput] = useState('');

      const FILTER_FIELDS = [
        { key: 'classification', label: '필수 여부', options: [{ val:'mandatory',label:'필수' },{ val:'normal',label:'일반' }] },
        { key: 'enrollMode', label: '등록 채널', options: [
          { val: 'admin', label: '관리자 수동' },
          { val: 'self',  label: '자율 신청' },
          { val: 'auto',  label: '가입 시 자동' },
        ]},
        { key: 'createdBy', label: '생성자' },
      ];

      const addFilter = (field, value) => {
        if (!value.trim()) return;
        setActiveFilters(prev => {
          const without = prev.filter(f => f.key !== field.key);
          return [...without, { key: field.key, label: field.label, value }];
        });
        setFilterPopup(null);
        setFilterInput('');
      };
      const removeFilter = (key) => setActiveFilters(prev => prev.filter(f => f.key !== key));

      const toggleExpand = (id) => setExpandedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
      const toggleSelect = (id) => setSelectedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
      const toggleCatExpand = (id) => setExpandedCats(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });

      /* ── 상태별 카운트 (newcourse 5종) ── */
      const statusCounts = useMemo(() => ({
        all:          courses.length,
        draft:        courses.filter(c => c.status === 'draft').length,
        running:      courses.filter(c => c.status === 'running').length,
        closed_apply: courses.filter(c => c.status === 'closed_apply').length,
        ended:        courses.filter(c => c.status === 'ended').length,
        admin_ended:  courses.filter(c => c.status === 'admin_ended').length,
      }), [courses]);

      const filtered = useMemo(() => {
        let list = courses;
        if (statusFilter !== 'all') list = list.filter(c => c.status === statusFilter);
        if (catFilter !== 'all') list = list.filter(c => c.category === catFilter);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          list = list.filter(c => c.title.toLowerCase().includes(q));
        }
        activeFilters.forEach(f => {
          if (f.key === 'classification') list = list.filter(c => c.classification === f.value);
          if (f.key === 'enrollMode')     list = list.filter(c => c.enrollMode === f.value);
          if (f.key === 'createdBy')      list = list.filter(c => (c.createdBy || '').toLowerCase().includes(f.value.toLowerCase()));
        });
        /* 등록일 최신순 정렬 (디폴트) */
        return [...list].sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      }, [courses, statusFilter, catFilter, search, activeFilters]);

      /* 페이지네이션 */
      const [page, setPage] = useState(1);
      const [pageSize, setPageSize] = useState(10);
      React.useEffect(() => { setPage(1); }, [statusFilter, catFilter, search, activeFilters, pageSize]);
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      const pageItems = filtered.slice((page - 1) * pageSize, page * pageSize);

      /* 표시할 페이지 번호 목록 (ellipsis 포함) */
      const visiblePages = useMemo(() => {
        const out = [];
        if (totalPages <= 7) {
          for (let i = 1; i <= totalPages; i++) out.push(i);
          return out;
        }
        const window = 1; // 현재 페이지 좌우 1개씩
        out.push(1);
        const start = Math.max(2, page - window);
        const end = Math.min(totalPages - 1, page + window);
        if (start > 2) out.push('...');
        for (let i = start; i <= end; i++) out.push(i);
        if (end < totalPages - 1) out.push('...');
        out.push(totalPages);
        return out;
      }, [page, totalPages]);

      const allSelected = filtered.length > 0 && filtered.every(c => selectedIds.has(c.id));
      const toggleAll = () => {
        if (allSelected) setSelectedIds(new Set());
        else setSelectedIds(new Set(filtered.map(c => c.id)));
      };

      const [deleteModal, setDeleteModal] = useState(null); // null | { type:'single', course } | { type:'bulk', courses:[] }
      const [deleteInput, setDeleteInput] = useState('');

      const handleDelete = (id) => {
        const course = courses.find(c => c.id === id);
        setDeleteInput('');
        setDeleteModal({ type: 'single', course });
      };

      const handleBulkDelete = () => {
        if (selectedIds.size === 0) return;
        const targets = courses.filter(c => selectedIds.has(c.id));
        setDeleteInput('');
        setDeleteModal({ type: 'bulk', courses: targets });
      };

      const executeDelete = () => {
        if (deleteModal.type === 'single') {
          setCourses(prev => prev.filter(c => c.id !== deleteModal.course.id));
          setSelectedIds(prev => { const n = new Set(prev); n.delete(deleteModal.course.id); return n; });
        } else {
          const ids = new Set(deleteModal.courses.map(c => c.id));
          setCourses(prev => prev.filter(c => !ids.has(c.id)));
          setSelectedIds(new Set());
        }
        setDeleteModal(null);
        setDeleteInput('');
      };

      /* ── 코스의 날짜 범위 요약 ── */
      const getDateRange = (course) => {
        if (course.packages.length === 0) return '-';
        const starts = course.packages.map(p => p.startDate).filter(Boolean).sort();
        const ends = course.packages.map(p => p.endDate).filter(Boolean).sort();
        if (starts.length === 0) return '-';
        return fmtRange(starts[0], ends[ends.length - 1]);
      };

      /* ── 장소 요약 ── */
      const getPlaceSummary = (course) => {
        const places = [...new Set(course.packages.map(p => p.place).filter(Boolean))];
        if (places.length === 0) return '';
        if (places.length === 1) return places[0];
        return `${places[0]} 외 ${places.length - 1}곳`;
      };

      /* ── 총 회차 수 ── */
      const getTotalSessions = (course) => course.packages.reduce((s, p) => s + (p.sessions || 0), 0);

      /* ── D-day ── */
      const getDday = (course) => {
        const today = new Date(TODAY);
        const upcoming = course.packages
          .map(p => p.startDate).filter(d => d && d >= TODAY).sort();
        if (upcoming.length === 0) return null;
        const diff = Math.round((new Date(upcoming[0]) - today) / 86400000);
        return diff === 0 ? 'D-Day' : `D-${diff}`;
      };

      const SIDEBAR_MENUS = [

                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">수기 처리</span>

                  </button>
                </div>

                <p className="text-center text-[12.5px] text-slate-400 mt-12">등록 후에도 코스 유형 일부 설정은 변경 가능합니다</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
