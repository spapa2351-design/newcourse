<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 온라인 코스 만들기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .ms { font-family: 'Material Symbols Rounded'; font-weight: 400; font-size: 20px; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20; line-height: 1; }
  </style>
</head>
<body class="bg-[#f2f5f9] text-slate-800 antialiased min-h-screen flex flex-col">

  <!-- 빌더 헤더 (chrome-off — 글로벌 사이드 nav·탑바 없음) -->
  <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-5 shrink-0 sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <a href="online-list.html" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors" aria-label="닫기">
        <span class="ms">close</span>
      </a>
      <div class="w-px h-5 bg-slate-200"></div>
      <h1 class="text-[14px] font-bold text-slate-900">새 온라인 코스 만들기</h1>
    </div>
    <div class="flex items-center gap-2">
      <button class="px-3.5 py-1.5 text-[13px] font-semibold text-slate-500 rounded-lg hover:bg-slate-100 transition-colors">취소</button>
      <button class="px-4 py-1.5 text-[13px] font-bold text-white bg-indigo-500 rounded-lg hover:bg-indigo-600 transition-colors">저장</button>
    </div>
  </header>

  <!-- 본문 (빈 캔버스 — 프로토타이핑) -->
  <main class="flex-1"></main>

</body>
</html>
