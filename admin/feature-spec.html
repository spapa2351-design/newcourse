      let list = rows;
      if(filterPhase !== 'all') list = list.filter(r => r.phase === Number(filterPhase));
      if(filterPri !== 'all') list = list.filter(r => r.pri === filterPri);
      if(filterStatus !== 'all') list = list.filter(r => r.status === filterStatus);
      if(filterScreen !== 'all') list = list.filter(r => r.screen === filterScreen);
      if(search.trim()) {
        const q = search.toLowerCase();
        list = list.filter(r => r.feature.includes(search) || r.desc.toLowerCase().includes(q) || r.group.includes(search));
      }
      return list;
    }, [rows, filterPhase, filterPri, filterStatus, filterScreen, search]);

    /* 집계 */
    const stats = useMemo(() => ({
      total:  rows.length,
      done:   rows.filter(r=>r.status==='done').length,
      wip:    rows.filter(r=>r.status==='wip').length,
      todo:   rows.filter(r=>r.status==='todo').length,
      p1:     rows.filter(r=>r.phase===1).length,
      p2:     rows.filter(r=>r.phase===2).length,
      p3:     rows.filter(r=>r.phase===3).length,
      p4:     rows.filter(r=>r.phase===4).length,
    }), [rows]);

    /* 행 그룹핑 — 화면 변경 시 구분선 */
    let lastScreen = null;

    return (
      <div className="min-h-screen flex">

        {/* 글로벌 좌측 사이드바 — 2026-05-07 제거 (기능명세서는 어드민 레이아웃과 무관한 단독 페이지) */}

        {/* ══ 메인 영역 ══ */}
        <div className="flex-1 flex flex-col min-h-screen bg-[#f2f5f9]">

          {/* 글로벌 탑 네비게이션 — 2026-05-07 제거 (기능명세서 단독 페이지에서 불필요한 chrome) */}

          {/* 페이지 서브 헤더 */}
          {!isEmbed && (
            <header className="shrink-0 px-6 py-3.5 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <FileSpreadsheet size={18} className="text-indigo-500"/>
                <h1 className="text-[16px] font-black text-slate-900">기능명세서</h1>
                <span className="text-[11px] font-bold text-slate-400">오프라인 코스 시스템 v1.0</span>
                <span className="text-[10px] font-black text-violet-700 bg-violet-100 border border-violet-300 px-2 py-0.5 rounded-full ml-1">📍 기능 라인 SSOT</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-[12px] text-slate-400 font-medium">기준일: 2026-04-28</span>
                <button className="flex items-center gap-1.5 px-3 py-2 bg-white border border-slate-200 rounded-lg text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                  <Download size={13}/> 다운로드
                </button>
              </div>
            </header>
          )}

          <div className="flex flex-1 overflow-hidden gap-3 px-4 pb-4 pt-0 items-start">

          {/* 왼쪽: 관리자/사용자 탭 + 필터 */}
          <aside className="w-[200px] bg-white rounded-xl shadow-card flex flex-col shrink-0 overflow-hidden">

            {/* 관리자단 / 사용자단 탭 */}
            <div className="p-3 space-y-1 border-b border-slate-100">
              <button onClick={()=>{setSide('admin');setFilterScreen('all');setFilterPhase('all');}}
                className={`w-full flex items-center gap-2 px-3 py-2.5 rounded-xl text-[13px] font-bold transition-colors
                  ${side==='admin'?'bg-indigo-500 text-white shadow-sm':'text-slate-600 hover:bg-slate-50'}`}>
                <Shield size={14}/> 관리자단
                <span className={`ml-auto text-[10px] font-black px-1.5 py-0.5 rounded-full ${side==='admin'?'bg-white/20 text-white':'bg-slate-100 text-slate-500'}`}>{ADMIN_ROWS.length}</span>
              </button>
              <button onClick={()=>{setSide('user');setFilterScreen('all');setFilterPhase('all');}}
                className={`w-full flex items-center gap-2 px-3 py-2.5 rounded-xl text-[13px] font-bold transition-colors
                  ${side==='user'?'bg-emerald-500 text-white shadow-sm':'text-slate-600 hover:bg-slate-50'}`}>
                <User size={14}/> 사용자단
                <span className={`ml-auto text-[10px] font-black px-1.5 py-0.5 rounded-full ${side==='user'?'bg-white/20 text-white':'bg-slate-100 text-slate-500'}`}>{USER_ROWS.length}</span>
              </button>
            </div>

            {/* 화면 필터 */}
            <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1">
              <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wide px-1 mb-2">화면 선택</div>
              <button onClick={()=>setFilterScreen('all')}
                className={`w-full text-left px-3 py-1.5 rounded-lg text-[12px] font-bold transition-colors
                  ${filterScreen==='all'?'bg-slate-100 text-slate-800':'text-slate-500 hover:bg-slate-50'}`}>
                전체 ({rows.length})
              </button>
              {screens.map(s=>(
                <button key={s.id} onClick={()=>setFilterScreen(s.id)}
                  className={`w-full text-left px-3 py-1.5 rounded-lg text-[12px] font-bold transition-colors flex items-center gap-2
                    ${filterScreen===s.id?'bg-slate-100 text-slate-800':'text-slate-500 hover:bg-slate-50'}`}>
                  <span className={`text-[10px] font-black px-1.5 py-0.5 rounded-md ${SCREEN_COLORS[s.id]}`}>{s.id}</span>
                  {s.name}
                </button>
              ))}

              {/* Phase 필터 */}
              <div className="pt-3 border-t border-slate-100 mt-3">
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wide px-1 mb-2">Phase</div>
                {[
                  {val:'all', label:`전체 (${rows.length})`},
                  {val:'1',   label:`Phase 1 (${rows.filter(r=>r.phase===1).length})`},
                  {val:'2',   label:`Phase 2 (${rows.filter(r=>r.phase===2).length})`},
                  {val:'3',   label:`Phase 3 (${rows.filter(r=>r.phase===3).length})`},
                  {val:'4',   label:`Phase 4 (${rows.filter(r=>r.phase===4).length})`},
                ].map(({val,label})=>(
                  <button key={val} onClick={()=>{setFilterPhase(val);setFilterScreen('all');}}
                    className={`w-full text-left px-3 py-1.5 rounded-lg text-[12px] font-bold transition-colors flex items-center gap-1.5
                      ${filterPhase===val?'bg-slate-100 text-slate-800':'text-slate-500 hover:bg-slate-50'}`}>
                    {val==='1' && <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 shrink-0"/>}
                    {val==='2' && <span className="w-1.5 h-1.5 rounded-full bg-violet-400 shrink-0"/>}
                    {val==='3' && <span className="w-1.5 h-1.5 rounded-full bg-amber-400 shrink-0"/>}
                    {val==='4' && <span className="w-1.5 h-1.5 rounded-full bg-rose-400 shrink-0"/>}
                    {label}
                  </button>
                ))}
              </div>

              {/* 구분선 + 상태/우선순위 필터 */}
              <div className="pt-3 border-t border-slate-100 mt-3">
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wide px-1 mb-2">우선순위</div>
                {['all','P1','P2','P3'].map(p=>(
                  <button key={p} onClick={()=>setFilterPri(p)}
                    className={`w-full text-left px-3 py-1.5 rounded-lg text-[12px] font-bold transition-colors
                      ${filterPri===p?'bg-slate-100 text-slate-800':'text-slate-500 hover:bg-slate-50'}`}>
                    {p==='all'?'전체':PRI[p]?.label}
                  </button>
                ))}
              </div>
              <div className="pt-3 border-t border-slate-100 mt-1">
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wide px-1 mb-2">구현상태</div>
                {['all','done','wip','todo','phase2'].map(s=>(
                  <button key={s} onClick={()=>setFilterStatus(s)}
                    className={`w-full text-left px-3 py-1.5 rounded-lg text-[12px] font-bold transition-colors flex items-center gap-1.5
                      ${filterStatus===s?'bg-slate-100 text-slate-800':'text-slate-500 hover:bg-slate-50'}`}>
                    {s==='all'?'전체':<><span className={`w-1.5 h-1.5 rounded-full ${ST[s]?.dot.replace('animate-pulse','')}`}/>{ST[s]?.label}</>}
                  </button>
                ))}
              </div>
            </div>

          </aside>

          {/* 메인 — 요약 + 테이블 */}
          <main className="flex-1 flex flex-col overflow-hidden bg-white rounded-xl shadow-card">

            {/* 요약 통계 바 */}
            <div className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-6 shrink-0">
              {[
                {label:'전체', val:stats.total, color:'text-slate-700'},
                {label:'구현완료', val:stats.done, color:'text-emerald-600'},
                {label:'구현중', val:stats.wip, color:'text-indigo-600'},
                {label:'미구현', val:stats.todo, color:'text-amber-600'},
                {label:'Phase 1', val:stats.p1, color:'text-indigo-500'},
                {label:'Phase 2', val:stats.p2, color:'text-violet-600'},
                {label:'Phase 3', val:stats.p3, color:'text-amber-600'},
                {label:'Phase 4', val:stats.p4, color:'text-rose-600'},
              ].map((s,i)=>(
                <div key={i} className="flex items-center gap-2">
                  {i>0 && <div className="w-px h-4 bg-slate-200"/>}
                  <span className="text-[12px] text-slate-400 font-medium">{s.label}</span>
                  <span className={`text-[18px] font-black ${s.color}`}>{s.val}</span>
                </div>
              ))}
              <div className="ml-auto flex items-center gap-2">
                <div className="relative">
                  <Search size={12} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="기능명 검색"
                    className="pl-8 pr-4 py-1.5 border border-slate-200 rounded-lg text-[12px] outline-none focus:border-indigo-400 bg-white w-44"/>
                </div>
                <span className="text-[12px] text-slate-400 font-medium">{filtered.length}건</span>
              </div>
            </div>

            {/* 테이블 */}
            <div className="flex-1 overflow-auto custom-scrollbar">
              <table className="w-full text-[12px] min-w-[1100px]">
                <thead className="sticky top-0 z-20">
                  <tr className="bg-slate-800 text-white text-[11px] font-bold">
                    <th className="sticky-th1 bg-slate-800 px-3 py-3 text-center w-[40px]">No.</th>
                    <th className="sticky-th2 bg-slate-800 px-3 py-3 text-center w-[50px]">화면ID</th>
                    <th className="sticky-th3 bg-slate-800 px-3 py-3 text-left w-[90px]">화면명</th>
                    <th className="sticky-th4 bg-slate-800 px-3 py-3 text-left w-[100px]">기능명</th>
                    <th className="px-3 py-3 text-left w-[70px]">구분</th>
                    <th className="px-3 py-3 text-left">기능 설명</th>
                    <th className="px-3 py-3 text-left w-[130px]">입력</th>
                    <th className="px-3 py-3 text-left w-[160px]">처리/출력</th>
                    <th className="px-3 py-3 text-center w-[70px]">우선순위</th>
                    <th className="px-3 py-3 text-center w-[50px]">Phase</th>
                    <th className="px-3 py-3 text-center w-[80px]">구현상태</th>
                    <th className="px-3 py-3 text-left w-[160px]">비고</th>
                    <th className="px-3 py-3 text-center w-[60px]">화면</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((row, idx) => {
                    const isNewScreen = row.screen !== lastScreen;
                    lastScreen = row.screen;
                    const pri = PRI[row.pri];
                    const st = ST[row.status];
                    const isEven = idx % 2 === 0;
                    return (
                      <React.Fragment key={row.id}>
                        {isNewScreen && (
                          <tr>
                            <td colSpan={13} className="bg-slate-100 border-t-2 border-slate-300 px-3 py-1.5" style={{position:'relative',zIndex:1}}>
                              <div className="flex items-center gap-2">
                                <span className={`text-[10px] font-black px-2 py-0.5 rounded-md ${SCREEN_COLORS[row.screen]}`}>{row.screen}</span>
                                <span className="text-[12px] font-black text-slate-700">{row.screenName}</span>
                                <span className="text-[11px] text-slate-400 font-medium">— {filtered.filter(r=>r.screen===row.screen).length}개 기능</span>
                              </div>
                            </td>
                          </tr>
                        )}
                        <tr className={`border-b border-slate-100 hover:bg-indigo-50/30 transition-colors ${isEven?'bg-white':'bg-slate-50/50'}`}>
                          <td className="sticky-col border-r border-slate-100 px-3 py-2.5 text-center text-slate-400 font-bold" style={{background:isEven?'#fff':'#f8fafc'}}>{idx+1}</td>
                          <td className="sticky-col2 border-r border-slate-100 px-2 py-2.5 text-center" style={{background:isEven?'#fff':'#f8fafc'}}>
                            <span className={`text-[10px] font-black px-1.5 py-0.5 rounded-md ${SCREEN_COLORS[row.screen]}`}>{row.screen}</span>
                          </td>
                          <td className="sticky-col3 border-r border-slate-100 px-3 py-2.5 text-slate-600 font-semibold" style={{background:isEven?'#fff':'#f8fafc'}}>{row.screenName}</td>
                          <td
                            className={`sticky-col4 border-r border-slate-200 px-3 py-2.5 font-bold text-slate-800 ${SCREEN_URL_MAP[row.screen] ? 'cursor-pointer hover:text-indigo-600 hover:bg-indigo-50/40' : ''}`}
                            style={{background:isEven?'#fff':'#f8fafc'}}
                            onClick={() => SCREEN_URL_MAP[row.screen] && setPreviewScreen({ screen: row.screen, ...SCREEN_URL_MAP[row.screen] })}
                            title={SCREEN_URL_MAP[row.screen] ? `${row.screen} 화면 미리보기 — 클릭` : ''}>
                            {row.feature}
                            {SCREEN_URL_MAP[row.screen] && <Monitor size={11} className="inline-block ml-1.5 text-slate-300 group-hover:text-indigo-500" style={{verticalAlign:'middle'}}/>}
                          </td>
                          <td className="px-3 py-2.5 text-slate-500">
                            <span className="bg-slate-100 px-2 py-0.5 rounded-md text-[10px] font-bold">{row.group}</span>
                          </td>
                          <td className="px-3 py-2.5 text-slate-600 wrap">{row.desc}</td>
                          <td className="px-3 py-2.5 text-slate-500 wrap">{row.input}</td>
                          <td className="px-3 py-2.5 text-slate-500 wrap">{row.output}</td>
                          <td className="px-3 py-2.5 text-center">
                            <span className={`text-[10px] font-black px-2 py-0.5 rounded-full border ${pri.bg} ${pri.text} ${pri.border}`}>{row.pri}</span>
                          </td>
                          <td className="px-3 py-2.5 text-center">
                            <span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${PHASE[row.phase]}`}>P{row.phase}</span>
                          </td>
                          <td className="px-3 py-2.5 text-center">
                            <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full ${st.bg} ${st.text}`}>
                              <span className={`w-1.5 h-1.5 rounded-full ${st.dot}`}/>
                              {st.label}
                            </span>
                          </td>
                          <td className="px-3 py-2.5 text-slate-400 wrap">{row.note}</td>
                          <td className="px-2 py-2.5 text-center">
                            {SCREEN_URL_MAP[row.screen] ? (
                              <button
                                onClick={() => setPreviewScreen({ screen: row.screen, ...SCREEN_URL_MAP[row.screen] })}
                                title={`${row.screen} 화면 미리보기`}
                                className="inline-flex items-center justify-center w-7 h-7 rounded-md bg-indigo-50 hover:bg-indigo-500 hover:text-white text-indigo-600 border border-indigo-200 transition-colors">
                                <Monitor size={13}/>
                              </button>
                            ) : (
                              <span className="text-[10px] text-slate-300 font-medium">—</span>
                            )}
                          </td>
                        </tr>
                      </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
              {filtered.length === 0 && (
                <div className="text-center py-16 text-slate-400 text-[14px]">검색 결과가 없습니다</div>
              )}
            </div>
          </main>
          </div>
        </div>

        {/* ══ 우측 슬라이드 패널: 프로토타입 미리보기 ══ */}
        {previewScreen && (
          <>
            {/* 백드롭 — 전체 영역 클릭 시 닫기 (전체화면 모드는 진하게, 일반 모드는 살짝 투명) */}
            <div
              onClick={() => { setPreviewScreen(null); setPreviewFullscreen(false); }}
              className="fixed inset-0 z-40 cursor-pointer"
              style={{
                background: previewFullscreen ? 'rgba(0,0,0,0.4)' : 'rgba(15,23,42,0.08)',
                transition: 'background .2s'
              }}
              title="클릭해서 닫기"
            />
            {/* 슬라이드 패널 */}
            <aside
              className="fixed top-0 right-0 h-full bg-white border-l border-slate-200 shadow-2xl z-50 flex flex-col transition-[width] duration-300"
              style={{
                width: previewFullscreen ? '100vw' : 'calc(100vw - 480px)',
                minWidth: previewFullscreen ? 'auto' : '600px',
                animation: 'slideInRight .25s ease-out'
              }}
            >
              {/* 패널 헤더 */}
              <div className="shrink-0 px-5 py-3 border-b border-slate-200 bg-slate-50 flex items-center justify-between gap-3">
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`text-[10px] font-black px-2 py-0.5 rounded-md shrink-0 ${SCREEN_COLORS[previewScreen.screen]}`}>{previewScreen.screen}</span>
                  <Monitor size={14} className="text-indigo-500 shrink-0"/>
                  <span className="text-[14px] font-black text-slate-800 truncate">{previewScreen.label}</span>
                </div>
                <div className="flex items-center gap-1 shrink-0">
                  <button
                    onClick={() => setPreviewFullscreen(v => !v)}
                    title={previewFullscreen ? '축소 (75% 너비)' : '전체화면 (100% 너비)'}
                    className={`px-2.5 h-8 inline-flex items-center gap-1 rounded-md text-[11px] font-bold transition-colors ${previewFullscreen ? 'bg-indigo-500 text-white hover:bg-indigo-600' : 'text-slate-500 hover:bg-white hover:text-indigo-600 border border-slate-200'}`}>
                    {previewFullscreen ? <><span style={{transform:'rotate(180deg)'}}>⛶</span> 축소</> : <>⛶ 전체화면</>}
                  </button>
                  <a
                    href={previewScreen.url}
                    target="_blank"
                    rel="noopener"
                    title="새 창으로 열기"
                    className="w-8 h-8 inline-flex items-center justify-center rounded-md text-slate-500 hover:bg-white hover:text-indigo-600 transition-colors border border-slate-200">
                    <Eye size={15}/>
                  </a>
                  <button
                    onClick={() => { setPreviewScreen(null); setPreviewFullscreen(false); }}
                    title="닫기 (Esc)"
                    className="w-8 h-8 inline-flex items-center justify-center rounded-md text-slate-500 hover:bg-white hover:text-rose-600 transition-colors text-[18px] font-bold border border-slate-200">
                    ×
                  </button>
                </div>
              </div>
              {/* iframe */}
              <iframe
                src={previewScreen.url}
                title={previewScreen.label}
                className="flex-1 w-full border-0 bg-white"
              />
              {/* 패널 푸터 */}
              <div className="shrink-0 px-4 py-2 bg-slate-50 border-t border-slate-200 text-[11px] text-slate-500 flex items-center justify-between">
                <span>📍 admin/<strong>{previewScreen.url}</strong> {previewFullscreen && <span className="ml-2 text-indigo-600 font-bold">· 전체화면 모드</span>}</span>
                <span className="text-slate-400">기능명 클릭 / 좌측 영역 클릭으로 닫기 / × 또는 ⛶ 전체화면</span>
              </div>
            </aside>
            <style>{`
              @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to   { transform: translateX(0); opacity: 1; }
              }
            `}</style>
          </>
        )}
      </div>
    );
  };

  createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
