<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블렌디드 코스 만들기 (newcourse)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Pretendard"', '"Roboto"', '"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', 'Arial', 'sans-serif'] },
          colors: {
            indigo: { 50:'#EEF0FF',100:'#E0E4FF',200:'#C7CDFF',300:'#9BA8FF',400:'#7B8AFF',500:'#5569FF',600:'#4454CC',700:'#3340A6',800:'#2A3587',900:'#000C57',950:'#000940' }
          },
          boxShadow: { card:'0px 9px 16px rgba(159,162,191,.18), 0px 2px 2px rgba(159,162,191,0.32)', 'card-sm':'0px 2px 3px rgba(159,162,191,.18), 0px 1px 1px rgba(159,162,191,0.32)' },
          fontSize: { xs:['13px',{lineHeight:'1.5'}], sm:['15px',{lineHeight:'1.5'}] }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    .animate-scaleIn { animation: scaleIn 0.25s ease-out forwards; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideDown { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(16px)} }
    .toast-in { animation: slideUp 0.25s ease-out forwards; }
    .toast-out { animation: slideDown 0.2s ease-in forwards; }
    .custom-scrollbar::-webkit-scrollbar { width:6px; height:6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { cursor:pointer; opacity:0.6; }
    .drag-ghost { opacity:0.35; }
    .drag-over-slot { border-color:#5569FF !important; background:#EEF0FF !important; }
    /* 아티클 에디터 placeholder */
    .article-editor:empty::before {
      content: attr(data-placeholder);
      color: #cbd5e1;
      pointer-events: none;
    }
    .article-editor:focus { outline: none; }
    .article-editor h1, .article-content h1 { font-size: 18px; font-weight: 900; margin: 0.8em 0 0.4em; color: #0f172a; }
    .article-editor h2, .article-content h2 { font-size: 16px; font-weight: 800; margin: 0.8em 0 0.4em; color: #1e293b; }
    .article-editor p, .article-content p { margin: 0.5em 0; }
    .article-editor ul, .article-content ul { padding-left: 1.5em; list-style: disc; margin: 0.5em 0; }
    .article-editor ol, .article-content ol { padding-left: 1.5em; list-style: decimal; margin: 0.5em 0; }
    .article-editor blockquote, .article-content blockquote { border-left: 3px solid #c7cdff; padding-left: 1em; color: #64748b; margin: 0.5em 0; }
    .article-editor img, .article-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 0.5em 0; display: block; }
    /* 블록 단위 contentEditable placeholder */
    .empty-placeholder:empty::before { content: attr(data-placeholder); color: #cbd5e1; pointer-events: none; }
    .empty-placeholder:focus { outline: none; }
    /* 노션 흉내 에디터 wrapper (legacy) */
    .notion-editor { position: relative; min-height: 280px; max-height: 460px; overflow-y: auto; padding: 12px 4px; font-family: inherit; }
    .notion-editor:focus { outline: none; }
    .notion-editor [data-placeholder]:empty::before { content: attr(data-placeholder); color: #cbd5e1; pointer-events: none; }
    .notion-editor p { margin: 0.35em 0; font-size: 14px; line-height: 1.7; color: #334155; min-height: 1.6em; }
    .notion-editor h1 { font-size: 22px; font-weight: 900; margin: 1em 0 0.4em; color: #0f172a; line-height: 1.35; }
    .notion-editor h2 { font-size: 17px; font-weight: 800; margin: 0.9em 0 0.35em; color: #1e293b; line-height: 1.4; }
    .notion-editor ul { padding-left: 1.4em; list-style: disc; margin: 0.4em 0; }
    .notion-editor ol { padding-left: 1.4em; list-style: decimal; margin: 0.4em 0; }
    .notion-editor li { margin: 0.2em 0; font-size: 14px; line-height: 1.65; color: #334155; }
    .notion-editor blockquote { border-left: 3px solid #c7cdff; padding: 0.2em 0 0.2em 0.9em; color: #64748b; margin: 0.5em 0; font-style: italic; }
    .notion-editor img { max-width: 100%; height: auto; border-radius: 8px; margin: 0.6em 0; display: block; }
    .notion-editor hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1.2em 0; }
  </style>
</head>
<body class="bg-[#f2f5f9] text-slate-800 font-sans antialiased overflow-y-auto custom-scrollbar">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect, useCallback, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0';

    const {
      Plus, Wand2, Trash2, Copy, X, Check, ChevronDown, ChevronUp, GripVertical,
      Save, Send, Eye, Video, FileText, ClipboardList, BookOpen,
      AlertTriangle, Clock, Award, Users, MousePointerClick, Settings,
      Play, ChevronRight, BarChart2, Layers, Upload, Library, Search, FolderOpen,
      MapPin, Monitor, Star, List, Archive, AlertCircle, Grid3X3, CheckCircle, Filter,
      MessageSquare, ArrowLeft, ChevronLeft, CircleDot, Building2, GitBranch, Lock, Shield,
      ImageIcon, Info, User, Download, Link2, Calendar: CalendarIcon, Zap
    } = Lucide;

    /* ─── Toggle 공통 컴포넌트 (admin1.html 동일) ─── */
    const Toggle = ({ active, onClick }) => (
      <div onClick={onClick} className={`w-10 h-6 rounded-full relative cursor-pointer transition-colors ${active ? 'bg-indigo-600' : 'bg-slate-300'}`}>
        <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all shadow-sm ${active ? 'left-5' : 'left-1'}`}></div>
      </div>
    );

    /* ─── 슬롯 유형 설정 ─── */
    const SLOT_TYPES = {
      video:         { label:'영상',     icon: Video,        color:'bg-blue-100 text-blue-600',     border:'border-blue-200',   defaultCond:{ watchRate:90 } },
      exam:          { label:'시험',     icon: ClipboardList,color:'bg-violet-100 text-violet-600', border:'border-violet-200', defaultCond:{ passScore:60, totalQ:20 } },
      survey:        { label:'설문',     icon: BarChart2,    color:'bg-pink-100 text-pink-600',     border:'border-pink-200',   defaultCond:{} },
      pdf:           { label:'자료',     icon: FileText,     color:'bg-amber-100 text-amber-700',   border:'border-amber-200',  defaultCond:{} },
      offline:       { label:'오프라인', icon: Building2,    color:'bg-orange-100 text-orange-700', border:'border-orange-300', defaultCond:{ attendanceRate:100 } },
      external_link: { label:'외부 링크', icon: Link2,        color:'bg-slate-100 text-slate-700',   border:'border-slate-200',  defaultCond:{} },
    };

    /* ─── 슬롯 이수 조건 설명 텍스트 ─── */
    const condText = (slot) => {
      if (slot.type === 'video')         return `시청률 ${slot.cond.watchRate ?? 90}% 이상`;
      if (slot.type === 'exam')          return `${slot.cond.passScore ?? 60}점 이상 / ${slot.cond.totalQ ?? 20}문항`;
      if (slot.type === 'survey')        return '전 문항 응답 후 제출';
      if (slot.type === 'pdf')           return 'PDF 전체 열람 완료';
      if (slot.type === 'offline')       return '오프라인 출석 (수료 조건 기준)';
      if (slot.type === 'external_link') return '클릭 + 외부 콜백';
      return '';
    };

    /* ─── 콘텐츠 라이브러리 목업 데이터 ─── */
    const TYPE_LABEL = { video:'VIDEO', exam:'EXAM', survey:'SURVEY', pdf:'PDF', offline:'OFFLINE', external_link:'EXTERNAL' };
    const SAMPLE_PDF_URL = '../assets/test.pdf';
    const SAMPLE_VIDEO_URL = '../assets/test-video.mp4';
    const SAMPLE_POSTER_URL = '../assets/images/img_d1.jpg';
    const SAMPLE_POSTER_URL_2 = '../assets/images/img_d2.jpg';
    const SAMPLE_COVER_URL = '../assets/images/cover.png';
    const LIBRARY_ITEMS = [
      { id:'l1', type:'video',   title:'2025년 기업문화 핵심가치 내재화 특강', meta:'45:20', date:'2026.01.15', videoUrl: SAMPLE_VIDEO_URL, posterUrl: SAMPLE_POSTER_URL, description: '회사의 핵심가치 4가지를 사례 기반으로 풀어내며, 임직원 행동 원칙과 실제 의사결정 상황에서의 적용 방법을 다룹니다.' },
      { id:'l2', type:'video',   title:'직장 내 성희롱 예방 교육 (법정의무)',  meta:'60:00', date:'2025.10.05', videoUrl: SAMPLE_VIDEO_URL, posterUrl: SAMPLE_POSTER_URL_2, description: '남녀고용평등법에 따른 연 1회 법정의무 교육. 사례·예방 행동·신고 절차·2차 가해 방지까지 포함된 표준 커리큘럼.' },
      { id:'l3', type:'survey',  title:'2025 상반기 임직원 만족도 설문',       meta:'-',     date:'2025.09.12' },
      { id:'l4', type:'exam',    title:'신입사원 OJT 최종 평가',               meta:'20문항', date:'2026.02.10' },
      { id:'l5', type:'video',   title:'신입사원 온보딩 영상 1',               meta:'30:00', date:'2026.03.01', videoUrl: SAMPLE_VIDEO_URL, posterUrl: SAMPLE_POSTER_URL, description: '신입사원 첫 출근 ~ 첫 주에 필요한 모든 정보. 회사 소개, 조직 구조, 사내 시스템 사용법, 복지·문화 가이드를 한 영상에 압축.' },
      { id:'l7', type:'video',   title:'리더십 역량 강의 1강',                  meta:'52:10', date:'2026.01.20', videoUrl: SAMPLE_VIDEO_URL, posterUrl: SAMPLE_POSTER_URL_2, description: '실무 리더가 첫 팀을 맡았을 때 가장 먼저 부딪히는 5가지 상황과 그 대응 방법. 신임 팀장·리드 대상.' },
      { id:'l8', type:'exam',    title:'보안 인식 중간 점검',                   meta:'10문항', date:'2026.01.05' },
      { id:'l13', type:'pdf',    title:'신입사원 핸드아웃 (2026)',              meta:'PDF · 18p', date:'2026.03.05', fileUrl: SAMPLE_PDF_URL, sizeMB: 2.4, pages: 18 },
      { id:'l14', type:'pdf',    title:'리더십 강의 1강 강의자료',              meta:'PDF · 32p', date:'2026.01.22', fileUrl: SAMPLE_PDF_URL, sizeMB: 4.1, pages: 32 },
      { id:'l15', type:'pdf',    title:'성희롱 예방 교육 보조 교재',            meta:'PDF · 24p', date:'2025.10.06', fileUrl: SAMPLE_PDF_URL, sizeMB: 3.2, pages: 24 },
    ];

    /* ─── 학습 항목 추가 모달 — 1차 스코프: 영상·PDF·시험·설문 (아티클은 UI에서 제외, 기존 데이터는 보존) ─── */
    const ADD_MODAL_FILTERS = [
      { id:'all',     label:'전체 항목' },
      { id:'video',   label:'동영상 (VOD)' },
      { id:'pdf',     label:'자료 (PDF)' },
      { id:'exam',    label:'시험/퀴즈' },
      { id:'survey',  label:'설문' },
    ];
    const AddItemModal = ({ library = LIBRARY_ITEMS, addedLibIds = new Set(), onAdd, onCreateArticle, onCreateSimple, onClose }) => {
      const [view, setView]       = useState('browse');    // 'browse' | 'upload'
      const [filter, setFilter]   = useState('all');       // 'all' | 'video' | 'pdf' | 'exam' | 'survey'
      const [query, setQuery]     = useState('');
      const [uploadType, setUploadType] = useState(null);  // null | 'video' | 'pdf'
      const [draggingFile, setDraggingFile] = useState(false);
      const [previewItem, setPreviewItem] = useState(null);
      const [creatingArticle, setCreatingArticle] = useState(false);
      const [creatingKind, setCreatingKind] = useState(null); // 'exam' | 'quiz' | 'survey' | null

      /* 1차에서는 아티클 신규 추가 차단 — 라이브러리에서도 아티클 항목 비노출 */
      const filteredLib = library.filter(i =>
        i.type !== 'article' &&
        (filter === 'all' || i.type === filter) &&
        (!query || i.title.toLowerCase().includes(query.toLowerCase()))
      );

      const handleAddLib = (libItem) => {
        onAdd(libItem.type, libItem.title, libItem);
        onClose();
      };
      const handleUploadConfirm = () => {
        if (!uploadType) return;
        const title = uploadType === 'video' ? '새 영상 (업로드됨)' : '새 자료 (업로드됨)';
        onAdd(uploadType, title, null);
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center animate-fadeIn" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl overflow-hidden w-[960px] max-w-[95vw] flex flex-col"
            style={{ height: '620px' }} onClick={e => e.stopPropagation()}>

            {/* 헤더 */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50 shrink-0">
              <div className="flex items-center gap-2">
                {view === 'upload' && (
                  <button onClick={() => { setView('browse'); setUploadType(null); }}
                    className="text-slate-400 hover:text-slate-600 mr-1" title="뒤로">
                    <ChevronRight size={16} className="rotate-180"/>
                  </button>
                )}
                <Layers size={18} className="text-indigo-500"/>
                <h3 className="text-[15px] font-bold text-slate-800">
                  {view === 'browse' ? '학습 항목 추가' : 'PC에서 파일 업로드'}
                </h3>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X size={18}/></button>
            </div>

            {/* ── BROWSE: 라이브러리 통합 뷰 ── */}
            {view === 'browse' && (
              <div className="flex-1 flex min-h-0">
                {/* 좌측 카테고리 */}
                <div className="w-[180px] border-r border-slate-100 bg-slate-50 py-4 px-3 space-y-0.5 shrink-0 overflow-y-auto custom-scrollbar">
                  {ADD_MODAL_FILTERS.map(f => {
                    const count = f.id === 'all'
                      ? library.length
                      : library.filter(i => i.type === f.id).length;
                    const active = filter === f.id;
                    return (
                      <button key={f.id} onClick={() => setFilter(f.id)}
                        className={`w-full flex items-center justify-between px-3 py-2 rounded-lg text-[13px] transition-colors text-left
                          ${active ? 'bg-white font-bold text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-white/60'}`}>
                        <span>{f.label}</span>
                        <span className={`text-[10px] ${active ? 'text-indigo-500 font-bold' : 'text-slate-400'}`}>{count}</span>
                      </button>
                    );
                  })}
                </div>

                {/* 우측 메인 */}
                <div className="flex-1 flex flex-col min-w-0">
                  {/* 검색 바 */}
                  <div className="px-6 py-4 border-b border-slate-100 flex items-center gap-2 shrink-0">
                    <div className="flex-1 flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full px-4 py-2.5">
                      <Search size={14} className="text-slate-400 shrink-0"/>
                      <input autoFocus type="text" value={query} onChange={e => setQuery(e.target.value)}
                        placeholder="보관함 내 학습 항목 검색..."
                        className="flex-1 bg-transparent outline-none text-[13px] text-slate-700"/>
                    </div>
                    <button className="px-5 py-2.5 bg-indigo-600 text-white rounded-full text-[13px] font-bold hover:bg-indigo-700 shrink-0">
                      검색
                    </button>
                  </div>

                  {/* 리스트 */}
                  <div className="flex-1 overflow-y-auto custom-scrollbar px-6 py-3 space-y-2">
                    {/* 자료(PDF) 탭 — 업로드 CTA */}
                    {filter === 'pdf' && (
                      <div className="flex items-center justify-between gap-3 p-4 rounded-2xl border border-amber-100 bg-amber-50/40 mb-1">
                        <div className="flex items-start gap-3 min-w-0">
                          <div className="w-9 h-9 rounded-lg bg-white border border-amber-100 flex items-center justify-center shrink-0">
                            <FileText size={16} className="text-amber-600"/>
                          </div>
                          <div className="min-w-0">
                            <p className="text-[13px] font-bold text-slate-800">자료 (PDF)</p>
                            <p className="text-[11px] text-slate-500 mt-0.5">강의 핸드아웃·교재·사전 배포 자료를 PDF로 첨부합니다.</p>
                          </div>
                        </div>
                        <button onClick={() => { setView('upload'); setUploadType('pdf'); }}
                          className="flex items-center gap-1.5 px-4 py-2.5 bg-amber-600 text-white rounded-lg text-[12px] font-bold hover:bg-amber-700 shrink-0">
                          <Upload size={13}/> PDF 업로드
                        </button>
                      </div>
                    )}

                    {/* 시험/퀴즈 탭 — 새 시험 / 새 퀴즈 CTA */}
                    {filter === 'exam' && (
                      <div className="space-y-2 mb-1">
                        <div className="flex items-center justify-between gap-3 p-4 rounded-2xl border border-violet-100 bg-violet-50/40">
                          <div className="flex items-start gap-3 min-w-0">
                            <div className="w-9 h-9 rounded-lg bg-white border border-violet-100 flex items-center justify-center shrink-0">
                              <ClipboardList size={16} className="text-violet-600"/>
                            </div>
                            <div className="min-w-0">
                              <p className="text-[13px] font-bold text-slate-800">시험 (Exam)</p>
                              <p className="text-[11px] text-slate-500 mt-0.5">합격 점수와 문항 수가 있는 평가용 시험을 만듭니다.</p>
                            </div>
                          </div>
                          <button onClick={() => setCreatingKind('exam')}
                            className="flex items-center gap-1.5 px-4 py-2.5 bg-violet-600 text-white rounded-lg text-[12px] font-bold hover:bg-violet-700 shrink-0">
                            <Plus size={13}/> 새 시험 만들기
                          </button>
                        </div>
                        <div className="flex items-center justify-between gap-3 p-4 rounded-2xl border border-violet-100 bg-violet-50/30">
                          <div className="flex items-start gap-3 min-w-0">
                            <div className="w-9 h-9 rounded-lg bg-white border border-violet-100 flex items-center justify-center shrink-0">
                              <Award size={16} className="text-violet-600"/>
                            </div>
                            <div className="min-w-0">
                              <p className="text-[13px] font-bold text-slate-800">퀴즈 (Quiz)</p>
                              <p className="text-[11px] text-slate-500 mt-0.5">짧은 학습 점검용 퀴즈를 만듭니다 (합격 점수 없음).</p>
                            </div>
                          </div>
                          <button onClick={() => setCreatingKind('quiz')}
                            className="flex items-center gap-1.5 px-4 py-2.5 bg-white border border-violet-300 text-violet-700 rounded-lg text-[12px] font-bold hover:bg-violet-50 shrink-0">
                            <Plus size={13}/> 새 퀴즈 만들기
                          </button>
                        </div>
                      </div>
                    )}

                    {/* 설문 탭 — 새 설문 CTA */}
                    {filter === 'survey' && (
                      <div className="flex items-center justify-between gap-3 p-4 rounded-2xl border border-pink-100 bg-pink-50/40 mb-1">
                        <div className="flex items-start gap-3 min-w-0">
                          <div className="w-9 h-9 rounded-lg bg-white border border-pink-100 flex items-center justify-center shrink-0">
                            <BarChart2 size={16} className="text-pink-600"/>
                          </div>
                          <div className="min-w-0">
                            <p className="text-[13px] font-bold text-slate-800">설문 (Survey)</p>
                            <p className="text-[11px] text-slate-500 mt-0.5">학습자 의견을 수집하는 설문을 만듭니다.</p>
                          </div>
                        </div>
                        <button onClick={() => setCreatingKind('survey')}
                          className="flex items-center gap-1.5 px-4 py-2.5 bg-pink-600 text-white rounded-lg text-[12px] font-bold hover:bg-pink-700 shrink-0">
                          <Plus size={13}/> 새 설문 만들기
                        </button>
                      </div>
                    )}
                    {filteredLib.length === 0 ? (
                      <div className="text-center py-16 text-slate-400 text-[12px]">검색 결과가 없습니다</div>
                    ) : filteredLib.map(item => {
                      const T = SLOT_TYPES[item.type];
                      const Icon = T.icon;
                      const typeLabel = TYPE_LABEL[item.type];
                      const canPreview = (item.type === 'video' && item.videoUrl) || (item.type === 'pdf' && item.fileUrl) || (item.type === 'article' && item.articleFormat === 'rich');
                      return (
                        <div key={item.id}
                          className="flex items-center gap-3 px-4 py-3 rounded-2xl border border-slate-200 hover:border-indigo-200 hover:bg-slate-50/60 transition-all">
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${T.color}`}>
                            <Icon size={18}/>
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="text-[13px] font-bold text-slate-800 truncate">{item.title}</div>
                            <div className="text-[11px] text-slate-400 mt-0.5 flex items-center gap-3">
                              <span className="font-bold tracking-wider">{typeLabel}</span>
                              <span>{item.meta}</span>
                              <span>{item.date}</span>
                            </div>
                          </div>
                          {canPreview && (
                            <button type="button" onClick={() => setPreviewItem(item)}
                              className="px-3 py-1.5 border border-indigo-200 bg-indigo-50 text-indigo-600 rounded-lg text-[12px] font-bold hover:bg-indigo-100 shrink-0">
                              미리보기
                            </button>
                          )}
                          {addedLibIds.has(item.id) ? (
                            <button disabled
                              className="flex items-center gap-1 px-4 py-1.5 border border-slate-200 bg-slate-50 text-slate-400 rounded-lg text-[12px] font-bold cursor-not-allowed shrink-0">
                              <Check size={12}/> 추가됨
                            </button>
                          ) : (
                            <button onClick={() => handleAddLib(item)}
                              className="px-4 py-1.5 border border-slate-200 text-slate-700 rounded-lg text-[12px] font-bold hover:bg-slate-100 hover:border-slate-300 shrink-0">
                              추가
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* 하단 — 오프라인 수업(차수) 직접 추가 + 업로드 진입 */}
                  <div className="px-6 py-3 border-t border-slate-100 flex items-center justify-between shrink-0 bg-slate-50/50">
                    <span className="text-[12px] text-slate-400">오프라인 수업은 보관함이 아니라 바로 만듭니다</span>
                    <div className="flex items-center gap-2">
                      <button onClick={() => { onAdd('offline', '새 차수', null); onClose(); }}
                        className="flex items-center gap-1.5 px-4 py-2 border border-orange-200 bg-orange-50 rounded-lg text-[12px] font-bold text-orange-700 hover:border-orange-300 hover:bg-orange-100 transition-colors">
                        <Building2 size={13}/> 오프라인 수업 추가
                      </button>
                      <button onClick={() => setView('upload')}
                        className="flex items-center gap-1.5 px-4 py-2 border border-slate-200 bg-white rounded-lg text-[12px] font-bold text-slate-700 hover:border-indigo-300 hover:text-indigo-600 transition-colors">
                        <Upload size={13}/> PC에서 파일 업로드
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── UPLOAD: 영상 / PDF (1차 스코프) ── */}
            {view === 'upload' && (
              <div className="flex-1 flex flex-col p-6 gap-4 min-h-0">
                <p className="text-[11px] text-slate-400 -mt-1">
                  업로드 가능: 영상 (MP4·MOV·AVI) 또는 자료 (PDF) — 그 외 형식은 라이브러리 등록 후 사용해 주세요.
                </p>

                {!uploadType ? (
                  <div className="flex-1 grid grid-cols-2 gap-4">
                    <button onClick={() => setUploadType('video')}
                      className="flex flex-col items-center justify-center gap-3 rounded-2xl border-2 border-dashed border-slate-300 hover:border-indigo-400 hover:bg-indigo-50/40 transition-all">
                      <div className="w-14 h-14 rounded-2xl bg-blue-100 flex items-center justify-center">
                        <Video size={26} className="text-blue-600"/>
                      </div>
                      <div className="text-center">
                        <p className="text-[15px] font-bold text-slate-800">영상 업로드</p>
                        <p className="text-[11px] text-slate-400 mt-1">MP4 · MOV · AVI · 최대 5GB</p>
                      </div>
                    </button>
                    <button onClick={() => setUploadType('pdf')}
                      className="flex flex-col items-center justify-center gap-3 rounded-2xl border-2 border-dashed border-slate-300 hover:border-amber-400 hover:bg-amber-50/40 transition-all">
                      <div className="w-14 h-14 rounded-2xl bg-amber-100 flex items-center justify-center">
                        <FileText size={26} className="text-amber-600"/>
                      </div>
                      <div className="text-center">
                        <p className="text-[15px] font-bold text-slate-800">PDF 업로드</p>
                        <p className="text-[11px] text-slate-400 mt-1">PDF 자료 · 최대 100MB</p>
                      </div>
                    </button>
                  </div>
                ) : (
                  <div className="flex-1 flex flex-col gap-3">
                    <div className="flex items-center gap-2 text-[12px]">
                      <span className="text-slate-500">선택한 유형:</span>
                      <span className={`font-bold px-2 py-0.5 rounded-md ${uploadType === 'video' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}`}>
                        {uploadType === 'video' ? '영상' : 'PDF'}
                      </span>
                      <button onClick={() => setUploadType(null)}
                        className="ml-1 text-slate-400 hover:text-slate-600 underline underline-offset-2">
                        변경
                      </button>
                    </div>
                    <div
                      onDragOver={e => { e.preventDefault(); setDraggingFile(true); }}
                      onDragLeave={() => setDraggingFile(false)}
                      onDrop={e => { e.preventDefault(); setDraggingFile(false); handleUploadConfirm(); }}
                      onClick={handleUploadConfirm}
                      className={`flex-1 border-2 border-dashed rounded-2xl flex flex-col items-center justify-center transition-all cursor-pointer
                        ${draggingFile ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 hover:border-indigo-400 hover:bg-slate-50'}`}>
                      <Upload size={36} className={`mb-3 ${draggingFile ? 'text-indigo-500' : 'text-slate-300'}`}/>
                      <p className="text-[14px] font-bold text-slate-700">파일을 드래그하거나 클릭해서 업로드</p>
                      <p className="text-[11px] text-slate-400 mt-1">
                        {uploadType === 'video' ? 'MP4, MOV, AVI · 최대 5GB' : 'PDF · 최대 100MB'}
                      </p>
                    </div>
                    <p className="text-[11px] text-center text-slate-400">
                      업로드 후 자동으로 콘텐츠 라이브러리에 등록됩니다
                    </p>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ── 영상 미리보기 모달 ── */}
          {previewItem?.type === 'video' && (
            <VideoPreviewModal
              libItem={previewItem}
              alreadyAdded={addedLibIds.has(previewItem.id)}
              onAdd={(lib) => { onAdd(lib.type, lib.title, lib); setPreviewItem(null); }}
              onClose={() => setPreviewItem(null)}
            />
          )}

          {/* ── 아티클 미리보기 모달 ── */}
          {previewItem?.type === 'article' && (
            <ArticlePreviewModal
              article={previewItem}
              alreadyAdded={addedLibIds.has(previewItem.id)}
              onAdd={(lib) => { onAdd(lib.type, lib.title, lib); setPreviewItem(null); }}
              onClose={() => setPreviewItem(null)}
            />
          )}

          {/* ── PDF 미리보기 모달 ── */}
          {previewItem?.type === 'pdf' && (
            <PdfPreviewModal
              pdf={previewItem}
              alreadyAdded={addedLibIds.has(previewItem.id)}
              onAdd={(lib) => { onAdd(lib.type, lib.title, lib); setPreviewItem(null); }}
              onClose={() => setPreviewItem(null)}
            />
          )}

          {/* ── 새 아티클 만들기 모달 ── */}
          {creatingArticle && (
            <ArticleCreateModal
              onSave={(article) => { if (onCreateArticle) onCreateArticle(article); setCreatingArticle(false); }}
              onClose={() => setCreatingArticle(false)}
            />
          )}

          {/* ── 새 시험/퀴즈/설문 만들기 모달 ── */}
          {creatingKind && (
            <SimpleItemCreateModal
              kind={creatingKind}
              onSave={(item) => { if (onCreateSimple) onCreateSimple(item); setCreatingKind(null); }}
              onClose={() => setCreatingKind(null)}
            />
          )}
        </div>
      );
    };

    /* ─── 영상 미리보기 모달 ─── */
    const VideoPreviewModal = ({ libItem, alreadyAdded, onAdd, onClose }) => {
      const videoRef = useRef(null);
      const closeBtnRef = useRef(null);
      const modalRef = useRef(null);
      const [loadError, setLoadError] = useState(false);
      const [descExpanded, setDescExpanded] = useState(false);

      const description = libItem.description || '';
      const videoUrl = libItem.videoUrl;
      const posterUrl = libItem.posterUrl;

      const handleClose = useCallback(() => {
        if (videoRef.current) { try { videoRef.current.pause(); } catch(e){} }
        onClose();
      }, [onClose]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape') {
            if (document.fullscreenElement) return;
            e.stopPropagation();
            handleClose();
          }
          if (e.key === 'Tab' && modalRef.current) {
            const focusable = modalRef.current.querySelectorAll(
              'button:not([disabled]), [tabindex]:not([tabindex="-1"]), input, video'
            );
            if (focusable.length === 0) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
          }
        };
        document.addEventListener('keydown', onKey, true);
        closeBtnRef.current?.focus();
        return () => document.removeEventListener('keydown', onKey, true);
      }, [handleClose]);

      const handleAddClick = () => {
        if (alreadyAdded) return;
        if (videoRef.current) { try { videoRef.current.pause(); } catch(e){} }
        onAdd(libItem);
      };

      const handleRetry = () => {
        setLoadError(false);
        setTimeout(() => { if (videoRef.current) videoRef.current.load(); }, 0);
      };

      const longDesc = description && description.length > 80;

      return (
        <div className="fixed inset-0 bg-slate-900/50 z-[300] flex items-center justify-center animate-fadeIn"
          onClick={handleClose}
          role="dialog"
          aria-labelledby="video-preview-title"
          aria-modal="true">
          <div ref={modalRef}
            className="bg-white rounded-2xl shadow-2xl overflow-hidden w-[640px] max-w-[95vw] max-h-[90vh] flex flex-col animate-scaleIn"
            onClick={e => e.stopPropagation()}>

            {/* 헤더 */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 shrink-0">
              <div className="flex items-center gap-2 min-w-0">
                <Video size={18} className="text-slate-500 shrink-0"/>
                <h3 id="video-preview-title" className="text-[15px] font-bold text-slate-800 truncate">
                  {libItem.title || '(제목 없음)'}
                </h3>
              </div>
              <button ref={closeBtnRef} onClick={handleClose}
                className="text-slate-400 hover:text-slate-600 shrink-0 ml-3" aria-label="닫기">
                <X size={18}/>
              </button>
            </div>

            {/* 영상 플레이어 */}
            <div className="bg-black w-full relative" style={{ aspectRatio: '16 / 9' }}>
              {loadError ? (
                <div className="absolute inset-0 flex flex-col items-center justify-center gap-3 text-slate-300">
                  <AlertTriangle size={28}/>
                  <p className="text-[13px]">영상을 불러올 수 없습니다</p>
                  <button onClick={handleRetry}
                    className="px-4 py-1.5 border border-slate-500 text-slate-300 rounded-lg text-[12px] hover:bg-slate-800">
                    재시도
                  </button>
                </div>
              ) : videoUrl ? (
                <video ref={videoRef}
                  src={videoUrl}
                  poster={posterUrl || undefined}
                  controls
                  preload="metadata"
                  onError={() => setLoadError(true)}
                  className="w-full h-full"
                />
              ) : (
                <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 text-slate-400">
                  <Video size={28} className="opacity-50"/>
                  <p className="text-[12px]">영상 소스가 등록되지 않았습니다</p>
                </div>
              )}
            </div>

            {/* 메타데이터 + 설명 */}
            <div className="px-6 py-4 flex flex-col gap-2 min-h-0">
              {(libItem.meta || libItem.date) && (
                <div className="text-[11px] text-slate-400 flex items-center gap-3 shrink-0">
                  {libItem.meta && <span>길이 {libItem.meta}</span>}
                  {libItem.date && <span>업로드 {libItem.date}</span>}
                </div>
              )}
              {description ? (
                <>
                  <div
                    className={`text-[13px] text-slate-600 leading-relaxed ${descExpanded ? 'overflow-y-auto custom-scrollbar' : ''}`}
                    style={descExpanded
                      ? { maxHeight: '110px' }
                      : { display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
                    {description}
                  </div>
                  {longDesc && (
                    <button onClick={() => setDescExpanded(p => !p)}
                      className="text-[11px] text-indigo-500 hover:text-indigo-700 self-start">
                      {descExpanded ? '접기' : '더보기'}
                    </button>
                  )}
                </>
              ) : (
                <div className="text-[13px] text-slate-300">설명 없음</div>
              )}
            </div>

            {/* 푸터 */}
            <div className="px-6 py-4 border-t border-slate-100 flex items-center justify-end gap-2 shrink-0 bg-slate-50/40">
              <button onClick={handleClose}
                className="px-5 py-2.5 border border-slate-200 text-slate-600 rounded-xl text-[13px] font-semibold hover:bg-slate-50">
                닫기
              </button>
              {alreadyAdded ? (
                <button disabled
                  className="flex items-center gap-1.5 px-5 py-2.5 bg-slate-100 text-slate-400 rounded-xl text-[13px] font-bold cursor-not-allowed">
                  <Check size={14}/> 이미 추가됨
                </button>
              ) : (
                <button onClick={handleAddClick}
                  className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-[13px] font-bold hover:bg-indigo-700">
                  이 항목 추가
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ─── 아티클 미리보기 모달 (학습자 화면 모방) ─── */
    const ArticlePreviewModal = ({ article, alreadyAdded = true, onAdd, onClose }) => {
      const modalRef = useRef(null);
      const closeBtnRef = useRef(null);

      const hasContent = !!article.content && article.content.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim().length > 0
        || (article.content || '').includes('<img');
      // legacy: 옛날 images 배열이 있으면 상단에 순서대로 렌더
      const legacyImages = Array.isArray(article.images) ? article.images : [];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape') {
            if (document.fullscreenElement) return;
            e.stopPropagation();
            onClose();
          }
          if (e.key === 'Tab' && modalRef.current) {
            const focusable = modalRef.current.querySelectorAll('button:not([disabled])');
            if (focusable.length === 0) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
          }
        };
        document.addEventListener('keydown', onKey, true);
        closeBtnRef.current?.focus();
        return () => document.removeEventListener('keydown', onKey, true);
      }, [onClose]);

      const showAddBtn = typeof onAdd === 'function';

      return (
        <div className="fixed inset-0 bg-slate-900/50 z-[300] flex items-center justify-center animate-fadeIn"
          onClick={onClose}
          role="dialog" aria-modal="true" aria-labelledby="article-preview-title">
          <div ref={modalRef}
            className="bg-white rounded-2xl shadow-2xl overflow-hidden w-[640px] max-w-[95vw] max-h-[92vh] flex flex-col animate-scaleIn"
            onClick={e => e.stopPropagation()}>

            {/* 헤더 */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 shrink-0 bg-slate-50/60">
              <div className="flex items-center gap-2 min-w-0">
                <div className="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0">
                  <FileText size={16}/>
                </div>
                <div className="min-w-0">
                  <h3 id="article-preview-title" className="text-[14px] font-bold text-slate-800">아티클 미리보기</h3>
                  <p className="text-[11px] text-slate-400">학습자에게 보이는 화면 (미리보기)</p>
                </div>
              </div>
              <button ref={closeBtnRef} onClick={onClose}
                className="text-slate-400 hover:text-slate-600 shrink-0 ml-3" aria-label="닫기">
                <X size={18}/>
              </button>
            </div>

            {/* 학습자 톤 본문 */}
            <div className="flex-1 overflow-y-auto custom-scrollbar bg-white">
              <div className="px-8 py-6">
                <div className="flex items-center gap-2 mb-3 flex-wrap">
                  <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-50 border border-amber-100 text-amber-700 rounded-md text-[11px] font-bold">
                    <FileText size={11}/> 아티클
                  </span>
                  {article.readMinutes && (
                    <span className="text-[11px] text-slate-400">읽기 {article.readMinutes}분</span>
                  )}
                </div>
                <h1 className="text-[22px] font-black text-slate-900 leading-snug mb-3">
                  {article.title || '(제목 없음)'}
                </h1>
                <div className="flex items-center gap-2 mb-6 pb-4 border-b border-slate-100">
                  <div className="w-7 h-7 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-[10px] font-black">
                    {(article.author && article.author.slice(0,2)) || 'HR'}
                  </div>
                  <span className="text-[12px] font-semibold text-slate-600">{article.author || '인사팀'}</span>
                  <span className="text-[11px] text-slate-400 ml-1">{article.date}</span>
                </div>
                {legacyImages.length > 0 && (
                  <div className="space-y-3 mb-6">
                    {legacyImages.map((src, i) => (
                      <img key={i} src={src} alt="" className="w-full rounded-lg" loading="lazy"/>
                    ))}
                  </div>
                )}
                {hasContent ? (
                  <div className="article-content text-[14px] text-slate-700 leading-[1.8]"
                    dangerouslySetInnerHTML={{ __html: article.content }}/>
                ) : legacyImages.length === 0 && (
                  <p className="text-[13px] text-slate-400 italic">본문 없음</p>
                )}
              </div>
            </div>

            {/* 푸터 */}
            <div className="px-6 py-4 border-t border-slate-100 flex items-center justify-end gap-2 shrink-0 bg-slate-50/40">
              <button onClick={onClose}
                className={`px-5 py-2.5 ${showAddBtn ? 'border border-slate-200 text-slate-600 hover:bg-slate-50' : 'bg-indigo-600 text-white hover:bg-indigo-700'} rounded-xl text-[13px] font-bold`}>
                닫기
              </button>
              {showAddBtn && (
                alreadyAdded ? (
                  <button disabled
                    className="flex items-center gap-1.5 px-5 py-2.5 bg-slate-100 text-slate-400 rounded-xl text-[13px] font-bold cursor-not-allowed">
                    <Check size={14}/> 이미 추가됨
                  </button>
                ) : (
                  <button onClick={() => onAdd(article)}
                    className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-[13px] font-bold hover:bg-indigo-700">
                    이 항목 추가
                  </button>
                )
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ─── PDF 미리보기 모달 (운영자·학습자 공용) ─── */
    const PdfPreviewModal = ({ pdf, alreadyAdded = true, onAdd, onClose }) => {
      const fileUrl = pdf.fileUrl || SAMPLE_PDF_URL;
      const embedUrl = fileUrl + '#view=FitH&toolbar=1';
      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[210] flex items-center justify-center animate-fadeIn p-4" onClick={onClose}
          role="dialog" aria-modal="true" aria-labelledby="pdf-preview-title">
          <div className="bg-white rounded-2xl shadow-2xl overflow-hidden w-[920px] max-w-[95vw] flex flex-col"
            style={{ height: '85vh', maxHeight: '720px' }} onClick={e => e.stopPropagation()}>

            {/* 헤더 */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50 shrink-0">
              <div className="flex items-center gap-2 min-w-0">
                <FileText size={18} className="text-amber-600 shrink-0"/>
                <div className="min-w-0">
                  <h3 id="pdf-preview-title" className="text-[14px] font-bold text-slate-800 truncate">PDF 미리보기</h3>
                  <p className="text-[11px] text-slate-400 truncate">{pdf.title}</p>
                </div>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 shrink-0"><X size={18}/></button>
            </div>

            {/* 메타 */}
            <div className="px-6 py-3 border-b border-slate-100 flex items-center gap-3 text-[11px] text-slate-500 shrink-0">
              <span className="flex items-center gap-1 bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">
                <FileText size={11}/> PDF
              </span>
              {pdf.pages && <span>{pdf.pages} 페이지</span>}
              {pdf.sizeMB && <span>{pdf.sizeMB} MB</span>}
              {pdf.date && <span className="text-slate-400">{pdf.date}</span>}
              <span className="ml-auto text-slate-400">학습자도 같은 화면을 봅니다</span>
            </div>

            {/* 본문 — 데스크탑: iframe, 모바일: 새 탭/다운로드 안내 */}
            <div className="flex-1 min-h-0 bg-slate-100">
              {/* 데스크탑 */}
              <iframe
                src={embedUrl}
                title={pdf.title}
                className="hidden sm:block w-full h-full border-0"
              />
              {/* 모바일 fallback */}
              <div className="sm:hidden h-full flex flex-col items-center justify-center gap-3 p-6 text-center">

                <p className="text-[11px] text-slate-500">데스크탑 환경에서는 이 모달에서 바로 미리보기가 가능합니다.</p>
                <a href={fileUrl} target="_blank" rel="noopener noreferrer"
                  className="mt-2 flex items-center gap-1.5 px-4 py-2.5 bg-amber-600 text-white rounded-lg text-[12px] font-bold hover:bg-amber-700">
                  <Eye size={13}/> 새 탭에서 PDF 열기
                </a>
              </div>
            </div>

            {/* 푸터 — 다운로드 + 추가 CTA */}
            <div className="px-6 py-3 border-t border-slate-100 flex items-center justify-between shrink-0 bg-white">
              <a href={fileUrl} download
                className="flex items-center gap-1.5 text-[12px] font-semibold text-slate-500 hover:text-slate-700">
                <Download size={13}/> 다운로드
              </a>
              {alreadyAdded ? (
                <button disabled
                  className="flex items-center gap-1 px-4 py-2 border border-slate-200 bg-slate-50 text-slate-400 rounded-lg text-[12px] font-bold cursor-not-allowed">
                  <Check size={12}/> 이미 추가됨
                </button>
              ) : (
                <button onClick={() => onAdd(pdf)}
                  className="px-5 py-2 bg-amber-600 text-white rounded-lg text-[12px] font-bold hover:bg-amber-700">
                  이 항목 추가
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ─── 학습 뷰어 미리보기 모달 (운영자가 학습자 화면을 그대로 확인) ─── */
    const LearnerViewerPreviewModal = ({ chapters = [], libraryItems = [], onClose }) => {
      /* 평탄화: 커리큘럼의 슬롯을 순서대로 1D 배열로 */
      const flat = chapters.flatMap(ch =>
        ch.items.map(it => ({ ...it, _chId: ch.id, _chTitle: ch.title }))
      );
      const total = flat.length;
      const findLib = (ref) => libraryItems.find(l => l.id === ref);

      const [idx, setIdx] = useState(0);
      const [tab, setTab] = useState('curriculum'); // 'curriculum' | 'opinion'

      if (total === 0) {
        return (
          <div className="fixed inset-0 bg-slate-900/70 z-[300] flex items-center justify-center p-6 animate-fadeIn" onClick={onClose}>
            <div className="bg-white rounded-2xl p-10 max-w-md text-center" onClick={e => e.stopPropagation()}>
              <Monitor size={28} className="text-slate-300 mx-auto mb-3"/>
              <p className="text-[14px] font-bold text-slate-700 mb-1">미리볼 학습 항목이 없습니다</p>
              <p className="text-[12px] text-slate-400 mb-5">커리큘럼에 항목을 추가한 뒤 다시 시도해 주세요.</p>
              <button onClick={onClose} className="px-5 py-2 bg-slate-100 text-slate-700 rounded-lg text-[13px] font-bold hover:bg-slate-200">닫기</button>
            </div>
          </div>
        );
      }

      const cur = flat[idx];
      const lib = cur.libRef ? findLib(cur.libRef) : null;
      const curMeta = SLOT_TYPES[cur.type] || SLOT_TYPES.video;
      const CurIcon = curMeta.icon;

      /* 슬롯별 메인 본문 렌더 */
      const renderSlotBody = () => {
        if (cur.type === 'video') {
          const videoUrl = lib?.videoUrl || SAMPLE_VIDEO_URL;
          const poster = lib?.posterUrl;
          const skip = cur.cond?.skipPrevention !== false; // 기본 스킵방지 켜짐
          return (
            <div className="relative w-full aspect-video bg-slate-900 rounded-2xl overflow-hidden shadow-md">
              <video src={videoUrl} poster={poster} controls className="w-full h-full object-contain bg-black"/>
              {skip && (
                <span className="absolute bottom-3 right-3 bg-rose-500 text-white px-2 py-1 rounded-md text-[10px] font-bold flex items-center gap-1 shadow">
                  <Lock size={10}/> 스킵 방지
                </span>
              )}
            </div>
          );
        }
        if (cur.type === 'pdf') {
          const url = lib?.fileUrl || SAMPLE_PDF_URL;
          return (
            <div className="w-full bg-slate-100 rounded-2xl overflow-hidden border border-slate-200" style={{ height: '460px' }}>
              <iframe src={url + '#view=FitH&toolbar=1'} title={cur.title} className="w-full h-full border-0"/>
            </div>
          );
        }
        if (cur.type === 'article') {
          if (lib?.content) {
            return (
              <div className="w-full bg-white rounded-2xl border border-slate-200 p-6 overflow-y-auto custom-scrollbar" style={{ maxHeight: '500px' }}>
                {lib.title && <h1 className="text-[20px] font-black text-slate-900 mb-2">{lib.title}</h1>}
                {lib.author && <p className="text-[12px] text-slate-400 mb-4">{lib.author} · {lib.date}</p>}
                <div className="article-content text-[14px] text-slate-700 leading-[1.8]" dangerouslySetInnerHTML={{ __html: lib.content }}/>
              </div>
            );
          }
          return (
            <div className="w-full bg-white rounded-2xl border border-slate-200 p-8 text-center">
              <div className="w-14 h-14 mx-auto bg-amber-100 rounded-2xl flex items-center justify-center mb-4">
                <BookOpen size={26} className="text-amber-600"/>
              </div>
              <p className="text-[13px] text-slate-400 mb-1">읽기 자료</p>
              <h3 className="text-[16px] font-bold text-slate-700">{cur.title}</h3>
              <p className="text-[11px] text-slate-400 mt-3">본문 콘텐츠가 등록되지 않아 학습자에게 텍스트가 표시되지 않습니다.</p>
            </div>
          );
        }
        if (cur.type === 'exam') {
          const passScore = cur.cond?.passScore ?? 60;
          const totalQ = cur.cond?.totalQ ?? 20;
          return (
            <div className="w-full bg-white rounded-2xl border border-slate-200 p-8 text-center">
              <div className="w-14 h-14 mx-auto bg-violet-100 rounded-2xl flex items-center justify-center mb-4">
                <ClipboardList size={26} className="text-violet-600"/>
              </div>
              <p className="text-[13px] text-slate-400 mb-1">학습 평가</p>
              <h3 className="text-[18px] font-bold text-slate-800 mb-6">{cur.title}</h3>
              <div className="inline-flex items-center gap-6 px-6 py-3 bg-slate-50 rounded-xl text-[12px]">
                <span><b className="text-slate-700">{totalQ}</b>문항</span>
                <span className="text-slate-300">|</span>
                <span>합격 <b className="text-violet-600">{passScore}점</b></span>
              </div>
              <button className="mt-6 px-8 py-3 bg-violet-600 text-white rounded-xl text-[13px] font-bold hover:bg-violet-700">시험 시작하기</button>
              <p className="text-[11px] text-slate-400 mt-3">시작 시 자동으로 시간이 측정됩니다.</p>
            </div>
          );
        }
        if (cur.type === 'survey') {
          return (
            <div className="w-full bg-white rounded-2xl border border-slate-200 p-8 text-center">
              <div className="w-14 h-14 mx-auto bg-pink-100 rounded-2xl flex items-center justify-center mb-4">
                <BarChart2 size={26} className="text-pink-600"/>
              </div>
              <p className="text-[13px] text-slate-400 mb-1">학습자 의견 수집</p>
              <h3 className="text-[18px] font-bold text-slate-800 mb-6">{cur.title}</h3>
              <button className="px-8 py-3 bg-pink-600 text-white rounded-xl text-[13px] font-bold hover:bg-pink-700">설문 응답하기</button>
              <p className="text-[11px] text-slate-400 mt-3">전 문항 응답 후 제출 시 이수 완료됩니다.</p>
            </div>
          );
        }
        return (
          <div className="w-full bg-white rounded-2xl border border-slate-200 p-8 text-center text-slate-400 text-[13px]">
            미리보기를 지원하지 않는 항목입니다.
          </div>
        );
      };

      const metaLine = (() => {
        if (cur.type === 'video') return lib?.meta || '재생시간 미정';
        if (cur.type === 'pdf')   return `${lib?.pages ?? '?'} 페이지 · ${lib?.sizeMB ?? '?'} MB`;
        if (cur.type === 'exam')  return `${cur.cond?.totalQ ?? 20}문항 · 합격 ${cur.cond?.passScore ?? 60}점`;
        if (cur.type === 'survey') return '설문 · 익명 응답';
        if (cur.type === 'article') return lib?.readMinutes ? `읽기 ${lib.readMinutes}분` : '읽기 자료';
        return '';
      })();

      const progressPct = total > 1 ? Math.round((idx) / (total - 1) * 100) : 0;

      return (
        <div className="fixed inset-0 bg-slate-900/70 z-[300] flex items-center justify-center animate-fadeIn p-4" onClick={onClose}

          <div className="bg-white rounded-2xl shadow-2xl overflow-hidden w-[1080px] max-w-[96vw] flex flex-col"
            style={{ height: '88vh', maxHeight: '820px' }} onClick={e => e.stopPropagation()}>

            {/* ── 헤더 ── */}
            <div className="flex items-center gap-4 px-6 py-3.5 border-b border-slate-100 shrink-0">

                <div className="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center">
                  <Monitor size={16} className="text-indigo-600"/>
                </div>
                <div className="leading-tight">
                  <h3 id="learner-preview-title" className="text-[14px] font-bold text-slate-800">학습 뷰어 미리보기</h3>
                  <p className="text-[11px] text-slate-400">학습자에게 보이는 화면</p>
                </div>
              </div>
              <div className="flex-1 flex items-center gap-3 max-w-[400px] mx-auto">
                <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-indigo-500 transition-all" style={{ width: `${progressPct}%` }}/>
                </div>
                <span className="text-[12px] font-bold text-slate-500 tabular-nums shrink-0">{idx + 1} / {total}</span>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 shrink-0"><X size={20}/></button>
            </div>

            {/* ── 본문 (course-viewer.html 스타일 통일) ── */}
            <div className="flex-1 flex min-h-0">
              {/* 좌측 메인 */}
              <div className="flex-1 overflow-y-auto custom-scrollbar bg-white min-w-0 flex flex-col">

                {/* 영상 */}
                {cur.type === 'video' && (
                  <>
                    <div className="w-full bg-black">
                      <div className="relative aspect-video w-full max-h-[55vh] mx-auto">
                        <video src={lib?.videoUrl || SAMPLE_VIDEO_URL} poster={lib?.posterUrl} controls playsinline
                          className="absolute inset-0 w-full h-full object-contain bg-black"/>
                        <span className="absolute top-3 right-3 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded pointer-events-none">🔒 스킵 방지</span>
                      </div>
                    </div>
                    <div className="px-6 py-6 border-b border-slate-100 bg-white">
                      <div className="text-xs text-slate-500 mb-1 flex items-center gap-1.5">
                        <span>{cur._chTitle}</span><span>·</span><span>{curMeta.label}</span>
                      </div>
                      <h2 className="text-xl font-black text-slate-900 tracking-tight leading-snug">{cur.title}</h2>
                      {cur.cond?.watchRate && (
                        <p className="text-xs text-slate-500 mt-1">이수 조건 · 시청률 {cur.cond.watchRate}% 이상</p>
                      )}
                    </div>
                  </>
                )}

                {/* 자료(pdf) */}
                {cur.type === 'pdf' && (
                  <div className="px-6 py-10 bg-white flex-1">
                    <div className="max-w-3xl mx-auto">
                      <div className="text-xs text-slate-500 mb-1">{cur._chTitle} · 자료</div>
                      <h2 className="text-2xl font-black text-slate-900 tracking-tight leading-snug mb-6">{cur.title}</h2>
                      <div className="border border-slate-200 rounded-xl overflow-hidden bg-slate-50">
                        <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-200 bg-white">
                          <div className="flex items-center gap-2 text-xs font-bold text-slate-600">
                            <span>📄 {lib?.title || cur.title}</span>
                            {lib?.pages && <span className="text-slate-400">· {lib.pages}p</span>}
                          </div>
                          <a href={lib?.fileUrl || SAMPLE_PDF_URL} download
                            className="text-xs font-bold text-indigo-600 hover:text-indigo-700">↓ 다운로드</a>
                        </div>
                        <iframe src={(lib?.fileUrl || SAMPLE_PDF_URL) + '#view=FitH&toolbar=1'}
                          title={cur.title}
                          className="w-full border-0 bg-white"
                          style={{ height: '520px' }}/>
                      </div>
                      <p className="text-xs text-slate-500 mt-3">정보성 자료 · 수료 영향 없음</p>
                    </div>
                  </div>
                )}

                {/* 시험 */}
                {cur.type === 'exam' && (
                  <div className="px-6 py-10 bg-white flex-1">
                    <div className="max-w-2xl mx-auto">
                      <div className="text-xs text-slate-500 mb-1">{cur._chTitle} · 시험</div>
                      <div className="flex items-center justify-between mb-6">
                        <h2 className="text-xl font-black text-slate-900 tracking-tight">{cur.title}</h2>
                        <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">
                          합격 {cur.cond?.passScore ?? 60}점 / {cur.cond?.totalQ ?? 20}문항
                        </span>
                      </div>
                      <div className="border border-slate-200 rounded-xl p-8 text-center bg-slate-50">
                        <ClipboardList size={28} className="text-violet-500 mx-auto mb-3"/>
                        <p className="text-[13px] text-slate-500 mb-4">전 문항 응답 후 제출 시 채점됩니다.</p>
                        <button className="px-8 py-3 bg-indigo-600 text-white rounded-xl text-[13px] font-bold hover:bg-indigo-700">시험 시작하기</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 설문 */}
                {cur.type === 'survey' && (
                  <div className="px-6 py-10 bg-white flex-1">
                    <div className="max-w-2xl mx-auto">
                      <div className="text-xs text-slate-500 mb-1">{cur._chTitle} · 설문</div>
                      <h2 className="text-xl font-black text-slate-900 tracking-tight mb-6">{cur.title}</h2>
                      <div className="border border-slate-200 rounded-xl p-8 text-center bg-slate-50">
                        <BarChart2 size={28} className="text-pink-500 mx-auto mb-3"/>
                        <p className="text-[13px] text-slate-500 mb-4">전 문항 응답 후 제출 완료됩니다.</p>
                        <button className="px-8 py-3 bg-indigo-600 text-white rounded-xl text-[13px] font-bold hover:bg-indigo-700">설문 응답하기</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 아티클 (UI 비노출 항목, 데이터 보존 케이스만) */}
                {cur.type === 'article' && (
                  <div className="px-6 py-10 bg-white flex-1">
                    <div className="max-w-3xl mx-auto">
                      <div className="text-xs text-slate-500 mb-1">{cur._chTitle} · 아티클</div>
                      <h2 className="text-2xl font-black text-slate-900 tracking-tight leading-snug mb-6">{cur.title}</h2>
                      {lib?.content ? (
                        <div className="article-content text-[14px] text-slate-700 leading-[1.8]" dangerouslySetInnerHTML={{ __html: lib.content }}/>
                      ) : (
                        <p className="text-[12px] text-slate-400">본문 콘텐츠가 등록되지 않았습니다.</p>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* 우측 사이드바 — course-viewer 카드 그룹 패턴 */}
              <aside className="w-[300px] border-l border-slate-200 bg-slate-50/60 flex flex-col shrink-0">
                {/* 탭 — 시험·설문은 의견 탭 미지원이라 비노출 */}
                {(() => {
                  const supportsCommunity = cur.type !== 'exam' && cur.type !== 'survey';
                  const tabs = supportsCommunity
                    ? [{ id: 'curriculum', label: '커리큘럼' }, { id: 'opinion', label: '의견' }]
                    : [{ id: 'curriculum', label: '커리큘럼' }];
                  return (
                    <div className="flex px-4 border-b border-slate-200 bg-white shrink-0">
                      {tabs.map(t => (
                        <button key={t.id} onClick={() => setTab(t.id)}
                          className={`py-3 px-3 text-sm transition-all border-b-2
                            ${tab === t.id ? 'font-black text-slate-900 border-indigo-900' : 'font-bold text-slate-500 border-transparent hover:text-slate-800'}`}>
                          {t.label}
                        </button>
                      ))}
                    </div>
                  );
                })()}

                {(tab === 'curriculum' || cur.type === 'exam' || cur.type === 'survey') ? (
                  <div className="flex-1 overflow-y-auto custom-scrollbar py-2">
                    {chapters.map((ch, chIdx) => {
                      const isMat = (it) => it.type === 'pdf';
                      const learnable = ch.items.filter(it => !isMat(it));
                      const reqTotal = learnable.filter(it => it.isRequired).length;
                      const materialCount = ch.items.filter(isMat).length;
                      return (
                        <div key={ch.id} className="bg-white border border-slate-200 rounded-xl mx-3 my-2.5 overflow-hidden">
                          <header className="px-4 pt-3.5 pb-2.5 flex items-center gap-2.5 bg-slate-50/40 border-b border-slate-100">
                            <div className="w-7 h-7 bg-slate-900 text-white rounded-lg flex items-center justify-center text-[11px] font-black shrink-0">{String(chIdx+1).padStart(2,'0')}</div>
                            <div className="flex-1 min-w-0">
                              <h3 className="text-[12px] font-black text-slate-900 truncate">{ch.title}</h3>
                              <p className="text-[10px] text-slate-500 font-medium mt-0.5">
                                학습 {learnable.length}개{reqTotal > 0 ? ` · 필수 ${reqTotal}` : ''}{materialCount > 0 ? ` · 자료 ${materialCount}` : ''}
                              </p>
                            </div>
                          </header>
                          {ch.items.map(item => {
                            const itIdx = flat.findIndex(x => x.id === item.id);
                            const active = itIdx === idx;
                            const M = SLOT_TYPES[item.type] || SLOT_TYPES.video;
                            const ItIcon = M.icon;

                            if (isMat(item)) {
                              return (
                                <div key={item.id} onClick={() => setIdx(itIdx)}
                                  className={`flex items-center gap-2.5 py-2 px-4 border-t border-slate-100 hover:bg-slate-50 cursor-pointer ${active ? 'bg-indigo-50/40' : ''}`}>
                                  <span className="text-slate-400 text-[14px] shrink-0">📎</span>
                                  <div className="flex-1 min-w-0">
                                    <h4 className={`text-[12px] font-bold truncate ${active ? 'text-indigo-900' : 'text-slate-600'}`}>{item.title}</h4>
                                    <p className="text-[10px] text-slate-400 mt-0.5">자료</p>
                                  </div>
                                </div>
                              );
                            }

                            return (
                              <div key={item.id} onClick={() => setIdx(itIdx)}
                                className={`flex items-center justify-between py-2.5 px-4 border-t border-slate-100 hover:bg-slate-50 cursor-pointer ${active ? 'bg-indigo-50/40' : ''}`}>
                                <div className="flex-1 pr-3 min-w-0">
                                  <h4 className={`text-[12.5px] font-bold mb-0.5 truncate ${active ? 'text-indigo-900' : 'text-slate-800'}`}>{item.title}</h4>
                                  <div className="flex items-center gap-1.5 text-[11px] text-slate-500 font-medium flex-wrap">
                                    <span className="inline-flex items-center gap-1"><ItIcon size={10}/> {M.label}</span>
                                    {item.isRequired && <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-1.5 py-0.5 rounded">필수</span>}
                                  </div>
                                </div>
                                <div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 ${active ? 'bg-indigo-600' : 'border-2 border-slate-300'}`}>
                                  {active && <div className="w-1.5 h-1.5 bg-white rounded-full"/>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  /* 의견 탭 — 항목 단위 분리, course-viewer 패턴 */
                  <div className="flex-1 overflow-y-auto custom-scrollbar">
                    <div className="p-4 border-b border-slate-200 bg-indigo-50/30">
                      <p className="text-[10px] font-bold text-indigo-600 tracking-widest mb-1">현재 학습 항목</p>
                      <p className="text-sm font-black text-slate-900 truncate">{cur.title}</p>
                    </div>
                    {cur.community?.enabled ? (
                      <>
                        <div className="p-4 border-b border-slate-200 bg-white">
                          <div className="flex gap-2">
                            <div className="w-8 h-8 rounded-full bg-slate-200 shrink-0"></div>
                            <input type="text" placeholder="의견을 남겨보세요..."
                              className="flex-1 bg-slate-50 border border-slate-200 rounded-full px-4 text-xs focus:outline-none focus:border-indigo-400"/>
                          </div>
                        </div>

                          <div className="text-2xl mb-2 opacity-40">💬</div>
