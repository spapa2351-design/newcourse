<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블렌디드 코스 등록 — 단순 빌더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard"', '"Roboto"', '"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', 'Arial', 'sans-serif'],
          },
          colors: {
            indigo: {
              50: '#EEF0FF', 100: '#E0E4FF', 200: '#C7CDFF', 300: '#9BA8FF',
              400: '#7B8AFF', 500: '#5569FF', 600: '#4454CC', 700: '#3340A6',
              800: '#2A3587', 900: '#000C57', 950: '#000940',
            },
          },
          fontSize: {
            xs: ['13px', { lineHeight: '1.5' }],
            sm: ['15px', { lineHeight: '1.5' }],
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-[#f2f5f9] text-slate-800 font-sans antialiased min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0';

    const {
      Plus, Trash2, ChevronUp, ChevronDown, X,
      Video, Building2, Layers, Send, Info, GripVertical,
      Shield, Lock, AlertTriangle, GitBranch, FileQuestion, FileText,
      ClipboardList, Settings, Zap, Library, Link2, Calendar, ArrowRight
    } = Lucide;

    const ALL_GROUPS = [
      { id: 'g_all',    name: '전직원',     count: 1247 },
      { id: 'g_dev',    name: '개발팀',     count: 142 },
      { id: 'g_design', name: '디자인팀',   count: 28 },
      { id: 'g_lead',   name: '팀장급',     count: 67 },
      { id: 'g_new',    name: '신입',       count: 35 },
    ];

    const ASSET_LIBRARY = {
      a1: { id: 'a1', type: 'offline', name: '실습 워크숍',         eligibility: ['g_dev'] },
      a2: { id: 'a2', type: 'offline', name: '팀장 리더십 토론',     eligibility: ['g_lead'] },
      a3: { id: 'a3', type: 'offline', name: '현장 출석 체크',       eligibility: [] },
    };

    const ITEM_TYPES = {
      video:   { label: '영상',     short: 'VIDEO',   color: 'emerald', Icon: Video,         defaultCond: '진도율 100% · 스킵 방지 ON' },
      exam:    { label: '시험',     short: 'EXAM',    color: 'rose',    Icon: FileQuestion,  defaultCond: '합격 점수 60점' },
      article: { label: '아티클',   short: 'ARTICLE', color: 'sky',     Icon: FileText,      defaultCond: '읽음 확인' },
      survey:  { label: '설문',     short: 'SURVEY',  color: 'violet',  Icon: ClipboardList, defaultCond: '제출' },
      offline: { label: '오프라인', short: 'OFFLINE', color: 'amber',   Icon: Building2,     defaultCond: '출석' },
    };

    const COLOR_CL = {
      emerald: { bgSoft: 'bg-emerald-100', border: 'border-emerald-200', text: 'text-emerald-700' },
      rose:    { bgSoft: 'bg-rose-100',    border: 'border-rose-200',    text: 'text-rose-700' },
      sky:     { bgSoft: 'bg-sky-100',     border: 'border-sky-200',     text: 'text-sky-700' },
      violet:  { bgSoft: 'bg-violet-100',  border: 'border-violet-200',  text: 'text-violet-700' },
      amber:   { bgSoft: 'bg-amber-100',   border: 'border-amber-200',   text: 'text-amber-700' },
    };

    const initialChapters = [
      { id: 'ch1', title: '오리엔테이션 및 기초 학습', items: [
        { id: 'i1', type: 'video',   title: '2025년 기업문화 핵심가치', required: true, meta: { duration: '45:20' }, cond: '진도율 100% · 스킵 방지 ON' },
        { id: 'i2', type: 'video',   title: '직장 내 성희롱 예방 교육', required: true, meta: { duration: '60:00' }, cond: '진도율 100% · 스킵 방지 ON' },
        { id: 'i3', type: 'exam',    title: '신입사원 OJT 최종 평가',  required: true, meta: { totalQ: 20 },        cond: '합격 점수 60점 이상' },
      ]},
      { id: 'ch2', title: '현장 실습 및 네트워킹', items: [
        { id: 'i4', type: 'offline', title: '실습 워크숍', required: true, assetId: 'a1', cond: '출석' },
      ]},
    ];

    const GroupPicker = ({ selected, onChange, parentSelected, color = 'indigo', placeholder = '전체 공개', size = 'md' }) => {
      const [open, setOpen] = useState(false);
      const cl = color === 'indigo'
        ? { bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-700', hover: 'hover:bg-indigo-50' }
        : { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', hover: 'hover:bg-amber-50' };
      const selectedGroups = ALL_GROUPS.filter(g => selected.includes(g.id));
      const availForChild = parentSelected && parentSelected.length > 0 ? ALL_GROUPS.filter(g => parentSelected.includes(g.id)) : ALL_GROUPS;
      const available = availForChild.filter(g => !selected.includes(g.id));
      const toggle = (id) => selected.includes(id) ? onChange(selected.filter(s => s !== id)) : onChange([...selected, id]);
      const padding = size === 'sm' ? 'p-1' : 'p-1.5';
      const minH = size === 'sm' ? 'min-h-[28px]' : 'min-h-[34px]';

      return (
        <div className="relative">
          <div onClick={() => setOpen(!open)}
            className={`border ${cl.border} rounded-md ${padding} flex items-center justify-between bg-white cursor-pointer hover:border-${color}-400 transition-colors ${minH}`}>
            <div className="flex flex-wrap gap-1 flex-1">
              {selectedGroups.length === 0 ? (
                <span className="text-[11px] text-slate-400 px-1">{placeholder}</span>
              ) : (
                selectedGroups.map(g => (
                  <span key={g.id} className={`flex items-center gap-1 ${cl.bg} border ${cl.border} ${cl.text} px-1.5 py-0.5 rounded text-[11px] font-bold`}>
                    {g.name}
                    <button onClick={e => { e.stopPropagation(); toggle(g.id); }} className="text-slate-400 hover:text-red-500"><X size={9}/></button>
                  </span>
                ))
              )}
            </div>
            <ChevronDown size={11} className={`text-slate-400 transition-transform shrink-0 ml-1 ${open ? 'rotate-180' : ''}`}/>
          </div>
          {open && (
            <div className="absolute z-30 top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-xl py-1 max-h-44 overflow-y-auto custom-scrollbar">
              {available.length === 0 && (
                <div className="px-3 py-2 text-[11px] text-slate-400 text-center">
                  {parentSelected && parentSelected.length > 0 ? '코스 자격 내 추가 그룹 없음' : '추가할 그룹 없음'}
                </div>
              )}
              {available.map(g => (
                <button key={g.id} onClick={() => toggle(g.id)} className={`w-full text-left px-3 py-1.5 text-[11px] ${cl.hover} flex items-center justify-between`}>
                  <span className="font-bold text-slate-700">{g.name}</span>
                  <span className="text-slate-400">{g.count}명</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [chapters, setChapters] = useState(initialChapters);
      const [collapsedCh, setCollapsedCh] = useState({});
      const [enrollMode, setEnrollMode] = useState('self');
      const [courseEligibility, setCourseEligibility] = useState(['g_all']);
      const [showAddItemFor, setShowAddItemFor] = useState(null);
      const [assetLib, setAssetLib] = useState(ASSET_LIBRARY);

      const updateAssetEligibility = (assetId, val) => setAssetLib(p => ({ ...p, [assetId]: { ...p[assetId], eligibility: val } }));

      const allItems = chapters.flatMap(ch => ch.items);
      const offlineItems = allItems.filter(it => it.type === 'offline');
      const courseEligIds = new Set(courseEligibility);
      const violatingItems = offlineItems.filter(it => {
        const a = assetLib[it.assetId];
        if (!a || a.eligibility.length === 0) return false;
        return !a.eligibility.every(e => courseEligIds.has(e));
      });

      const addChapter = () => setChapters(p => [...p, { id: 'ch'+Date.now(), title: `새 커리큘럼 ${p.length+1}`, items: [] }]);
      const removeChapter = (id) => setChapters(p => p.filter(c => c.id !== id));
      const updateChapter = (id, key, val) => setChapters(p => p.map(c => c.id === id ? { ...c, [key]: val } : c));
      const toggleChCollapse = (id) => setCollapsedCh(p => ({ ...p, [id]: !p[id] }));

      const addItem = (chId, type) => {
        const id = 'i' + Date.now();
        const meta = type === 'video' ? { duration: '0:00' } : type === 'exam' ? { totalQ: 10 } : {};
        const newItem = { id, type, title: `새 ${ITEM_TYPES[type].label}`, required: true, meta, cond: ITEM_TYPES[type].defaultCond };
        if (type === 'offline') newItem.assetId = null;
        setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: [...ch.items, newItem] } : ch));
        setShowAddItemFor(null);
      };
      const removeItem = (chId, itId) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.filter(i => i.id !== itId) } : ch));
      const updateItem = (chId, itId, changes) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.map(i => i.id === itId ? { ...i, ...changes } : i) } : ch));
      const linkAsset = (chId, itId, assetId) => updateItem(chId, itId, { assetId, title: assetLib[assetId]?.name || '오프라인' });

      return (
        <div className="flex justify-center px-6 py-6 min-h-screen">
          <div className="w-full max-w-[760px] space-y-4">

            {/* 헤더 */}
            <div className="bg-white border border-slate-200 rounded-2xl p-4 flex items-center gap-3" style={{boxShadow:'0px 4px 12px rgba(159,162,191,.12)'}}>
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shrink-0">
                <GitBranch size={18} className="text-white"/>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <h1 className="text-[16px] font-black text-slate-900">블렌디드 코스 등록</h1>
                  <span className="text-[10px] font-bold text-indigo-700 bg-indigo-100 border border-indigo-200 px-2 py-0.5 rounded-full">type: blended</span>
                </div>
                <p className="text-[11px] text-slate-500">온라인 빌더 베이스 + 항목 타입에 OFFLINE 추가. 차수·회차는 발행 후 운영 페이지에서.</p>
              </div>
            </div>

            {/* 자격 + 등록 방식 (간단) */}
            <div className="bg-white border border-slate-200 rounded-2xl p-4 space-y-3" style={{boxShadow:'0px 4px 12px rgba(159,162,191,.12)'}}>
              <div className="flex items-center gap-2">
                <Shield size={13} className="text-slate-700"/>
                <h2 className="text-[13px] font-black text-slate-800">자격 · 수강 등록</h2>
                {violatingItems.length > 0 && (
                  <span className="text-[10px] font-bold text-red-600 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded ml-auto flex items-center gap-1"><AlertTriangle size={9}/>{violatingItems.length}개 자격 위반</span>
                )}
              </div>

              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => setEnrollMode('self')}
                  className={`p-2.5 rounded-lg border-2 text-left transition-all ${enrollMode === 'self' ? 'border-indigo-400 bg-indigo-50' : 'border-slate-200 hover:border-slate-300'}`}>
                  <div className="flex items-center gap-1.5">
                    <div className={`w-3 h-3 rounded-full border-2 ${enrollMode === 'self' ? 'border-indigo-500 bg-indigo-500' : 'border-slate-300'}`}/>
                    <span className="text-[12px] font-bold text-slate-800">자율 신청</span>
                  </div>
                </button>
                <button onClick={() => setEnrollMode('forced')}
                  className={`p-2.5 rounded-lg border-2 text-left transition-all ${enrollMode === 'forced' ? 'border-indigo-400 bg-indigo-50' : 'border-slate-200 hover:border-slate-300'}`}>
                  <div className="flex items-center gap-1.5">
                    <div className={`w-3 h-3 rounded-full border-2 ${enrollMode === 'forced' ? 'border-indigo-500 bg-indigo-500' : 'border-slate-300'}`}/>
                    <span className="text-[12px] font-bold text-slate-800">강제 배정</span>
                  </div>
                </button>
              </div>

              <div>
                <div className="flex items-center gap-1.5 mb-1.5">
                  <Lock size={10} className="text-indigo-600"/>
                  <span className="text-[10px] font-black text-indigo-700 bg-indigo-50 border border-indigo-200 px-1.5 py-0.5 rounded">L1</span>
                  <span className="text-[11px] font-bold text-slate-700">코스 등록 자격</span>
                  <span className="text-[10px] text-slate-400 ml-auto">자산 자격(L2)은 OFFLINE 항목마다 따로</span>
                </div>
                <GroupPicker selected={courseEligibility} onChange={setCourseEligibility} color="indigo" placeholder="전체 공개"/>
              </div>
            </div>

            {/* 커리큘럼 매니저 */}
            <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden" style={{boxShadow:'0px 4px 12px rgba(159,162,191,.12)'}}>
              <div className="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
                <Layers size={14} className="text-slate-700"/>
                <h2 className="text-[13px] font-black text-slate-800">커리큘럼 매니저</h2>
                <span className="text-[10px] text-slate-500">챕터 → 항목</span>
                <button className="ml-auto flex items-center gap-1 text-[10px] font-bold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 px-2 py-1 rounded-lg">
                  <Zap size={10}/> 퀵 업로드
                </button>
              </div>

              <div className="p-4 space-y-3 bg-slate-50">
                {chapters.map((ch, chIdx) => {
                  const isCh = !!collapsedCh[ch.id];
                  const chNum = String(chIdx + 1).padStart(2, '0');
                  return (
                    <div key={ch.id} className="bg-white border border-slate-200 rounded-xl overflow-hidden">
                      <div className="px-3 py-2.5 bg-gradient-to-r from-slate-50 to-white border-b border-slate-100 flex items-center gap-2">
                        <div className="w-8 h-8 bg-slate-900 text-white rounded-lg flex items-center justify-center text-[11px] font-black tabular-nums shrink-0">{chNum}</div>
                        <input value={ch.title} onChange={e => updateChapter(ch.id, 'title', e.target.value)}
                          className="flex-1 text-[13px] font-black text-slate-800 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-indigo-400 outline-none px-1 min-w-0"/>
                        <span className="text-[10px] font-bold text-slate-500 bg-white border border-slate-200 rounded-full w-6 h-6 flex items-center justify-center">{ch.items.length}</span>
                        <button onClick={() => setShowAddItemFor(showAddItemFor === ch.id ? null : ch.id)} className="p-1.5 rounded text-slate-500 hover:text-indigo-600 hover:bg-indigo-50"><Plus size={12}/></button>
                        <button onClick={() => toggleChCollapse(ch.id)} className="p-1.5 rounded text-slate-500 hover:text-slate-700 hover:bg-slate-100">{isCh ? <ChevronDown size={12}/> : <ChevronUp size={12}/>}</button>
                        <button onClick={() => removeChapter(ch.id)} className="p-1.5 rounded text-slate-400 hover:text-red-500 hover:bg-red-50"><Trash2 size={11}/></button>
                      </div>

                      {showAddItemFor === ch.id && (
                        <div className="px-3 py-2 bg-indigo-50 border-b border-indigo-100 flex flex-wrap gap-1.5 animate-fadeIn">
                          <span className="text-[10px] font-bold text-indigo-700 self-center mr-1">새 항목:</span>
                          {Object.entries(ITEM_TYPES).map(([t, spec]) => {
                            const cl = COLOR_CL[spec.color];
                            const Icon = spec.Icon;
                            return (
                              <button key={t} onClick={() => addItem(ch.id, t)}
                                className={`flex items-center gap-1 ${cl.bgSoft} ${cl.border} border ${cl.text} px-2 py-1 rounded-md text-[10px] font-bold hover:scale-105 transition-transform`}>
                                <Icon size={10}/> {spec.label}
                              </button>
                            );
                          })}
                        </div>
                      )}

                      {!isCh && (
                        <div className="p-3 space-y-2">
                          {ch.items.length === 0 && (
                            <div className="border-2 border-dashed border-slate-200 rounded-lg py-6 text-center bg-slate-50">
                              <Plus size={18} className="text-slate-300 mx-auto mb-1"/>
                              <p className="text-[11px] text-slate-400 mb-2">학습 항목이 없습니다</p>
                              <button onClick={() => setShowAddItemFor(ch.id)} className="text-[10px] font-bold text-indigo-600 bg-white border border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50">
                                <Link2 size={9} className="inline mr-1"/> 항목 매핑
                              </button>
                            </div>
                          )}

                          {ch.items.map((it) => {
                            const spec = ITEM_TYPES[it.type];
                            const cl = COLOR_CL[spec.color];
                            const Icon = spec.Icon;
                            const isOffline = it.type === 'offline';
                            const asset = isOffline && it.assetId ? assetLib[it.assetId] : null;
                            const assetElig = asset?.eligibility || [];
                            const violating = isOffline && asset && assetElig.length > 0 && !assetElig.every(e => courseEligIds.has(e));
                            return (
                              <div key={it.id} className={`border rounded-lg overflow-hidden ${violating ? 'border-red-300 bg-red-50/30' : 'border-slate-200 bg-white'}`}>
                                <div className="px-3 py-2.5 flex items-center gap-2">
                                  <GripVertical size={12} className="text-slate-300 shrink-0"/>
                                  <div className={`w-7 h-7 rounded-lg ${cl.bgSoft} ${cl.border} border flex items-center justify-center shrink-0`}>
                                    <Icon size={13} className={cl.text}/>
                                  </div>
                                  <div className="flex-1 min-w-0">
                                    <input value={it.title} onChange={e => updateItem(ch.id, it.id, { title: e.target.value })}
                                      className="w-full text-[12px] font-bold text-slate-800 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-indigo-400 outline-none px-0.5 min-w-0"/>
                                    <div className="flex items-center gap-1.5 mt-0.5">
                                      <span className={`text-[9px] font-black ${cl.text} tabular-nums`}>{spec.short}</span>
                                      {it.meta?.duration && <span className="text-[9px] text-slate-400">· {it.meta.duration}</span>}
                                      {it.meta?.totalQ && <span className="text-[9px] text-slate-400">· {it.meta.totalQ}문항</span>}
                                      {asset && <span className="text-[9px] text-slate-400">· OFFLINE SESSION LINKED</span>}
                                    </div>
                                  </div>
                                  <button onClick={() => updateItem(ch.id, it.id, { required: !it.required })}
                                    className={`text-[10px] font-bold px-2 py-1 rounded shrink-0 transition-colors ${it.required ? 'bg-indigo-500 text-white hover:bg-indigo-600' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}>
                                    {it.required ? '필수' : '선택'}
                                  </button>
                                  <button onClick={() => removeItem(ch.id, it.id)} className="p-1 text-slate-400 hover:text-red-500 shrink-0"><X size={12}/></button>
                                </div>

                                <div className="px-3 py-2 bg-slate-50/60 border-t border-slate-100 space-y-1.5">
                                  <div className="flex items-center gap-2">
                                    <span className="text-[10px] font-black text-slate-600 bg-white border border-slate-200 px-1.5 py-0.5 rounded shrink-0">이수 조건</span>
                                    <span className="text-[10px] text-slate-600 flex-1 truncate">{it.cond}</span>
                                    <button className="text-slate-400 hover:text-slate-700 shrink-0"><Settings size={10}/></button>
                                  </div>

                                  {isOffline && (
                                    <div className="space-y-1.5 pt-1.5 border-t border-slate-200">
                                      <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-black text-amber-700 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded shrink-0 flex items-center gap-0.5"><Library size={9}/> 자산</span>
                                        {asset ? (
                                          <span className="text-[10px] text-slate-700 font-bold flex-1 truncate">{asset.name}</span>
                                        ) : (
                                          <span className="text-[10px] text-slate-400 italic flex-1">자산 미연결</span>
                                        )}
                                        <select value={it.assetId || ''} onChange={e => linkAsset(ch.id, it.id, e.target.value)}
                                          className="text-[10px] border border-slate-200 rounded px-1 py-0.5 bg-white outline-none">
                                          <option value="">자산 선택</option>
                                          {Object.values(assetLib).filter(a => a.type === 'offline').map(a => (
                                            <option key={a.id} value={a.id}>{a.name}</option>
                                          ))}
                                        </select>
                                      </div>
                                      {asset && (
                                        <div className="flex items-start gap-2">
                                          <span className="text-[10px] font-black text-amber-700 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded shrink-0 mt-0.5">L2</span>
                                          <div className="flex-1">
                                            <GroupPicker selected={asset.eligibility} onChange={(v) => updateAssetEligibility(asset.id, v)}
                                              parentSelected={courseEligibility} color="amber" size="sm"
                                              placeholder="코스 등록자 전원"/>
                                          </div>
                                          {violating && <span className="text-[9px] font-bold text-red-600 bg-red-50 border border-red-200 px-1 py-0.5 rounded shrink-0 mt-0.5 flex items-center gap-0.5"><AlertTriangle size={8}/>위반</span>}
                                        </div>
                                      )}
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}

                <button onClick={addChapter} className="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-[12px] font-bold text-slate-500 hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 flex items-center justify-center gap-1.5">
                  <Plus size={13}/> 새 커리큘럼 추가
                </button>
              </div>
            </div>

            {/* 발행 안내 */}
            <div className="bg-indigo-50 border border-indigo-200 rounded-2xl p-4 flex items-start gap-3">
              <Calendar size={14} className="text-indigo-600 mt-0.5 shrink-0"/>
              <div className="text-[11px] text-indigo-800 leading-relaxed flex-1">
                <strong className="text-indigo-900 block mb-0.5">차수·회차는 발행 후 운영 페이지에서</strong>
                코스 발행 시 <strong>1기 차수</strong>가 자동 생성됩니다. 회차 일정·정원·명단은 운영 페이지(수강관리)에서 채워주세요.
                추가 차수(2기, 3기...)도 운영 페이지에서 늘립니다.
              </div>
              <ArrowRight size={13} className="text-indigo-600 shrink-0 mt-0.5"/>
            </div>

            {/* 발행 버튼 */}
            <div className="bg-white border border-slate-200 rounded-2xl p-4 flex gap-2" style={{boxShadow:'0px 4px 12px rgba(159,162,191,.12)'}}>
              <button className="flex items-center justify-center gap-1.5 bg-white border-2 border-slate-300 text-slate-600 py-3 px-4 rounded-xl font-bold hover:border-indigo-400 hover:text-indigo-600 text-[12px] shrink-0">
                임시 저장
              </button>
              <button disabled={violatingItems.length > 0}
                className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-[14px] ${violatingItems.length > 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-[#5c66f2] text-white hover:bg-[#4a54e1]'}`}
                style={violatingItems.length > 0 ? {} : {boxShadow:'0 4px 12px rgba(92,102,242,0.3)'}}>
                <Send size={14}/> {violatingItems.length > 0 ? '자격 위반 해결 후 퍼블리싱' : '코스 퍼블리싱'}
              </button>
            </div>

            <div className="text-center text-[10px] text-slate-400 pb-4">
              <Info size={9} className="inline mr-1"/>
              빌더 = 콘텐츠 정의 / 운영 페이지 = 차수·회차·명단·출석. 책임 분리.
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
