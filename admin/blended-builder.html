                        </div>
                      </>
                    ) : (
                      <div className="p-8 text-center">
                        <div className="text-2xl mb-2 opacity-30">💬</div>
                        <p className="text-sm font-bold text-slate-600 mb-1">이 항목은 의견 기능이 꺼져 있습니다</p>
                        <p className="text-xs text-slate-400 leading-relaxed">운영자가 이 항목에 의견 기능을 사용하지 않도록 설정했습니다.</p>
                      </div>
                    )}
                  </div>
                )}
              </aside>
            </div>

            {/* ── 푸터 ── */}
            <div className="flex items-center justify-between px-6 py-3 border-t border-slate-100 shrink-0 bg-white">
              <button onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0}
                className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-[13px] font-bold transition-colors
                  ${idx === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-100'}`}>
                <ArrowLeft size={14}/> 이전
              </button>
              <div className="flex items-center gap-1.5">
                {flat.map((_, i) => (
                  <button key={i} onClick={() => setIdx(i)}
                    className={`rounded-full transition-all
                      ${i === idx ? 'w-6 h-1.5 bg-indigo-500' : 'w-1.5 h-1.5 bg-slate-300 hover:bg-slate-400'}`}
                    aria-label={`항목 ${i + 1}`}/>
                ))}
              </div>
              {idx < total - 1 ? (
                <button onClick={() => setIdx(i => Math.min(total - 1, i + 1))}
                  className="flex items-center gap-1.5 px-5 py-2 bg-indigo-600 text-white rounded-lg text-[13px] font-bold hover:bg-indigo-700">
                  다음 <ChevronRight size={14}/>
                </button>
              ) : (
                <button onClick={onClose}
                  className="flex items-center gap-1.5 px-5 py-2 bg-emerald-600 text-white rounded-lg text-[13px] font-bold hover:bg-emerald-700">
                  <Check size={14}/> 미리보기 종료
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* 툴바 공통 버튼 */
    const ToolbarBtn = ({ children, onClick, highlight }) => (
      <button type="button" onMouseDown={e => e.preventDefault()} onClick={onClick}
        className={`flex items-center gap-1 px-2 py-1 rounded text-[12px] font-bold transition-colors
          ${highlight ? 'text-indigo-600 hover:bg-indigo-50' : 'text-slate-600 hover:bg-white hover:text-slate-900'}`}>
        {children}
      </button>
    );
    const ToolbarSep = () => <div className="w-px h-4 bg-slate-200 mx-0.5"/>;

    /* ─── 새 아티클 만들기 모달 (풀스크린 · 블록 기반 · 사이드바) ─── */
    const BLOCK_TYPES = [
      { group: '기본 블록', type: 'p',     label: '텍스트',       desc: '일반 텍스트를 작성하세요.',  icon: 'T' },
      { group: '기본 블록', type: 'h2',    label: '섹션 제목',    desc: '중간 크기의 제목입니다.',    icon: 'H2' },
      { group: '기본 블록', type: 'ul',    label: '글머리 기호',  desc: '간단한 목록을 만듭니다.',    icon: '•' },
      { group: '미디어',   type: 'image', label: '이미지',       desc: '이미지를 업로드합니다.',      icon: '🖼' },
    ];

    const newBlockId = () => 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const createBlock = (type) => {
      if (type === 'ul')    return { id: newBlockId(), type: 'ul', items: [''] };
      if (type === 'image') return { id: newBlockId(), type: 'image', dataUrl: null };
      return { id: newBlockId(), type, content: '' };
    };

    const ArticleBlockRow = ({ block, isFirst, onUpdate, onRemove, onAddAfter, onDragStart, onDragOver, onDragEnd, onDrop, isDragOver }) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const fileInputRef = useRef(null);

      const handleImageFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5*1024*1024) { alert('이미지는 5MB 이하여야 합니다.'); e.target.value=''; return; }
        const r = new FileReader();
        r.onload = ev => { onUpdate({ dataUrl: ev.target.result }); };
        r.readAsDataURL(file);
        e.target.value = '';
      };

      // 텍스트/H2 placeholder
      const placeholder =
        block.type === 'h2' ? '섹션 제목을 입력하세요'
        : block.type === 'p' ? (isFirst ? '여기에 내용을 입력하세요. 마우스를 올리면 좌측에 + 버튼이 나타납니다.' : '내용 입력 또는 좌측 + 로 블록 추가')
        : '';

      return (
        <div
          className={`group relative flex items-start gap-2 py-1 transition-all
            ${isDragOver ? 'border-l-2 border-indigo-500 pl-2' : ''}`}
          onDragOver={onDragOver}
          onDrop={onDrop}>
          {/* 좌측 핸들 — hover 시 표시 */}
          <div className="flex items-center gap-0.5 pt-1.5 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
            <button onClick={() => setMenuOpen(o => !o)}
              className="w-6 h-6 rounded hover:bg-slate-100 text-slate-400 hover:text-indigo-600 flex items-center justify-center"
              title="블록 추가">
              <Plus size={14}/>
            </button>
            <button
              draggable
              onDragStart={onDragStart}
              onDragEnd={onDragEnd}
              className="w-5 h-6 rounded hover:bg-slate-100 text-slate-400 hover:text-slate-700 flex items-center justify-center cursor-grab active:cursor-grabbing"
              title="드래그하여 순서 변경">
              <GripVertical size={14}/>
            </button>
          </div>

          {/* 블록 본문 */}
          <div className="flex-1 min-w-0">
            {block.type === 'p' && (
              <div
                contentEditable
                suppressContentEditableWarning
                onInput={e => onUpdate({ content: e.currentTarget.innerHTML })}
                onBlur={e => onUpdate({ content: e.currentTarget.innerHTML })}
                className="article-blockrow-text text-[15px] text-slate-700 leading-[1.75] outline-none py-1 empty-placeholder"
                data-placeholder={placeholder}
                dangerouslySetInnerHTML={{ __html: block.content || '' }}
              />
            )}
            {block.type === 'h2' && (
              <div
                contentEditable
                suppressContentEditableWarning
                onInput={e => onUpdate({ content: e.currentTarget.innerHTML })}
                onBlur={e => onUpdate({ content: e.currentTarget.innerHTML })}
                className="article-blockrow-h2 text-[20px] font-black text-slate-900 leading-snug outline-none py-1 empty-placeholder"
                data-placeholder={placeholder}
                dangerouslySetInnerHTML={{ __html: block.content || '' }}
              />
            )}
            {block.type === 'ul' && (
              <ul className="list-disc pl-6 space-y-1">
                {block.items.map((it, idx) => (
                  <li key={idx} className="text-[15px] text-slate-700 leading-[1.75]">
                    <input
                      type="text"
                      value={it}
                      onChange={e => onUpdate({ items: block.items.map((x, i) => i === idx ? e.target.value : x) })}
                      onKeyDown={e => {
                        if (e.key === 'Enter') {
                          e.preventDefault();
                          onUpdate({ items: [...block.items.slice(0, idx+1), '', ...block.items.slice(idx+1)] });
                          // focus next item after render
                          setTimeout(() => {
                            const inputs = e.target.closest('ul').querySelectorAll('input');
                            inputs[idx+1]?.focus();
                          }, 0);
                        }
                        if (e.key === 'Backspace' && it === '' && block.items.length > 1) {
                          e.preventDefault();
                          onUpdate({ items: block.items.filter((_,i) => i !== idx) });
                        }
                      }}
                      placeholder={idx === 0 ? '목록 항목 (Enter로 새 항목 추가)' : ''}
                      className="w-full bg-transparent outline-none placeholder:text-slate-300"
                    />
                  </li>
                ))}
              </ul>
            )}
            {block.type === 'image' && (
              <>
                <input ref={fileInputRef} type="file" accept="image/jpeg,image/png,image/gif" onChange={handleImageFile} className="hidden"/>
                {block.dataUrl ? (
                  <div className="relative group/img">
                    <img src={block.dataUrl} alt="" className="max-w-full rounded-lg"/>
                    <button onClick={() => onUpdate({ dataUrl: null })}
                      className="absolute top-2 right-2 px-3 py-1 bg-white/90 hover:bg-white text-slate-700 text-[11px] font-bold rounded-md shadow opacity-0 group-hover/img:opacity-100 transition-opacity">
                      이미지 변경
                    </button>
                  </div>
                ) : (
                  <button onClick={() => fileInputRef.current?.click()}
                    className="w-full border-2 border-dashed border-slate-300 hover:border-indigo-400 hover:bg-indigo-50/30 rounded-xl py-10 flex flex-col items-center gap-2 transition-colors">
                    <ImageIcon size={28} className="text-slate-300"/>
                    <p className="text-[13px] text-slate-600 font-semibold">클릭하여 이미지 업로드</p>
                    <p className="text-[11px] text-slate-400">JPG, PNG, GIF · 최대 5MB</p>
                  </button>
                )}
              </>
            )}
          </div>

          {/* 우측: 삭제 버튼 (hover 시) */}
          {!isFirst && (
            <button onClick={() => onRemove()}
              className="opacity-0 group-hover:opacity-100 transition-opacity pt-1.5 text-slate-300 hover:text-red-500 shrink-0"
              title="블록 삭제">
              <Trash2 size={14}/>
            </button>
          )}

          {/* + 메뉴 popup */}
          {menuOpen && (
            <div className="absolute z-50 top-9 left-0 bg-white border border-slate-200 rounded-xl shadow-xl py-2 min-w-[260px]"
              onMouseDown={e => e.preventDefault()}>
              {['기본 블록','미디어'].map(group => (
                <div key={group}>
                  <div className="px-3 py-1.5 text-[10px] font-bold text-slate-400 uppercase tracking-wider">{group}</div>
                  {BLOCK_TYPES.filter(b => b.group === group).map(b => (
                    <button key={b.type}
                      onClick={() => { setMenuOpen(false); onAddAfter(b.type); }}
                      className="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-50 text-left transition-colors">
                      <div className="w-9 h-9 rounded-md bg-slate-50 border border-slate-200 flex items-center justify-center text-[12px] font-black text-slate-600 shrink-0">
                        {b.icon}
                      </div>
                      <div className="min-w-0">
                        <div className="text-[13px] font-bold text-slate-800">{b.label}</div>
                        <div className="text-[11px] text-slate-400">{b.desc}</div>
                      </div>
                    </button>
                  ))}
                </div>
              ))}
              <button onClick={() => setMenuOpen(false)}
                className="block w-full text-[10px] text-slate-400 hover:text-slate-600 mt-1 py-1">닫기</button>
            </div>
          )}
        </div>
      );
    };

    const ArticleCreateModal = ({ onSave, onClose }) => {
      const [title, setTitle] = useState('');
      const [blocks, setBlocks] = useState([{ id: 'b_init', type: 'p', content: '' }]);
      const [tags, setTags] = useState([]);
      const [tagInput, setTagInput] = useState('');
      const [allowSocial, setAllowSocial] = useState(true);
      const [savedAt, setSavedAt] = useState(null);
      const dragIdRef = useRef(null);
      const [dragOverId, setDragOverId] = useState(null);

      // 자동 저장 mock — 변경 후 800ms 후 "임시 저장됨" 표시
      useEffect(() => {
        const t = setTimeout(() => setSavedAt(new Date()), 800);
        return () => clearTimeout(t);
      }, [title, blocks, tags, allowSocial]);

      const firstImageUrl = blocks.find(b => b.type === 'image' && b.dataUrl)?.dataUrl || null;

      const hasContent = blocks.some(b =>
        (b.type === 'image' && b.dataUrl) ||
        ((b.type === 'p' || b.type === 'h2') && (b.content||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim().length > 0) ||
        (b.type === 'ul' && Array.isArray(b.items) && b.items.some(i => i && i.trim()))
      );
      const canSave = !!title.trim() && hasContent;
      const isDirty = !!title.trim() || hasContent || tags.length > 0;

      const tryClose = useCallback(() => {
        if (isDirty && !confirm('작성 중인 내용이 사라집니다. 닫을까요?')) return;
        onClose();
      }, [onClose, isDirty]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape') {
            if (document.fullscreenElement) return;
            e.stopPropagation();
            tryClose();
          }
        };
        document.addEventListener('keydown', onKey, true);
        return () => document.removeEventListener('keydown', onKey, true);
      }, [tryClose]);

      const updateBlock = (id, patch) => {
        setBlocks(prev => prev.map(b => b.id === id ? { ...b, ...patch } : b));
      };
      const removeBlock = (id) => {
        setBlocks(prev => {
          if (prev.length === 1) return prev;
          return prev.filter(b => b.id !== id);
        });
      };
      const addBlockAfter = (id, type) => {
        const nb = createBlock(type);
        setBlocks(prev => {
          const idx = prev.findIndex(b => b.id === id);
          if (idx < 0) return [...prev, nb];
          return [...prev.slice(0, idx+1), nb, ...prev.slice(idx+1)];
        });
      };

      const onBlockDragStart = (id) => { dragIdRef.current = id; };
      const onBlockDragOver = (id, e) => { e.preventDefault(); setDragOverId(id); };
      const onBlockDragEnd = () => { dragIdRef.current = null; setDragOverId(null); };
      const onBlockDrop = (toId, e) => {
        e.preventDefault();
        const fromId = dragIdRef.current;
        if (!fromId || fromId === toId) { onBlockDragEnd(); return; }
        setBlocks(prev => {
          const fromIdx = prev.findIndex(b => b.id === fromId);
          const toIdx   = prev.findIndex(b => b.id === toId);
          if (fromIdx < 0 || toIdx < 0) return prev;
          const next = [...prev];
          const [m] = next.splice(fromIdx, 1);
          next.splice(toIdx, 0, m);
          return next;
        });
        onBlockDragEnd();
      };

      const handleTagKey = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const v = tagInput.trim().replace(/^#/, '');
          if (!v || tags.includes(v)) { setTagInput(''); return; }
          setTags(prev => [...prev, v]);
          setTagInput('');
        }
        if (e.key === 'Backspace' && tagInput === '' && tags.length > 0) {
          setTags(prev => prev.slice(0,-1));
        }
      };

      const handleSave = () => {
        if (!canSave) return;
        const html = blocks.map(b => {
          if (b.type === 'h2')    return `<h2>${b.content || ''}</h2>`;
          if (b.type === 'p')     return `<p>${b.content || ''}</p>`;
          if (b.type === 'ul')    return `<ul>${b.items.filter(i => i.trim()).map(i => `<li>${i.replace(/</g,'&lt;')}</li>`).join('')}</ul>`;
          if (b.type === 'image') return b.dataUrl ? `<p><img src="${b.dataUrl}" alt="" /></p>` : '';
          return '';
        }).filter(Boolean).join('');
        const today = new Date();
        const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
        const imgCount = blocks.filter(b => b.type === 'image' && b.dataUrl).length;
        const plainText = html.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim();
        const hasTextSave = plainText.length > 0;
        const metaParts = [];
        if (imgCount > 0) metaParts.push(`이미지 ${imgCount}장`);
        if (hasTextSave) metaParts.push(`읽기 ${Math.max(1, Math.round(plainText.length / 300))}분`);
        onSave({
          id: 'a_' + Date.now(),
          type: 'article',
          title: title.trim(),
          meta: metaParts.join(' · ') || '아티클',
          date: dateStr,
          articleFormat: 'rich',
          content: html,
          coverImage: firstImageUrl,
          tags,
          allowSocial,
          readMinutes: hasTextSave ? Math.max(1, Math.round(plainText.length / 300)) : null,
          author: '운영자',
        });
      };

      return (
        <div className="fixed inset-0 bg-slate-900/55 z-[300] flex items-center justify-center animate-fadeIn"
          onClick={tryClose}
          role="dialog" aria-modal="true">
          <div
            onClick={e => e.stopPropagation()}
            className="bg-white rounded-2xl shadow-2xl overflow-hidden w-[1040px] max-w-[96vw] h-[90vh] max-h-[90vh] flex flex-col animate-scaleIn">
            {/* 헤더 */}
            <div className="flex items-center justify-between px-6 py-3 border-b border-slate-100 shrink-0 bg-slate-50/40">
              <div className="flex items-center gap-3">
                <button onClick={tryClose} className="p-1.5 rounded-md hover:bg-slate-100 text-slate-500" aria-label="닫기">
                  <X size={18}/>
                </button>
                <div className="h-5 w-px bg-slate-200"/>
                <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-emerald-50 border border-emerald-200 text-emerald-700 text-[11px] font-bold">
                  <FileText size={12}/> 아티클 작성기
                </span>
                <span className="text-[11px] text-slate-400">
                  {savedAt ? `임시 저장됨 · ${savedAt.getHours().toString().padStart(2,'0')}:${savedAt.getMinutes().toString().padStart(2,'0')}` : '저장 대기'}
                </span>
              </div>
              <button onClick={handleSave} disabled={!canSave}
                className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-[12px] font-bold transition-colors
                  ${canSave ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                <Send size={12}/> 라이브러리에 게시
              </button>
            </div>

            {/* 본문 — 좌측 캔버스 + 우측 사이드바 */}
            <div className="flex-1 flex overflow-hidden min-h-0">
              {/* 좌측 캔버스 */}
              <div className="flex-1 overflow-y-auto custom-scrollbar bg-white">
                <div className="max-w-[680px] mx-auto px-8 py-8">
                  <input type="text" autoFocus value={title} onChange={e => setTitle(e.target.value)}
                    placeholder="새로운 아티클 제목"
                    className="w-full text-[28px] font-black text-slate-900 border-none outline-none placeholder:text-slate-300 bg-transparent leading-tight mb-6"/>

                  {/* 블록 리스트 */}
                  <div className="space-y-0.5">
                    {blocks.map((block, idx) => (
                      <ArticleBlockRow key={block.id}
                        block={block}
                        isFirst={idx === 0 && blocks.length === 1}
                        onUpdate={(patch) => updateBlock(block.id, patch)}
                        onRemove={() => removeBlock(block.id)}
                        onAddAfter={(type) => addBlockAfter(block.id, type)}
                        onDragStart={() => onBlockDragStart(block.id)}
                        onDragOver={(e) => onBlockDragOver(block.id, e)}
                        onDragEnd={onBlockDragEnd}
                        onDrop={(e) => onBlockDrop(block.id, e)}
                        isDragOver={dragOverId === block.id && dragIdRef.current !== block.id}
                      />
                    ))}
                  </div>
                </div>
              </div>

              {/* 우측 사이드바 */}
              <aside className="w-[280px] border-l border-slate-100 bg-slate-50/40 overflow-y-auto custom-scrollbar p-5 space-y-4 shrink-0">
                <h4 className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">속성 설정</h4>

                {/* 대표 이미지 카드 */}
                <div className="bg-white border border-slate-200 rounded-xl p-3.5">
                  <div className="flex items-center gap-1.5 mb-2">
                    <span className="text-[14px]">✨</span>
                    <span className="text-[12px] font-bold text-slate-800">대표 이미지 (자동)</span>
                  </div>
                  {firstImageUrl ? (
                    <img src={firstImageUrl} alt="대표" className="w-full h-[100px] object-cover rounded-lg"/>
                  ) : (
                    <p className="text-[11px] text-slate-500 leading-relaxed">
                      본문 <b>첫 이미지</b>가 리스트 썸네일로 자동 지정됩니다.
                    </p>
                  )}
                </div>

                {/* 검색 태그 */}
                <div>
                  <label className="block text-[11px] font-bold text-slate-700 mb-1.5">검색 태그</label>
                  <div className="bg-white border border-slate-200 rounded-lg px-2.5 py-2 flex flex-wrap items-center gap-1 focus-within:border-indigo-400">
                    {tags.map(t => (
                      <span key={t} className="inline-flex items-center gap-0.5 px-1.5 py-0.5 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-md text-[11px] font-bold">
                        #{t}
                        <button onClick={() => setTags(tags.filter(x => x !== t))}
                          className="text-indigo-400 hover:text-indigo-700 ml-0.5"><X size={10}/></button>
                      </span>
                    ))}
                    <input type="text" value={tagInput}
                      onChange={e => setTagInput(e.target.value)}
                      onKeyDown={handleTagKey}
                      placeholder={tags.length === 0 ? '#태그 입력 후 Enter' : ''}
                      className="flex-1 min-w-[70px] bg-transparent outline-none text-[12px] py-0.5"/>
                  </div>
                </div>

                {/* OPTIONS */}
                <div className="bg-white border border-slate-200 rounded-xl p-3.5 space-y-2.5">
                  <h5 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">OPTIONS</h5>
                  <div className="flex items-center justify-between">
                    <span className="text-[12px] text-slate-700">의견 (Social) 허용</span>
                    <Toggle active={allowSocial} onClick={() => setAllowSocial(p => !p)}/>
                  </div>
                </div>
              </aside>
            </div>
          </div>
        </div>
      );
    };

    /* ─── 시험/퀴즈/설문 간단 작성 모달 (이름 + 기본 속성) ─── */
    const SimpleItemCreateModal = ({ kind, onSave, onClose }) => {
      // kind: 'exam' | 'quiz' | 'survey'
      const meta = {
        exam:   { label:'새 시험 만들기',   icon: ClipboardList, iconClass:'bg-violet-100 text-violet-600', desc:'합격 점수와 문항 수를 설정합니다.' },

      const reqSlots   = allItems.filter(s => s.isRequired);
      /* 블렌디드 수료 트랙 — 온라인(영상·시험·자료) / 오프라인(차수) 슬롯 유무 */
      const hasOfflineSlot = allItems.some(s => s.type === 'offline');
      const hasOnlineSlot  = allItems.some(s => s.type !== 'offline');

      /* 코스 타입 — spec v0.2: 6종 선택 (콘텐츠/오프라인/블렌디드/시험/설문/영상) */
      const hasOfflineItem = false;
      /* 코스 정책 — spec v0.2 (maxRunDays 기본 365일) */
      const [maxRunDays, setMaxRunDays] = useState(365);

      /* 커리큘럼 버전 상태 — spec v0.2 (draft → published) */
      const [curriculumVersion, setCurriculumVersion] = useState('draft');

      const addChapter = () => {
        setChapters(p => [...p, { id: Date.now(), title: `새 커리큘럼`, releaseAfter: 0, items: [] }]);
      };
      const removeChapter = (chId) => setChapters(p => p.filter(ch => ch.id !== chId));
      const updateChapterTitle = (chId, title) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, title } : ch));
      const updateChapter = (chId, changes) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, ...changes } : ch));

      const addItem = (chId, type, title, libItem) => {
        const item = {
          id: Date.now(), type,
          title: title || `새 ${SLOT_TYPES[type].label}`,
          isRequired: true,
          cond: { ...SLOT_TYPES[type].defaultCond },
          source: libItem ? 'library' : 'upload',
          libRef: libItem?.id || null,
          prerequisiteIds: [],
        };
        // 블렌디드: 차수(offline)는 라이브러리가 아니라 커리큘럼에서 직접 구성 — 정원·회차 보유
        if (type === 'offline') { item.title = title || '새 차수'; item.capacity = 20; item.sessions = []; item.source = 'cohort'; item.cond = { attendanceRate: courseMinRate }; }  // 출석률 판정은 코스 수료조건(courseMinRate) 일괄. cond.attendanceRate는 스키마 보존용(차수별 부활 대비)
        setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: [...ch.items, item] } : ch));
      };
      /* 차수(offline 슬롯) 안 회차 CRUD */
      const addSession = (chId, itId) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.map(it => it.id === itId ? { ...it, sessions: [...(it.sessions || []), { id: 's' + Date.now(), date: '', time: '09:00–18:00', place: '' }] } : it) } : ch));
      const removeSession = (chId, itId, sId) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.map(it => it.id === itId ? { ...it, sessions: (it.sessions || []).filter(s => s.id !== sId) } : it) } : ch));
      const updateSession = (chId, itId, sId, key, val) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.map(it => it.id === itId ? { ...it, sessions: (it.sessions || []).map(s => s.id === sId ? { ...s, [key]: val } : s) } : it) } : ch));

      /* 일괄설정 ① 전체 순서대로 — 모든 항목에 직전 항목을 prerequisite로 */
      const applySequenceMacro = () => {
        if (!confirm('모든 항목의 진입 조건이 직전 항목으로 일괄 설정됩니다. 기존 값은 덮어씁니다. 진행하시겠습니까?')) return;
        const flat = chapters.flatMap(ch => ch.items.map(it => ({ ...it, _chId: ch.id })));
        const idMap = new Map();
        flat.forEach((it, idx) => {
          idMap.set(it.id, idx > 0 ? [flat[idx - 1].id] : []);
        });
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, prerequisiteIds: idMap.get(it.id) || [] })) })));
      };
      const clearSequenceMacro = () => {
        if (!confirm('모든 항목의 진입 조건을 일괄 해제합니다. 진행하시겠습니까?')) return;
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, prerequisiteIds: [] })) })));
      };

      /* 일괄설정 ② 일괄 N일 간격 — 모든 커리큘럼에 N·2N·3N... 자동 채우기 */
      const [intervalDays, setIntervalDays] = useState(7);
      const applyIntervalMacro = () => {
        if (!confirm(`모든 커리큘럼의 공개일을 ${intervalDays}일 간격으로 일괄 설정합니다. 기존 값은 덮어씁니다. 진행하시겠습니까?`)) return;
        setChapters(p => p.map((ch, idx) => ({ ...ch, releaseAfter: idx * intervalDays })));
      };

      /* 일괄설정 ③ 필수/선택 — 모든 에셋의 isRequired 한 번에 */
      const applyAllRequired = () => {
        if (!confirm('모든 에셋을 "필수"로 일괄 설정합니다. 기존 값은 덮어씁니다. 진행하시겠습니까?')) return;
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, isRequired: true })) })));
      };
      const applyAllOptional = () => {
        if (!confirm('모든 에셋을 "선택"으로 일괄 설정합니다. 기존 값은 덮어씁니다. 진행하시겠습니까?')) return;
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, isRequired: false })) })));
      };
      const applyVideoOnlyRequired = () => {
        if (!confirm('영상만 "필수", 나머지(시험·설문 등)는 "선택"으로 일괄 설정합니다. 기존 값은 덮어씁니다. 진행하시겠습니까?')) return;
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, isRequired: it.type === 'video' })) })));
      };

      /* 일괄설정 ④ 의견 기능 ON/OFF — 모든 항목 community.enabled 한 번에 */
      const applyAllCommunityOn = () => {
        if (!confirm('모든 항목의 "의견 기능"을 사용으로 일괄 설정합니다. 익명 허용은 변경되지 않습니다. 진행하시겠습니까?')) return;
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, community: { enabled: true } })) })));
      };
      const applyAllCommunityOff = () => {
        if (!confirm('모든 항목의 "의견 기능"을 사용 안 함으로 일괄 설정합니다. 익명 허용은 유지됩니다. 진행하시겠습니까?')) return;
        setChapters(p => p.map(ch => ({ ...ch, items: ch.items.map(it => ({ ...it, community: { enabled: false } })) })));
      };
      const removeItem = (chId, itemId) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.filter(s => s.id !== itemId) } : ch));
      const updateItem = (chId, itemId, changes) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.map(s => s.id === itemId ? { ...s, ...changes } : s) } : ch));
      const updateItemCond = (chId, itemId, cond) => setChapters(p => p.map(ch => ch.id === chId ? { ...ch, items: ch.items.map(s => s.id === itemId ? { ...s, cond } : s) } : ch));

      /* 커리큘럼 내 아이템 드래그앤드롭 */
      const dragRef = useRef({ chId: null, itemId: null, overChId: null, overItemId: null });
      const [dragging, setDragging] = useState(null);
      const [dragOver, setDragOver] = useState(null);
      const onItemDragStart = (e, chId, itemId) => {
        e.stopPropagation();
        dragRef.current = { ...dragRef.current, chId, itemId };
        setDragging({ chId, itemId }); e.dataTransfer.effectAllowed = 'move';
      };
      const onItemDragOver = (e, chId, itemId) => {
        if (chDragRef.current?.fromChId) return; // 커리큘럼 드래그 중이면 무시
        e.preventDefault(); e.stopPropagation();
        dragRef.current.overChId = chId; dragRef.current.overItemId = itemId;
        setDragOver({ chId, itemId });
      };
      const onItemDrop = (e) => {
        e.preventDefault();
        const { chId: fCh, itemId: fId, overChId: tCh, overItemId: tId } = dragRef.current;
        if (!fId || !tId || (fCh === tCh && fId === tId)) { setDragging(null); setDragOver(null); return; }
        setChapters(prev => {
          const chs = prev.map(ch => ({ ...ch, items: [...ch.items] }));
          const srcCh = chs.find(ch => ch.id === fCh);
          const dstCh = chs.find(ch => ch.id === tCh);
          const fi = srcCh.items.findIndex(s => s.id === fId);
          const [item] = srcCh.items.splice(fi, 1);
          const ti = dstCh.items.findIndex(s => s.id === tId);
          dstCh.items.splice(ti, 0, item);
          return chs;
        });
        dragRef.current = { chId: null, itemId: null, overChId: null, overItemId: null };
        setDragging(null); setDragOver(null);
      };
      const onItemDragEnd = () => { setDragging(null); setDragOver(null); };

      /* 빈 커리큘럼·커리큘럼 끝 영역에 항목 drop — 다른 커리큘럼으로 이동 (마지막에 append) */
      const onChapterAppendDragOver = (e, chId) => {
        if (chDragRef.current?.fromChId) return;
        if (!dragRef.current.itemId) return; // 항목 드래그 중에만
        e.preventDefault();
        e.stopPropagation();
        dragRef.current.overChId = chId;
        dragRef.current.overItemId = null;
        setDragOver({ chId, itemId: null });
      };
      const onChapterAppendDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const { chId: fCh, itemId: fId, overChId: tCh } = dragRef.current;
        if (!fId || !tCh) { setDragging(null); setDragOver(null); return; }
        if (fCh === tCh) {
          // 같은 커리큘럼 빈 영역 drop — 마지막으로 이동
          setChapters(prev => prev.map(ch => {
            if (ch.id !== tCh) return ch;
            const items = [...ch.items];
            const fi = items.findIndex(s => s.id === fId);
            if (fi < 0) return ch;
            const [item] = items.splice(fi, 1);
            items.push(item);
            return { ...ch, items };
          }));
        } else {
          // 다른 커리큘럼으로 이동 — 끝에 append
          setChapters(prev => {
            const chs = prev.map(ch => ({ ...ch, items: [...ch.items] }));
            const srcCh = chs.find(ch => ch.id === fCh);
            const dstCh = chs.find(ch => ch.id === tCh);
            if (!srcCh || !dstCh) return prev;
            const fi = srcCh.items.findIndex(s => s.id === fId);
            if (fi < 0) return prev;
            const [item] = srcCh.items.splice(fi, 1);
            dstCh.items.push(item);
            return chs;
          });
        }
        dragRef.current = { chId: null, itemId: null, overChId: null, overItemId: null };
        setDragging(null); setDragOver(null);
      };

      /* 커리큘럼 순서 드래그앤드롭 */
      const chDragRef = useRef({ fromChId: null, overChId: null });
      const [chDragging, setChDragging] = useState(null); // chId
      const [chDragOver, setChDragOver] = useState(null); // chId
      const onChapterDragStart = (e, chId) => {
        chDragRef.current = { fromChId: chId, overChId: null };
        setChDragging(chId);
        e.dataTransfer.effectAllowed = 'move';
      };
      const onChapterDragOver = (e, chId) => {
        if (!chDragRef.current.fromChId) return; // 항목 드래그 시 무시
        e.preventDefault();
        e.stopPropagation();
        chDragRef.current.overChId = chId;
        setChDragOver(chId);
      };
      const onChapterDrop = (e) => {
        if (!chDragRef.current.fromChId) return;
        e.preventDefault();
        e.stopPropagation();
        const { fromChId, overChId } = chDragRef.current;
        if (fromChId && overChId && fromChId !== overChId) {
          setChapters(prev => {
            const next = [...prev];
            const fi = next.findIndex(ch => ch.id === fromChId);
            const ti = next.findIndex(ch => ch.id === overChId);
            if (fi < 0 || ti < 0) return prev;
            const [moved] = next.splice(fi, 1);
            next.splice(ti, 0, moved);
            return next;
          });
        }
        chDragRef.current = { fromChId: null, overChId: null };
        setChDragging(null); setChDragOver(null);
      };
      const onChapterDragEnd = () => {
        chDragRef.current = { fromChId: null, overChId: null };
        setChDragging(null); setChDragOver(null);
      };

      /* 커리큘럼별 항목 추가 모달 */
      const [addItemModal, setAddItemModal] = useState(null); // chId | null

      /* 이수조건 설정 모달 */
      const [settingSlot, setSettingSlot] = useState(null); // { chId, item }

      /* 커리큘럼 슬롯에서 호출되는 미리보기 모달 (영상 또는 아티클) */
      const [slotPreviewItem, setSlotPreviewItem] = useState(null); // libItem | null

      /* 운영자가 새로 만든 아티클 (라이브러리 임시 등록) */
      const [extraLibraryItems, setExtraLibraryItems] = useState([]);
      const combinedLibrary = [...LIBRARY_ITEMS, ...extraLibraryItems];
      const findLibItem = (id) => combinedLibrary.find(l => l.id === id) || null;

      /* 수료 조건 */
      const [completionRules, setCompletionRules] = useState([
        { id: 'required-all', label: '필수 항목 전체 이수 (영상·시험 이수 + 차수 출석률 충족)', fixed: true, condition: { type: 'all_required' } }
      ]);
      /* 블렌디드 코스 기본 출석률 — 차수 슬롯이 개별 출석률 미설정 시 상속(트랙별 AND 수료) */
      const [courseMinRate, setCourseMinRate] = useState(75);
      const [hasOptionalThreshold, setHasOptionalThreshold] = useState(false);
      const [optionalMinCount, setOptionalMinCount] = useState(1);

      /* 코스 상태 */
      const [courseStatus, setCourseStatus] = useState('draft');

      /* 그룹 마스터 + 코스 자격 (L1) */
      const ALL_GROUPS = [
        { id: 'g_all',    name: '전직원',     count: 1247 },
        { id: 'g_dev',    name: '개발팀',     count: 142 },
        { id: 'g_design', name: '디자인팀',   count: 28 },
        { id: 'g_lead',   name: '팀장급',     count: 67 },
        { id: 'g_new',    name: '신입',       count: 35 },
      ];
      const [courseEligibility, setCourseEligibility] = useState([]);
      const [eligDropOpen, setEligDropOpen] = useState(false);

      /* 커버 이미지 + 코스 상세 상단 (오프라인 빌더와 동일) */
      const [coverImage, setCoverImage] = useState(null);
      const coverInputRef = useRef(null);
      const [detailTop, setDetailTop] = useState('cover');

      const handleCoverFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('파일 크기는 5MB 이하여야 합니다.'); return; }
        const reader = new FileReader();
        reader.onload = (ev) => setCoverImage({ dataUrl: ev.target.result, fileName: file.name });
        reader.readAsDataURL(file);
        e.target.value = '';
      };
      const removeCoverImage = () => setCoverImage(null);

      const categories = [
        { group: '직무/전문 역량', items: ['직무 역량', '기술/IT', '영업/마케팅', '기획/전략'] },
        { group: '리더십/매니지먼트', items: ['리더십', '조직 관리', '팀 빌딩'] },
        { group: '공통/필수', items: ['공통/입사 교육', '의무 교육', '인권/안전'] },
        { group: '조직문화/복지', items: ['조직문화', '워크라이프밸런스', '복지'] },
        { group: '외부/자격증', items: ['외부 교육', '자격증/어학'] },
      ];
      const [lastSavedAt, setLastSavedAt]   = useState(null);
      const [showPublishModal, setShowPublishModal] = useState(false);
      const [publishType, setPublishType] = useState('now'); // now | scheduled
      const [publishSchedule, setPublishSchedule] = useState('');
      const [scheduledAt, setScheduledAt] = useState(null);
      const scheduleCheckRef = useRef(null);
      const [showLearnerPreview, setShowLearnerPreview] = useState(false);
      const [showBatchModal, setShowBatchModal] = useState(false);
      const [batchConfirm, setBatchConfirm] = useState(null);
      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);
      const statusLabel = { draft:'초안', saved:'임시저장', scheduled:'공개 예약됨', published:'퍼블리싱됨' };
      const statusColor  = { draft:'bg-slate-100 text-slate-500 border-slate-200', saved:'bg-amber-50 text-amber-700 border-amber-200', scheduled:'bg-violet-50 text-violet-700 border-violet-300', published:'bg-emerald-50 text-emerald-700 border-emerald-200' };

      const dismissToast = () => { setToast(p => p ? { ...p, dismissing: true } : null); setTimeout(() => setToast(null), 200); };
      const showToast = (message, icon = '✅', duration = 3000) => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ type: 'info', message, icon, dismissing: false });
        toastTimer.current = setTimeout(dismissToast, duration);
      };
      const handleSaveDraft = () => {
        const isFirst = courseStatus === 'draft';
        setCourseStatus('saved'); setLastSavedAt(new Date());
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ type: isFirst ? 'first' : 'repeat', dismissing: false });
        if (!isFirst) toastTimer.current = setTimeout(dismissToast, 3000);
        setIsDirty(false);
      };

      /* ─── 나가기 가드 ─── */
      const [showExitModal, setShowExitModal] = useState(false);
      const [isDirty, setIsDirty] = useState(true); // 빌더 진입 = 작업 중으로 간주, 임시저장 시 false
      const isDirtyRef = useRef(true); // beforeunload·이동 직전 동기 참조용
      useEffect(() => { isDirtyRef.current = isDirty; }, [isDirty]);
      useEffect(() => { setIsDirty(true); }, [courseInfo, studyPeriod, regPeriod, maxRunDays]);
      const exitToList = () => {
        isDirtyRef.current = false; // 이동 직전 동기 해제 → beforeunload 가드 무력화
        window.location.href = 'online-list.html';
      };
      const tryExit = (e) => {
        if (e) e.preventDefault();
        if (isDirty) setShowExitModal(true);
        else exitToList();
      };
      const saveAndExit = () => {
        handleSaveDraft();
        exitToList();
      };
      const discardAndExit = () => {
        exitToList();
      };
      useEffect(() => {
        if (!showExitModal) return;
        const h = (e) => { if (e.key === 'Escape') setShowExitModal(false); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [showExitModal]);
      useEffect(() => {
        const h = (e) => { if (isDirtyRef.current) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', h);
        return () => window.removeEventListener('beforeunload', h);
      }, []);

      /* 퍼블리싱 검증 */
      const validation = [
        { label: '코스명 입력',         ok: !!courseInfo.title.trim() },
        { label: '담당 강사 지정',       ok: courseInfo.noInstructor || !!courseInfo.instructor.trim() },
        { label: '등록 방식 1개 이상',   ok: memberApply || adminAssign },
        { label: '신청 기간 설정',       ok: !memberApply || regNoLimit || (!!regPeriod.start && !!regPeriod.end) },
        { label: '수강 기간 설정',       ok: studyPeriod.type === 'unlimited' || (studyPeriod.type === 'days' && studyPeriod.days > 0) || (!!studyPeriod.fixedStart && !!studyPeriod.fixedEnd) },
        { label: '커리큘럼 최소 1개',   ok: totalSlots > 0 },
        { label: '필수 콘텐츠 최소 1개',ok: reqSlots.length > 0 },
      ];
      const canPublish = validation.every(v => v.ok);

      /* 스텝 미니맵 검증 — 좌측 사이드 진행도 표시 */
      const titleOk = !!courseInfo.title.trim();
      const instructorOk = courseInfo.noInstructor || !!courseInfo.instructor.trim();
      const enrollOk = memberApply || adminAssign;   // 등록 방식 최소 1개
      const regOk = !memberApply || regNoLimit || (!!regPeriod.start && !!regPeriod.end);   // 신청 기간은 회원 신청 + 기간지정일 때만 필수
      const periodOk = studyPeriod.type === 'unlimited' || (studyPeriod.type === 'days' && studyPeriod.days > 0) || (!!studyPeriod.fixedStart && !!studyPeriod.fixedEnd);
      const curOk = totalSlots > 0 && reqSlots.length > 0;

      const stepRequiredTotal = stepValidation.filter(s => s.required).length;

      const handlePublish = () => {
        if (!canPublish) return;
        if (publishType === 'scheduled' && publishSchedule) {

                            apply: () => setChapters(p => p.map(ch => ({...ch, items: ch.items.map(it => ({...it, isRequired: true}))})))

                          disabled={totalAssets === 0}
                          className="py-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:cursor-not-allowed text-white rounded-lg text-[12px] font-bold transition-colors flex items-center justify-center gap-1.5">

                          })}

                            apply: () => setChapters(p => p.map(ch => ({...ch, items: ch.items.map(it => ({...it, isRequired: it.type === 'video'}))})))

                          disabled={totalAssets === 0}
                          className="py-2 bg-white border border-slate-300 hover:border-indigo-400 hover:text-indigo-600 disabled:bg-slate-50 disabled:cursor-not-allowed text-slate-600 rounded-lg text-[12px] font-bold transition-colors">

                            key: 'seq-clear', label: '모두 해제',
                            summary: `${totalAssets}개 항목의 진입 조건 = 모두 해제`,
                            apply: () => setChapters(p => p.map(ch => ({...ch, items: ch.items.map(it => ({...it, prerequisiteIds: []}))})))
                          })}
                          disabled={totalAssets === 0}
                          className="px-3 py-2 bg-white border border-slate-300 hover:border-red-400 hover:text-red-600 disabled:bg-slate-50 disabled:cursor-not-allowed text-slate-600 rounded-lg text-[12px] font-bold transition-colors flex items-center justify-center gap-1.5">
                          <X size={12}/> 모두 해제
                        </button>
                      </div>
                    </section>

                    <section>
                      <div className="mb-2 flex items-center gap-2">
                        <h4 className="text-[13px] font-bold text-slate-800">③ 공개일 (단계별 공개)</h4>
                      </div>
                      <p className="text-[11px] text-slate-500 mb-3">커리큘럼별 공개일 — N일 간격 일괄 적용 또는 아래에서 개별 편집</p>
                      <div className="flex items-center gap-2 bg-indigo-50 border border-indigo-200 rounded-lg p-3 mb-3">
                        <span className="text-[12px] font-bold text-indigo-700 shrink-0">N일 간격 적용</span>
                        <input type="number" min={1} value={intervalDays}
                          onChange={e => setIntervalDays(Math.max(1, parseInt(e.target.value) || 1))}
                          className="w-14 border border-indigo-200 rounded px-1 py-1 text-[12px] font-bold text-center bg-white focus:border-indigo-400 outline-none"/>
                        <span className="text-[11px] text-indigo-600">일</span>
                        <button onClick={() => setBatchConfirm({
                            key: 'drip-interval', label: `${intervalDays}일 간격 적용`,
                            summary: `${chapters.length}개 커리큘럼 공개일 = 0일 · ${intervalDays}일 · ${intervalDays*2}일 ...`,
                            apply: () => setChapters(p => p.map((ch, idx) => ({ ...ch, releaseAfter: idx * intervalDays })))
                          })}
                          disabled={chapters.length === 0}
                          className="ml-auto py-1.5 px-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:cursor-not-allowed text-white rounded-lg text-[12px] font-bold">적용</button>
                      </div>
                      {chapters.length === 0 ? (
                        <p className="text-[11px] text-slate-400 text-center py-3 border border-dashed border-slate-200 rounded-lg">우측에 커리큘럼을 먼저 추가하세요</p>
                      ) : (
                        <div className="border border-slate-200 rounded-lg p-3 space-y-1.5">
                          <p className="text-[11px] font-bold text-slate-500 mb-1">개별 편집</p>
                          {chapters.map((ch, idx) => (
                            <div key={ch.id} className="flex items-center gap-2 py-0.5">
                              <span className="w-7 h-7 bg-slate-900 text-white rounded-lg flex items-center justify-center text-[11px] font-black tabular-nums shrink-0">{String(idx+1).padStart(2,'0')}</span>
                              <span className="flex-1 text-[12px] font-bold text-slate-700 truncate">{ch.title}</span>
                              <input type="number" min={0} value={ch.releaseAfter ?? 0}
                                onChange={e => updateChapter(ch.id, { releaseAfter: Math.max(0, parseInt(e.target.value) || 0) })}
                                className="w-16 border border-slate-300 rounded-lg px-2 py-1 text-[12px] font-bold text-center focus:border-indigo-400 outline-none"/>
                              <span className="text-[11px] text-slate-500 shrink-0">일 후</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </section>
                  </div>

                  {batchConfirm && (
                    <div className="px-6 py-4 border-t border-amber-200 bg-amber-50 shrink-0 animate-fadeIn">
                      <p className="text-[13px] font-bold text-amber-800 mb-1 flex items-center gap-1.5">
                        <AlertTriangle size={13}/> {batchConfirm.label} 적용
                      </p>
                      <p className="text-[12px] text-amber-700 mb-3">{batchConfirm.summary} · 기존 값은 덮어씁니다.</p>
                      <div className="flex gap-2">
                        <button onClick={() => { batchConfirm.apply(); setBatchConfirm(null); }}
                          className="flex-1 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg text-[12px] font-bold transition-colors">
                          적용
                        </button>
                        <button onClick={() => setBatchConfirm(null)}
                          className="px-4 py-2 bg-white border border-slate-300 hover:border-slate-400 text-slate-600 rounded-lg text-[12px] font-bold transition-colors">
                          취소
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* ── 항목 추가 모달 ── */}
          {addItemModal && (
            <AddItemModal
              library={combinedLibrary}
              addedLibIds={new Set(chapters.flatMap(ch => ch.items).filter(i => i.libRef).map(i => i.libRef))}
              onAdd={(type, title, libItem) => addItem(addItemModal, type, title, libItem)}
              onCreateArticle={(article) => {
                setExtraLibraryItems(prev => [article, ...prev]);
                addItem(addItemModal, 'article', article.title, article);
                setAddItemModal(null);
              }}
              onCreateSimple={(item) => {
                setExtraLibraryItems(prev => [item, ...prev]);
                addItem(addItemModal, item.type, item.title, item);
                setAddItemModal(null);
              }}
              onClose={() => setAddItemModal(null)}
            />
          )}

          {/* ── 커리큘럼 슬롯에서 호출된 미리보기 모달 (영상 / PDF / 아티클) ── */}
          {slotPreviewItem?.type === 'video' && (
            <VideoPreviewModal
              libItem={slotPreviewItem}
              alreadyAdded={true}
              onAdd={() => {}}
              onClose={() => setSlotPreviewItem(null)}
            />
          )}
          {slotPreviewItem?.type === 'pdf' && (
            <PdfPreviewModal
              pdf={slotPreviewItem}
              alreadyAdded={true}
              onClose={() => setSlotPreviewItem(null)}
            />
          )}
          {slotPreviewItem?.type === 'article' && (
            <ArticlePreviewModal
              article={slotPreviewItem}
              alreadyAdded={true}
              onClose={() => setSlotPreviewItem(null)}
            />
          )}

          {/* ── 이수조건 설정 모달 ── */}
          {settingSlot && (
            <SlotSettingModal
              slot={settingSlot.item}
              onSave={({ cond, community }) => updateItem(settingSlot.chId, settingSlot.item.id, { cond, community })}
              onClose={() => setSettingSlot(null)}
            />
          )}

          {/* ── 학습 뷰어 미리보기 모달 ── */}
          {showLearnerPreview && (
            <LearnerViewerPreviewModal
              chapters={chapters}
              libraryItems={combinedLibrary}
              onClose={() => setShowLearnerPreview(false)}
            />
          )}
        </div>
      );
    };

    createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
