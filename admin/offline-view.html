    return Math.max(0, (eh*60+em) - (sh*60+sm));

          pkgL.forEach((l, i) => { map[`${l.id}_${s.id}`] = i < sts.length ? sts[i] : 'pending'; });
        });
      });
      return map;
    });
    // C-2: mutable completion map
    const [completionMap, setCompletionMap] = useState(() => ({...COMPLETION}));
    // C-1: set of explicitly closed session IDs
    const [closedSessions, setClosedSessions] = useState(() => {
      const cs = new Set();
      COURSE.packages.forEach(pkg => pkg.sessions.forEach(s => {
        if ((s.att + s.late + s.abs > 0) && s.pending === 0) cs.add(s.id);
      }));
      return cs;
    });
    // C-3: currently expanded session key (`${pkgId}_${sessId}`)
    const [expandedSession, setExpandedSession] = useState(null);
    // 관리자 수동 인정 시간 맵 — key: `${learnerId}_${sessId}`
    const [tsMap, setTsMap] = useState({});
    const [reasonMap, setReasonMap] = useState({});   // 조퇴·결석 사유 {learnerId_sessId: reason}
    // QR 스캔 시간 맵 — 학습자가 실제 QR 찍은 시간 (모의 데이터: 기존 att/late 학습자에 시뮬 시간 부여)
    const [scanTimeMap, setScanTimeMap] = useState(() => {
      const map = {};
      COURSE.packages.forEach(pkg => {
        const pkgL = LEARNERS_RAW.filter(l => l.pkgId === pkg.id);
        pkg.sessions.forEach(s => {
          const sts = [
            ...Array(s.att).fill('attended'),
            ...Array(s.late).fill('late'),
            ...Array(s.abs).fill('absent'),
            ...Array(s.pending).fill('pending'),
          ];
          const [sh, sm] = s.start.split(':').map(Number);
          pkgL.forEach((l, i) => {
            const st = i < sts.length ? sts[i] : 'pending';
            if (st === 'attended' || st === 'late') {
              const offset = st === 'late' ? 12 + (i % 8) * 2 : (i % 5);
              const totalMin = sm + offset;
              const h = sh + Math.floor(totalMin / 60);
              const m = totalMin % 60;
              const sec = (i * 17) % 60;
              const d = s.date.replace(/-/g, '/');
              map[`${l.id}_${s.id}`] = `${d} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }
          });
        });
      });
      return map;
    });
    // 현재 열린 상태 드롭다운 키 + fixed 포지션
    const [openDropdown, setOpenDropdown] = useState(null);
    const [dropdownPos, setDropdownPos] = useState({x:0,y:0});
    // 출석 명단 모달 — { pkg, session, pkgL }
    const [attModal, setAttModal] = useState(null);
    const [modalFilter, setModalFilter] = useState('all');
    const [modalSearch, setModalSearch] = useState('');
    const toggleDD = (key, e) => {
      e.stopPropagation();
      if (openDropdown === key) { setOpenDropdown(null); return; }
      const rect = e.currentTarget.getBoundingClientRect();
      const ddW = 130;
      const x = Math.max(0, Math.min(rect.right - ddW, window.innerWidth - ddW - 8));
      setDropdownPos({ x, y: rect.bottom + 4 });
      setOpenDropdown(key);
    };

    const [sideExpanded, setSideExpanded] = useState(new Set(['course', 'course-v2']));
    const toggleSideMenu = id => setSideExpanded(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });

    const [showCreateModal, setShowCreateModal] = useState(false);
    useEffect(() => {
      if (!showCreateModal) return;
      const onKey = (e) => { if (e.key === 'Escape') setShowCreateModal(false); };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [showCreateModal]);
    const goBuilder = (type) => {
      window.location.href = type === 'online' ? 'online-builder.html' : 'offline-builder.html';
    };

    // C-5: BroadcastChannel setup
    useEffect(() => {
      bcRef.current = new BroadcastChannel('offline_attendance');
      return () => bcRef.current?.close();
    }, []);

    useEffect(() => {
      if (!openDropdown) return;
      const close = () => setOpenDropdown(null);
      document.addEventListener('click', close);
      return () => document.removeEventListener('click', close);
    }, [openDropdown]);

    useEffect(() => {
      if (liveMode) {
        setQrCountdown(30);
        bcRef.current?.postMessage({type:'LIVE_MODE_START',courseId:COURSE.id,ts:Date.now()});
        qrTimerRef.current = setInterval(() => setQrCountdown(p => {
          if (p <= 1) {
            bcRef.current?.postMessage({type:'QR_REFRESH',courseId:COURSE.id,ts:Date.now()});
            return 30;
          }
          return p - 1;
        }), 1000);
      }
      return () => clearInterval(qrTimerRef.current);
    }, [liveMode]);

    /* 계산값 */
    const learners = useMemo(() => LEARNERS_RAW.map(l => ({
      ...l, completion: completionMap[l.id] || 'not_started',
      pkg: COURSE.packages.find(p => p.id === l.pkgId),
    })), [completionMap]);

    const filtered = useMemo(() => {
      let list = learners;
      if(pkgFilter !== 'all') list = list.filter(l => l.pkgId === pkgFilter);
      if(search.trim()) { const q=search.toLowerCase(); list=list.filter(l=>l.name.includes(q)||l.dept.includes(q)); }
      return list;
    }, [learners, pkgFilter, search]);

    const totalEnrolled = COURSE.packages.reduce((s,p)=>s+p.enrolled,0);
    const totalCapacity = COURSE.packages.reduce((s,p)=>s+p.capacity,0);
    const completedCount = learners.filter(l=>l.completion==='completed').length;
    const totalSessions = COURSE.packages.reduce((s,p)=>s+p.sessions.length,0);

    const todayPkg = COURSE.packages.find(p => p.startDate <= TODAY && p.endDate >= TODAY);
    const todaySess = todayPkg?.sessions.find(s => s.date === TODAY);

    const overallRate = useMemo(() => {
      let present=0, total=0;
      COURSE.packages.forEach(p=>p.sessions.forEach(s=>{if(denomOf(s)>0){present+=presentOf(s);total+=denomOf(s);}}));
      return total>0?Math.round(present/total*100):0;
    },[]);

    // 평균 학습시간 (수강생 1인 평균 — 출석/지각/조퇴 회차 시간 합)
    const avgStudyMin = useMemo(() => {
      if (!LEARNERS_RAW.length) return 0;
      const sum = LEARNERS_RAW.reduce((acc,l)=>{
        const pkg = COURSE.packages.find(p=>p.id===l.pkgId);
        if (!pkg) return acc;
        return acc + pkg.sessions.reduce((a,s)=>{
          const st = attendanceMap[`${l.id}_${s.id}`]||'pending';
          return a + ((st==='attended'||st==='late'||st==='early_leave')?sessionStudyMin(s):0);
        },0);
      },0);
      return Math.round(sum / LEARNERS_RAW.length);
    },[attendanceMap]);

    const downloadStudentExcel = () => {
      const bom = '﻿';
      const headers = ['이름', '소속', '차수', '수료상태', '출석횟수'];
      const rows = learners.map(l => {
        const pkg = COURSE.packages.find(p => p.id === l.pkgId);
        const doneSess = pkg?.sessions.filter(s=>s.att+s.late+s.abs>0).length || 0;
        return [l.name, l.dept, pkg?.name||'', COMPL_CFG[l.completion]?.label||'', doneSess];
      });
      const csv = [headers, ...rows].map(r=>r.join(',')).join('\n');
      const blob = new Blob([bom+csv], {type:'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${COURSE.title}_수강생목록.csv`; a.click();
      URL.revokeObjectURL(url);
    };

    const downloadSampleExcel = () => {
      const bom = '﻿';
      const headers = ['아이디(이메일)', '이름', '소속(부서)'];
      const rows = [
        ['hong@company.com','홍길동','개발팀'],
        ['kim@company.com','김철수','마케팅팀'],
        ['lee@company.com','이영희','영업팀'],
      ];
      const csv = [headers, ...rows].map(r=>r.join(',')).join('\n');
      const blob = new Blob([bom+csv], {type:'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = '수강생_대량등록_양식.csv'; a.click();
      URL.revokeObjectURL(url);
    };

    // C-3/C-4: compute live session counts from attendanceMap
    const getSessionCounts = (sessId, pkgId) => {
      const pkgL = LEARNERS_RAW.filter(l => l.pkgId === pkgId);
      let att = 0, late = 0, el = 0, abs = 0, pending = 0;
      pkgL.forEach(l => {
        switch (attendanceMap[`${l.id}_${sessId}`] || 'pending') {
          case 'attended':    att++;     break;
          case 'late':        late++;    break;
          case 'early_leave': el++;      break;
          case 'absent':      abs++;     break;
          default:            pending++; break;
        }
      });
      return { att, late, el, abs, pending };
    };

    // C-1: close session — convert pending → absent
    const closeSession = (sessId, pkgId) => {
      const pkgL = LEARNERS_RAW.filter(l => l.pkgId === pkgId);
      setAttendanceMap(prev => {
        const next = {...prev};
        pkgL.forEach(l => {
          const k = `${l.id}_${sessId}`;
          if (!next[k] || next[k] === 'pending') next[k] = 'absent';
        });
        return next;
      });
      setClosedSessions(prev => new Set([...prev, sessId]));
    };

    // C-3: change individual learner attendance status
    const changeAttendance = (learnerId, sessId, status) => {
      setAttendanceMap(prev => ({...prev, [`${learnerId}_${sessId}`]: status}));
    };

    // 조퇴·결석 사유 기록 (정당 사유 예외 — 관리자 임의 아님, audit 근거)
    const REASON_PRESETS = ['병가', '경조사', '공무·업무', '기타'];
    const setAttReason = (learnerId, sessId, reason) => {
      const key = `${learnerId}_${sessId}`;
      setReasonMap(prev => { const n = {...prev}; if (reason) n[key] = reason; else delete n[key]; return n; });
    };

    // 타임스탬프 포맷: 2026/04/28 19:50:47
    const fmtTs = () => {
      const d = new Date();
      const pad = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    };

    // 출석인정 + 타임스탬프 기록
    // isQrScan=true → scanTimeMap(학습자 스캔 시간), false → tsMap(관리자 인정 시간)
    const recordAttendance = (learnerId, sessId, status, pkgId, learnerName, isQrScan = false) => {
      changeAttendance(learnerId, sessId, status);
      const key = `${learnerId}_${sessId}`;
      // 사유는 조퇴·결석에서만 의미 — 그 외 상태로 바뀌면 사유 제거
      if (status !== 'early_leave' && status !== 'absent') {
        setReasonMap(prev => { const n = {...prev}; delete n[key]; return n; });
      }
      if (status === 'attended' || status === 'late' || status === 'early_leave') {
        if (isQrScan) {
          setScanTimeMap(prev => ({...prev, [key]: prev[key] || fmtTs()}));
        } else {
          setTsMap(prev => ({...prev, [key]: prev[key] || fmtTs()}));
        }
      } else {
        setTsMap(prev => { const n = {...prev}; delete n[key]; return n; });
        setScanTimeMap(prev => { const n = {...prev}; delete n[key]; return n; });
      }
      bcRef.current?.postMessage({type:'ATTENDANCE_CHANGE',learnerId,name:learnerName,sessionId:sessId,pkgId,status,ts:Date.now()});
    };

    // 학습자별 출석률(차수 내 회차 기준): (출석+지각+조퇴) / (확정 회차). 조퇴=출석 인정 공용정책. 미확정(pending)은 분모 제외.
    const learnerPkgRate = (learnerId, pkg) => {
      let present = 0, denom = 0;
      pkg.sessions.forEach(s => {
        const st = attendanceMap[`${learnerId}_${s.id}`] || 'pending';
        if (st === 'pending') return;
        denom++;
        if (st === 'attended' || st === 'late' || st === 'early_leave') present++;
      });
      return denom > 0 ? Math.round(present / denom * 100) : null;
    };
    // 모든 회차 종료된 차수에서 수료 기준(출석률) 미달 인원 수. 미종료/판정불가면 null.
    const pkgBelowCount = pkg => {
      const allClosed = pkg.sessions.length > 0 && pkg.sessions.every(s => closedSessions.has(s.id));
      if (!allClosed) return null;
      return LEARNERS_RAW.filter(l => l.pkgId === pkg.id)
        .filter(l => { const r = learnerPkgRate(l.id, pkg); return r !== null && r < COMPLETION_MIN_RATE; }).length;
    };
    // C-2: 수료 처리 — 출석률 기준 충족자만 '수료', 미달자는 '미수료'. (전원 일괄 수료 금지 — 컴플라이언스)
    const processPkgCompletion = pkgId => {
      const pkg = COURSE.packages.find(p => p.id === pkgId);
      if (!pkg) return;
      const pkgL = LEARNERS_RAW.filter(l => l.pkgId === pkgId);
      setCompletionMap(prev => {
        const next = {...prev};
        pkgL.forEach(l => {
          const r = learnerPkgRate(l.id, pkg);
          next[l.id] = (r !== null && r >= COMPLETION_MIN_RATE) ? 'completed' : 'incomplete';
        });
        return next;
      });
    };

    const calDaysData = useMemo(() => calDays(2026, calMonth), [calMonth]);
    const sessByDate = useMemo(() => {
      const m={};
      COURSE.packages.forEach(p=>p.sessions.forEach(s=>{
        if(!m[s.date]) m[s.date]=[];
        m[s.date].push({...s,pkgId:p.id,pkgName:p.name});
      }));
      return m;
    },[]);

    /* ══ 라이브 QR 모드 ══ */
    if (liveMode) {
      const liveTotal = todayPkg?.enrolled || 20;
      const livePresent = 7; // 시뮬레이션
      const recentScans = LEARNERS_RAW.filter(l=>l.pkgId==='p4').slice(0,3);
      return (
        <div data-feature-id="A4-02" className="h-screen bg-slate-900 flex overflow-hidden">
          <div className="flex-[7] flex flex-col items-center justify-center relative">
            <button onClick={()=>setLiveMode(false)}
              className="absolute top-6 left-6 text-white/50 hover:text-white flex items-center gap-2 text-[14px] font-bold transition-colors">
              <Minimize2 size={16}/> 라이브 모드 종료
            </button>
            <div className="text-center mb-10">
              <div className="text-[22px] font-black text-white mb-2 leading-tight">{COURSE.title}</div>
              <div className="text-[18px] font-bold text-indigo-400 mb-1">{todayPkg?.name}</div>
              <div className="text-[32px] font-black text-white">{todaySess?.name}</div>
              <div className="text-[18px] text-slate-400 mt-2">{fmtShort(todaySess?.date)} · {todaySess?.start}~{todaySess?.end} · {todayPkg?.place}</div>
              {todaySess?.capacity!=null && <div className="text-[16px] text-violet-300 font-bold mt-1">이 회차 정원 {todaySess.capacity}석</div>}
            </div>
            <div className="bg-white rounded-3xl p-8 shadow-2xl relative">
              <div className="w-[340px] h-[340px] bg-slate-50 rounded-2xl flex items-center justify-center border-4 border-slate-100">
                <QrCode size={220} className="text-slate-800"/>
              </div>
              <div className="absolute -bottom-5 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 px-5 py-2 rounded-full flex items-center gap-2">
                <RefreshCw size={14} className={`text-indigo-400 ${qrCountdown<=5?'animate-spin':''}`}/>
                <span className={`text-[16px] font-bold ${qrCountdown<=5?'text-amber-400':'text-slate-300'}`}>{qrCountdown}초 후 갱신</span>
              </div>
            </div>
            <p className="text-slate-400 text-[28px] font-bold mt-12">학습자 앱에서 QR을 스캔하세요</p>
          </div>
          <div className="flex-[3] bg-slate-800 border-l border-slate-700 flex flex-col">
            <div className="p-6 border-b border-slate-700">
              <div className="text-[16px] font-bold text-slate-500 mb-1">실시간 출석 현황</div>
              <div className="flex items-end gap-2">
                <span className="text-[64px] font-black text-white leading-none">{livePresent}</span>
                <span className="text-[28px] text-slate-500 font-bold mb-2">/ {liveTotal}</span>
              </div>
              <div className="mt-4 w-full h-4 bg-slate-700 rounded-full overflow-hidden">
                <div className="h-full bg-emerald-500 rounded-full transition-all duration-500" style={{width:`${Math.round(livePresent/liveTotal*100)}%`}}/>
              </div>
              <div className="text-[18px] font-bold text-emerald-400 mt-2">{Math.round(livePresent/liveTotal*100)}% 출석</div>
            </div>
            <div className="p-6 grid grid-cols-2 gap-3">
              {[{label:'출석',val:livePresent,color:'text-emerald-400'},{label:'지각',val:0,color:'text-amber-400'},{label:'미확인',val:liveTotal-livePresent,color:'text-slate-400'},{label:'결석',val:0,color:'text-rose-400'}].map(s=>(
                <div key={s.label} className="bg-slate-700/50 rounded-xl p-4">
                  <div className={`text-[14px] font-bold ${s.color} mb-1`}>{s.label}</div>
                  <div className="text-[32px] font-black text-white">{s.val}</div>
                </div>
              ))}
            </div>
            <div className="flex-1 overflow-y-auto p-6 pt-2">
              <div className="text-[15px] font-bold text-slate-500 mb-3">최근 출석</div>
              <div className="space-y-2">
                {recentScans.map(st=>(
                  <div key={st.id} className="flex items-center gap-2 bg-slate-700/30 rounded-lg px-3 py-2 animate-fadeIn">
                    <div className="w-7 h-7 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center"><CheckCircle size={13}/></div>
                    <div>
                      <div className="text-[17px] font-bold text-white">{st.name}</div>
                      <div className="text-[14px] text-slate-500">{st.dept}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══ 일반 모드 ══ */
    return (
      <div className="min-h-screen flex">

        {/* ══ 글로벌 좌측 사이드바 ══ */}
        <aside className="w-[200px] bg-white border-r border-slate-200 flex flex-col shrink-0 h-screen sticky top-0 overflow-y-auto custom-scrollbar">
          <div className="px-4 py-4 flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg bg-emerald-500 flex items-center justify-center shrink-0 shadow-sm">
              <svg viewBox="0 0 14 14" fill="none" className="w-4 h-4"><path d="M7 2L2 5v7h4V9h2v3h4V5L7 2z" fill="white"/></svg>
            </div>
            <span className="text-[13px] font-black text-slate-900 tracking-tight leading-tight">TOUCH<br/>CLASS</span>
          </div>
          <div className="h-px bg-slate-100 mx-3 mb-2"/>
          <nav className="flex-1 px-3 pb-6 space-y-0.5">
            {SIDEBAR_MENUS.map(menu => (
              <React.Fragment key={menu.id}>
                <div>
                  <button
                    onClick={() => menu.hasChildren && toggleSideMenu(menu.id)}
                    className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[14px] font-semibold transition-colors ${menu.active ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-600 hover:bg-slate-50'}`}>
                    {React.createElement(menu.icon, { size: 16, className: menu.active ? 'text-indigo-600' : 'text-slate-400' })}
                    <span className="flex-1 text-left">{menu.label}</span>
                    {menu.badge && <span className="w-4 h-4 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">{menu.badge}</span>}
                    {menu.hasChildren && <span className="text-slate-400">{sideExpanded.has(menu.id) ? <ChevronDown size={14}/> : <ChevronRight size={14}/>}</span>}
                  </button>
                  {menu.children && sideExpanded.has(menu.id) && (
                    <div className="ml-7 mt-0.5 space-y-0.5">
                      {menu.children.map(sub => (
                        <a key={sub.id} href="#"
                          className={`block px-3 py-1.5 rounded-md text-[13px] transition-colors ${sub.active ? 'text-indigo-700 font-bold' : 'text-slate-500 hover:bg-slate-50 font-medium'}`}>
                          {sub.label}
                        </a>
                      ))}
                    </div>
                  )}
                </div>

                {/* ── 코스 그룹 직후: 코스v2 섹션 (구분선으로 패러다임 분리) ── */}
                {menu.id === 'course' && (
                  <>
                    <div className="my-2 mx-1 h-px bg-slate-200"/>
                    {NEW_MENUS.map(newMenu => (
                      <div key={newMenu.id}>
                        <button
                          onClick={() => newMenu.hasChildren && toggleSideMenu(newMenu.id)}
                          title={newMenu.tooltip || ''}
                          className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[14px] font-semibold transition-colors
                            ${newMenu.isHighlight ? 'text-slate-700 font-bold bg-emerald-50/60 hover:bg-emerald-50' : 'text-slate-600 hover:bg-slate-50'}`}
                        >
                          {React.createElement(newMenu.icon, { size: 16, className: newMenu.isHighlight ? 'text-emerald-600' : 'text-slate-400' })}
                          <span className="flex-1 text-left">{newMenu.label}</span>
                          {newMenu.badge && (
                            <span className="w-4 h-4 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">{newMenu.badge}</span>

                    {label:'결석', val:calPopover.abs,     color:'text-red-500',     bg:'bg-rose-50'},
                    {label:'미확인', val:calPopover.pending, color:'text-slate-400', bg:'bg-slate-50'},
                  ].map(s=>(
                    <div key={s.label} className={`${s.bg} rounded-xl p-3 text-center`}>
                      <div className={`text-[22px] font-black ${s.color} leading-none`}>{s.val}</div>
                      <div className={`text-[11px] font-bold ${s.color} mt-1`}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  {calPopover.date === TODAY && (
                    <button onClick={()=>{setLiveMode(true);setCalPopover(null);}}
                      className="flex-1 flex items-center justify-center gap-1.5 px-4 py-2.5 bg-indigo-500 text-white rounded-xl text-[14px] font-bold hover:bg-indigo-600 transition-colors shadow-sm">
                      <QrCode size={14}/> QR 출석
                    </button>
                  )}
                  <button onClick={()=>{setTab('attendance');setOpenPkgs(prev=>new Set([...prev,calPopover.pkgId]));setCalPopover(null);}}
                    className="flex-1 flex items-center justify-center gap-1.5 px-4 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-[14px] font-bold hover:bg-slate-200 transition-colors">
                    <CheckSquare size={14}/> 출석탭에서 보기
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
        {/* ── 출석 명단 모달 ── */}
        {attModal && (()=>{
          const {pkg:mp,session:ms,pkgL:mL}=attModal;
          const FILTERS=[
            {key:'all',label:'전체'},
            {key:'att',label:'출석·지각'},
            {key:'absent',label:'결석'},
            {key:'pending',label:'미확인'},
          ];
          const filtered=mL.filter(l=>{
            const st=attendanceMap[`${l.id}_${ms.id}`]||'pending';
            const matchFilter=
              modalFilter==='all'||
              (modalFilter==='att'&&['attended','late','early_leave'].includes(st))||
              (modalFilter==='absent'&&st==='absent')||
              (modalFilter==='pending'&&st==='pending');
            const matchSearch=!modalSearch||l.name.includes(modalSearch);
            return matchFilter&&matchSearch;
          });
          return (
            <div className="fixed inset-0 z-[300] flex items-center justify-center bg-black/40 animate-fadeIn"
              onClick={()=>setAttModal(null)}>
              <div className="bg-white rounded-2xl shadow-2xl w-[600px] max-h-[80vh] flex flex-col animate-modalFade"
                onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                  <div>
                    <div className="text-[15px] font-bold text-slate-800">
                      {ms.label||`${ms.date.slice(5).replace('-','/')} 회차`} 출석 명단
                    </div>
                    <div className="text-[13px] text-slate-400 mt-0.5">{mp.name} · 총 {mL.length}명 · {ms.start}~{ms.end}</div>
                  </div>
                  <button onClick={()=>setAttModal(null)} className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-colors">
                    <X size={15}/>
                  </button>
                </div>
                <div className="px-5 pt-3 pb-2 flex items-center gap-3 border-b border-slate-100">
                  <div className="flex gap-1">
                    {FILTERS.map(f=>{
                      const cnt=f.key==='all'?mL.length:mL.filter(l=>{
                        const st=attendanceMap[`${l.id}_${ms.id}`]||'pending';
                        return (f.key==='att'&&['attended','late','early_leave'].includes(st))||(f.key==='absent'&&st==='absent')||(f.key==='pending'&&st==='pending');
                      }).length;
                      return (
                        <button key={f.key} onClick={()=>setModalFilter(f.key)}
                          className={`px-3 py-1 rounded-lg text-[13px] font-bold transition-colors ${modalFilter===f.key?'bg-indigo-600 text-white':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                          {f.label} <span className="opacity-70">{cnt}</span>
                        </button>
                      );
                    })}
                  </div>
                  <div className="flex-1">
                    <input value={modalSearch} onChange={e=>setModalSearch(e.target.value)}
                      placeholder="이름 검색..."
                      className="w-full px-3 py-1.5 text-[13px] border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-400 bg-slate-50"/>
                  </div>
                </div>
                <div className="overflow-y-auto flex-1">
                  {filtered.length===0
                    ? <div className="py-10 text-center text-[14px] text-slate-300">해당 조건의 수강생이 없습니다</div>
                    : <table className="w-full text-[13px]">
                        <thead className="bg-slate-50 sticky top-0">
                          <tr>
                            <th className="px-4 py-2.5 text-left font-bold text-slate-500 text-[12px]">이름</th>
                            <th className="px-4 py-2.5 text-center font-bold text-slate-500 text-[12px]">상태</th>
                            <th className="px-4 py-2.5 text-center font-bold text-slate-500 text-[12px]">QR 스캔</th>
                            <th className="px-4 py-2.5 text-center font-bold text-slate-500 text-[12px]">관리자 인정</th>
                            <th className="px-4 py-2.5 text-center font-bold text-slate-500 text-[12px]">변경</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filtered.map((l,li)=>{
                            const key=`${l.id}_${ms.id}`;
                            const st=attendanceMap[key]||'pending';
                            const cfg=ATT_CFG[st];
                            const scanTs=scanTimeMap[key];
                            const manTs=tsMap[key];
                            const isDDOpen=openDropdown===`modal_${key}`;
                            const reason=reasonMap[key];
                            const canReason=st==='early_leave'||st==='absent';
                            return (
                              <tr key={l.id} className={`border-t border-slate-100 hover:bg-slate-50 transition-colors ${li%2===0?'bg-white':'bg-slate-50/30'}`}>
                                <td className="px-4 py-2.5 font-bold text-slate-700">{l.name}</td>
                                <td className="px-4 py-2.5 text-center">
                                  <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[12px] font-bold ${cfg.bg} ${cfg.color} ${cfg.border} border`}>
                                    {cfg.label}
                                  </span>
                                  {reason && (
                                    <div className="mt-0.5 text-[11px] text-orange-600 font-medium flex items-center justify-center gap-0.5" title={`사유: ${reason}`}>
                                      사유: {reason}
                                    </div>
                                  )}
                                </td>
                                <td className="px-4 py-2.5 text-center text-[12px] font-mono text-slate-500">
                                  {scanTs?<span className="flex items-center justify-center gap-1"><QrCode size={9} className="text-indigo-400"/>{scanTs.slice(11,16)}</span>:<span className="text-slate-200">—</span>}
                                </td>
                                <td className="px-4 py-2.5 text-center text-[12px] font-mono text-slate-500">
                                  {manTs?<span className="flex items-center justify-center gap-1"><Pencil size={9}/>{manTs.slice(11,16)}</span>:<span className="text-slate-200">—</span>}
                                </td>
                                <td className="px-4 py-2.5 text-center">
                                  <div className="inline-block">
                                    <button onClick={e=>toggleDD(`modal_${key}`,e)}
                                      className={`px-2.5 py-1 rounded-lg border text-[12px] font-bold transition-colors ${cfg.bg} ${cfg.color} ${cfg.border} hover:opacity-75`}>
                                      변경 <ChevronDown size={9} className="inline"/>
                                    </button>
                                    {isDDOpen && (
                                      <div className="fixed z-[400] bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden w-[210px] animate-fadeIn"
                                        onClick={e=>e.stopPropagation()}
                                        style={{left:dropdownPos.x,top:dropdownPos.y}}>
                                        {['attended','late','early_leave','absent'].map(opt=>(
                                          <button key={opt}
                                            onClick={()=>{recordAttendance(l.id,ms.id,opt,mp.id,l.name); if(opt!=='early_leave'&&opt!=='absent') setOpenDropdown(null);}}
                                            className={`w-full flex items-center gap-2 px-3 py-2 text-[13px] font-bold text-left transition-colors ${st===opt?`${ATT_CFG[opt].bg} ${ATT_CFG[opt].color}`:'text-slate-600 hover:bg-slate-50'}`}>
                                            {st===opt?<CheckCircle size={11} className="shrink-0"/>:<span className="w-[11px] shrink-0 inline-block"/>}
                                            {ATT_CFG[opt].label}
                                          </button>
                                        ))}
                                        <div className="my-1 border-t border-slate-100"/>
                                        <button onClick={()=>{recordAttendance(l.id,ms.id,'pending',mp.id,l.name);setOpenDropdown(null);}}
                                          className="w-full flex items-center gap-2 px-3 py-2 text-[12px] text-slate-400 hover:bg-slate-50 text-left transition-colors">
                                          <span className="w-[11px] shrink-0 inline-block"/>미확인으로
                                        </button>
                                        {canReason && (
                                          <div className="border-t border-slate-100 px-3 py-2.5 bg-orange-50/40">
                                            <div className="text-[11px] font-bold text-orange-700 mb-1.5 flex items-center gap-1">
                                              사유 (선택)
                                            </div>
                                            <div className="flex flex-wrap gap-1 mb-1.5">
                                              {REASON_PRESETS.map(r=>(
                                                <button key={r} onClick={()=>setAttReason(l.id,ms.id,r)}
                                                  className={`px-2 py-0.5 rounded-md text-[11px] font-bold border transition-colors ${reason===r?'bg-orange-500 text-white border-orange-500':'bg-white text-slate-600 border-slate-200 hover:border-orange-300'}`}>
                                                  {r}
                                                </button>
                                              ))}
                                            </div>
                                            <input type="text" value={reason||''} onChange={e=>setAttReason(l.id,ms.id,e.target.value)}
                                              placeholder="사유 직접 입력"
                                              className="w-full border border-slate-200 rounded-md px-2 py-1 text-[12px] focus:border-orange-400 outline-none"/>
                                            <button onClick={()=>setOpenDropdown(null)}
                                              className="w-full mt-1.5 py-1 bg-slate-800 hover:bg-slate-900 text-white rounded-md text-[11px] font-bold">완료</button>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                  }
                </div>
              </div>
            </div>
          );
        })()}
        </div>

        {/* ══ 코스 만들기 모달 (코스v2 진입) ══ */}
        {showCreateModal && (
          <div
            className="fixed inset-0 z-[100] bg-slate-900/40 flex items-center justify-center p-6"
            onClick={() => setShowCreateModal(false)}
          >
            <div
              className="bg-[#f7f9fc] rounded-3xl shadow-2xl w-[1100px] max-w-[95vw] max-h-[92vh] overflow-y-auto p-12 relative"
              onClick={e => e.stopPropagation()}
            >
              <button
                onClick={() => setShowCreateModal(false)}
                className="absolute top-5 right-5 w-9 h-9 rounded-full flex items-center justify-center text-slate-400 hover:bg-slate-100 hover:text-slate-700 transition-colors"
                aria-label="닫기"
              >
                <X size={18}/>
              </button>

              <h1 className="text-[34px] font-black text-center text-slate-900 mb-14">어떤 코스를 개설하시겠어요?</h1>

              <div className="grid grid-cols-2 gap-6 max-w-[820px] mx-auto">
                <button
                  onClick={() => goBuilder('online')}
                  className="group text-left bg-white rounded-2xl p-7 border border-slate-200 hover:border-indigo-300 hover:shadow-lg transition-all relative overflow-hidden"
                >
                  <div className="w-14 h-14 rounded-xl bg-indigo-50 flex items-center justify-center mb-5">
                    <Monitor size={26} className="text-indigo-600"/>
                  </div>
                  <h3 className="text-[19px] font-black text-slate-900 mb-2.5">온라인 코스</h3>
                  <p className="text-[14.5px] text-slate-500 leading-relaxed mb-5">
                    비대면·자기주도 학습 과정을 설계합니다.<br/>VOD, 문서, 시험을 자유롭게 조합하세요.
                  </p>
                  <div className="flex flex-wrap gap-1.5">
                    <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">VOD</span>
                    <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">문서</span>
                    <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">시험/퀴즈</span>
                  </div>
                </button>

                <button
                  onClick={() => goBuilder('offline')}
                  className="group text-left bg-white rounded-2xl p-7 border border-slate-200 hover:border-rose-300 hover:shadow-lg transition-all relative overflow-hidden"
                >
                  <div className="w-14 h-14 rounded-xl bg-rose-50 flex items-center justify-center mb-5">
                    <MapPin size={26} className="text-rose-600"/>
                  </div>
                  <h3 className="text-[19px] font-black text-slate-900 mb-2.5">오프라인 코스</h3>
                  <p className="text-[14.5px] text-slate-500 leading-relaxed mb-5">
                    집합 교육과 출석 관리에 최적화된 플로우입니다.<br/>QR 출석 및 회차 관리를 지원합니다.
                  </p>
                  <div className="flex flex-wrap gap-1.5">
                    <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">회차 관리</span>
                    <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">QR 출석</span>
                    <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">수기 처리</span>
                  </div>
                </button>
              </div>

              <p className="text-center text-[12.5px] text-slate-400 mt-12">등록 후에도 코스 유형 일부 설정은 변경 가능합니다</p>
            </div>
          </div>
        )}
      </div>
    );
  };

  createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="feature-highlight.js"></script>
</body>
</html>
