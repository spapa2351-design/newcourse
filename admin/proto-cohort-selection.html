<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블렌디드 차수 슬롯 — 선택 정책별 모습 (탐색)</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;letter-spacing:-0.3px;}</style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">
<div class="max-w-5xl mx-auto px-5 py-8">

  <header class="mb-6">
    <div class="text-[12px] font-bold tracking-widest text-indigo-500 uppercase mb-1">블렌디드 빌더 · 탐색</div>
    <h1 class="text-2xl font-black text-slate-900">차수(집합 수업) 슬롯 — 선택 정책별로 어떻게 되나</h1>
    <p class="text-[14px] text-slate-500 mt-2 leading-relaxed">같은 차수 슬롯(<b>오프라인 실습 워크숍</b>)이 <b>selectionType</b>에 따라 빌더(관리자 입력)와 학습자(수강 선택)에서 어떻게 달라지는지. Phase 1은 <b>고정</b>만, 나머지는 Phase 2 확장.</p>
  </header>

  <!-- 모드 탭 -->
  <div class="flex gap-2 mb-5">
    <button data-mode="fixed" class="mode-tab px-4 py-2.5 rounded-xl text-[14px] font-bold border-2 transition-all border-indigo-500 bg-indigo-600 text-white">
      고정 일정 <span class="text-[11px] font-bold opacity-80">· Phase 1</span>
    </button>
    <button data-mode="session" class="mode-tab px-4 py-2.5 rounded-xl text-[14px] font-bold border-2 transition-all border-slate-200 bg-white text-slate-600">
      회차 선택형 <span class="text-[11px] font-bold opacity-60">· Phase 2</span>
    </button>
    <button data-mode="cohort" class="mode-tab px-4 py-2.5 rounded-xl text-[14px] font-bold border-2 transition-all border-slate-200 bg-white text-slate-600">
      반 택1 <span class="text-[11px] font-bold opacity-60">· Phase 2</span>
    </button>
  </div>

  <div id="desc" class="mb-5 rounded-xl bg-slate-900 text-white px-5 py-4 text-[14px] leading-relaxed"></div>

  <div class="grid md:grid-cols-2 gap-5">
    <!-- 빌더 측 -->
    <div>
      <div class="text-[12px] font-black text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2"><span class="w-5 h-5 rounded bg-slate-800 text-white flex items-center justify-center text-[10px]">A</span> 빌더 (관리자 입력)</div>
      <div id="builder" class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm"></div>
    </div>
    <!-- 학습자 측 -->
    <div>
      <div class="text-[12px] font-black text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2"><span class="w-5 h-5 rounded bg-indigo-500 text-white flex items-center justify-center text-[10px]">B</span> 학습자 (수강 화면)</div>
      <div id="learner" class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm"></div>
    </div>
  </div>

  <div class="mt-6 text-[12px] text-slate-400">탐색용 프로토 · selectionType: fixed(기본) / session / cohort · 백엔드는 slot.cohorts[] 1:N + selectionType 자리 미리 확보</div>
</div>

<script>
  // ── 차수 슬롯 한 줄(회차) ──
  function sessRow(n, date, time, place, opts) {
    opts = opts || {};
    const pick = opts.pick; // 'radio' | null
    const checked = opts.checked ? 'checked' : '';
    const left = pick === 'radio'
      ? `<input type="radio" name="${opts.group}" ${checked} class="w-4 h-4 accent-indigo-600 shrink-0">`
      : `<span class="text-[12px] font-black text-orange-600 w-4 text-center shrink-0">${n}</span>`;
    return `<div class="flex items-center gap-2 bg-white border border-slate-200 rounded-md px-2 py-1.5">
      ${left}
      <span class="text-[11px] border border-slate-200 rounded px-1.5 py-0.5 text-slate-600 shrink-0">${date}</span>
      <span class="text-[11px] text-slate-500 shrink-0">${time}</span>
      <span class="text-[11px] text-slate-500 flex-1 truncate">${place}</span>
    </div>`;
  }

  // ── 빌더: 차수 슬롯 카드 헤더 (공통) ──
  function slotHead(badge) {
    return `<div class="flex items-center gap-2 mb-3">
      <div class="w-7 h-7 rounded-lg bg-orange-100 text-orange-700 flex items-center justify-center text-[13px]">▤</div>
      <input value="오프라인 실습 워크숍" class="flex-1 text-[13px] font-bold text-slate-800 border-b border-transparent hover:border-slate-300 outline-none">
      ${badge || ''}
      <span class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-indigo-50 text-indigo-600 border border-indigo-200">필수</span>
    </div>
    <div class="mb-3"><span class="text-[10px] font-bold text-indigo-500 mr-1">이수</span><span class="text-[11px] text-slate-500">오프라인 출석 (수료 조건 기준)</span></div>`;
  }

  const MODES = {
    fixed: {
      desc: `<b>고정 일정 (Phase 1)</b> — 차수 1개, 회차는 정해진 일정. 학습자는 <b>선택하지 않고</b> 등록 1건으로 전부 참석. 빌더의 사이사이 배치 그대로, 모아놓을 필요 없음.`,
      builder: () => slotHead('') + `
        <div class="flex items-center gap-2 mb-2">
          <span class="text-[10px] font-black text-orange-700 bg-orange-50 border border-orange-200 px-1.5 py-0.5 rounded">정원</span>
          <input value="20" class="w-14 text-[12px] font-bold border border-slate-200 rounded px-1.5 py-0.5"><span class="text-[11px] text-slate-500">명</span>
          <span class="text-[10px] text-slate-400 ml-auto">2개 회차</span>
        </div>
        <div class="space-y-1">
          ${sessRow(1, '2026-07-15', '09:00–18:00', '본사 대교육장')}
          ${sessRow(2, '2026-07-22', '09:00–18:00', '본사 대교육장')}
          <button class="w-full py-1.5 border border-dashed border-orange-300 rounded-md text-[11px] font-bold text-orange-700">+ 회차 추가</button>
        </div>`,
      learner: () => `
        <div class="text-[13px] font-bold text-slate-800 mb-1">오프라인 실습 워크숍</div>
        <div class="text-[12px] text-slate-400 mb-3">집합 수업 2회 · 정해진 일정에 참석</div>
        <div class="space-y-2">
          <div class="flex items-center gap-2 border border-slate-200 rounded-lg px-3 py-2.5"><span class="text-[11px] font-bold text-indigo-600">1회차</span><span class="text-[13px] text-slate-700">7/15(수) 09:00–18:00 · 본사 대교육장</span></div>
          <div class="flex items-center gap-2 border border-slate-200 rounded-lg px-3 py-2.5"><span class="text-[11px] font-bold text-indigo-600">2회차</span><span class="text-[13px] text-slate-700">7/22(수) 09:00–18:00 · 본사 대교육장</span></div>
        </div>
        <div class="mt-3 text-[12px] text-slate-400">선택 없음 — 등록하면 전 회차에 참석</div>`
    },
    session: {
      desc: `<b>회차 선택형 (Phase 2)</b> — 차수 1개 안에서 학습자가 <b>들을 회차(날짜) 1개를 택1</b>. 빌더는 회차들을 "후보"로 등록 + 토글 ON. 오프라인 회차 선택형(sessionSelect) 그대로.`,
      builder: () => slotHead(`<span class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-amber-100 text-amber-700 border border-amber-300">회차 선택형 ON</span>`) + `
        <div class="flex items-center gap-2 mb-2">
          <span class="text-[10px] font-black text-orange-700 bg-orange-50 border border-orange-200 px-1.5 py-0.5 rounded">정원</span>
          <input value="20" class="w-14 text-[12px] font-bold border border-slate-200 rounded px-1.5 py-0.5"><span class="text-[11px] text-slate-500">명</span>
          <span class="text-[10px] text-amber-600 font-bold ml-auto">학습자가 1개 택</span>
        </div>
        <div class="space-y-1">
          ${sessRow(1, '2026-07-15', '09:00–12:00', '본사 교육장 A')}
          ${sessRow(2, '2026-07-22', '14:00–17:00', '본사 교육장 B')}
          ${sessRow(3, '2026-07-29', '09:00–12:00', '원격 화상')}
          <button class="w-full py-1.5 border border-dashed border-orange-300 rounded-md text-[11px] font-bold text-orange-700">+ 회차(후보) 추가</button>
        </div>`,
      learner: () => `
        <div class="text-[13px] font-bold text-slate-800 mb-1">오프라인 실습 워크숍</div>
        <div class="text-[12px] text-amber-600 font-bold mb-3">들을 회차 1개를 선택하세요</div>
        <div class="space-y-2">
          ${learnerPick('s', true, '7/15(수)', '09:00–12:00 · 본사 교육장 A')}
          ${learnerPick('s', false, '7/22(수)', '14:00–17:00 · 본사 교육장 B')}
          ${learnerPick('s', false, '7/29(수)', '09:00–12:00 · 원격 화상')}
        </div>`
    },
    cohort: {
      desc: `<b>반 택1 (Phase 2)</b> — 한 집합 수업에 <b>여러 반(A주중/B주말)</b>, 학습자가 반 1개 택1. 빌더는 슬롯 안에 <b>차수(반) 카드를 여러 개</b> 추가, 각 반에 회차. 슬롯 1 : 차수 N 구조.`,
      builder: () => slotHead(`<span class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-amber-100 text-amber-700 border border-amber-300">반 선택 ON</span>`) + `
        <div class="text-[10px] text-amber-600 font-bold mb-2">학습자가 반 1개 택 · 슬롯 안 차수 ${'2'}개</div>
        ${cohortCard('A반 (주중)', 20, [['1','2026-07-15','09:00–18:00','본사 대교육장'],['2','2026-07-22','09:00–18:00','본사 대교육장']])}
        ${cohortCard('B반 (주말)', 20, [['1','2026-07-18','09:00–18:00','본사 대교육장'],['2','2026-07-25','09:00–18:00','본사 대교육장']])}
        <button class="w-full mt-2 py-1.5 border border-dashed border-orange-300 rounded-md text-[11px] font-bold text-orange-700">+ 반(차수) 추가</button>`,
      learner: () => `
        <div class="text-[13px] font-bold text-slate-800 mb-1">오프라인 실습 워크숍</div>
        <div class="text-[12px] text-amber-600 font-bold mb-3">수강할 반을 선택하세요</div>
        <div class="space-y-2">
          ${learnerPick('c', true, 'A반 (주중)', '7/15·7/22 · 09:00–18:00 · 본사 대교육장')}
          ${learnerPick('c', false, 'B반 (주말)', '7/18·7/25 · 09:00–18:00 · 본사 대교육장')}
        </div>`
    }
  };

  function cohortCard(name, cap, rows) {
    return `<div class="border border-orange-200 rounded-lg p-2.5 mb-2 bg-orange-50/40">
      <div class="flex items-center gap-2 mb-1.5">
        <span class="text-[12px] font-bold text-slate-800">${name}</span>
        <span class="text-[10px] text-slate-400 ml-auto">정원 ${cap}명 · ${rows.length}회차</span>
      </div>
      <div class="space-y-1">${rows.map(r => sessRow(r[0], r[1], r[2], r[3])).join('')}</div>
    </div>`;
  }
  function learnerPick(group, checked, title, sub) {
    return `<label class="flex items-center gap-3 border-2 rounded-xl px-3 py-3 cursor-pointer ${checked ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200'}">
      <input type="radio" name="L${group}" ${checked ? 'checked' : ''} class="w-4 h-4 accent-indigo-600">
      <div><div class="text-[13px] font-bold text-slate-800">${title}</div><div class="text-[12px] text-slate-500">${sub}</div></div>
    </label>`;
  }

  function render(mode) {
    const m = MODES[mode];
    document.getElementById('desc').innerHTML = m.desc;
    document.getElementById('builder').innerHTML = m.builder();
    document.getElementById('learner').innerHTML = m.learner();
    document.querySelectorAll('.mode-tab').forEach(b => {
      const on = b.dataset.mode === mode;
      b.className = `mode-tab px-4 py-2.5 rounded-xl text-[14px] font-bold border-2 transition-all ${on ? 'border-indigo-500 bg-indigo-600 text-white' : 'border-slate-200 bg-white text-slate-600'}`;
    });
  }
  document.querySelectorAll('.mode-tab').forEach(b => b.addEventListener('click', () => render(b.dataset.mode)));
  render('fixed');
</script>
</body>
</html>
