    /* ─── M2 PeriodModal — 수강 기간 변경 (개인 단일 또는 다중 선택 일괄, 빌더 studyPeriod 3종(fixed/days/unlimited)과 정합) ─── */
    const PeriodModal = ({ enrollee, enrollees, onClose }) => {
      const targets = enrollees && enrollees.length ? enrollees : (enrollee ? [enrollee] : []);
      const isBulk = targets.length > 1;
      const [mode, setMode] = useState('unlimited'); // 'fixed' | 'days' | 'unlimited'
      const [startAt, setStartAt] = useState('2026-05-26T00:00');
      const [endAt,   setEndAt]   = useState('2026-12-31T23:59');
      const [days, setDays] = useState(90);
      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);
      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 animate-fadeIn" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-[480px] max-h-[90vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
            <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
              <h3 className="text-[15px] font-black text-slate-900 flex items-center gap-2">
                <MS name="schedule" size={18} className="text-indigo-500"/> 수강 기간 변경
              </h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
            </div>
            <div className="px-6 py-5 space-y-5">
              <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2.5 flex items-center gap-2">
                <MS name="person" size={15} className="text-emerald-600"/>
                <span className="text-[13px] font-bold text-emerald-700">
                  {isBulk ? `대상: ${targets.length}명 선택됨` : `대상: ${targets[0]?.name} · ${targets[0]?.userId}`}
                </span>
              </div>

              <label className="flex items-start gap-2 cursor-pointer">
                <input type="radio" checked={mode === 'fixed'} onChange={() => setMode('fixed')} className="accent-indigo-600 mt-1"/>
                <div className="flex-1">
                  <span className="text-[14px] font-bold text-slate-700">고정 기간</span>
                  {mode === 'fixed' && (
                    <div className="mt-2 flex items-center gap-2">
                      <input type="datetime-local" value={startAt} onChange={e => setStartAt(e.target.value)}
                        className="flex-1 border border-slate-200 rounded-lg px-2 py-1.5 text-[13px] font-mono focus:border-indigo-400 outline-none"/>
                      <span className="text-slate-400">~</span>
                      <input type="datetime-local" value={endAt} onChange={e => setEndAt(e.target.value)}
                        className="flex-1 border border-slate-200 rounded-lg px-2 py-1.5 text-[13px] font-mono focus:border-indigo-400 outline-none"/>
                    </div>
                  )}
                </div>
              </label>

              <label className="flex items-start gap-2 cursor-pointer">
                <input type="radio" checked={mode === 'days'} onChange={() => setMode('days')} className="accent-indigo-600 mt-1"/>
                <div className="flex-1">
                  <span className="text-[14px] font-bold text-slate-700">신청 후 N일</span>
                  {mode === 'days' && (
                    <div className="mt-2 flex items-center gap-2">
                      <input type="number" min={1} value={days} onChange={e => setDays(Math.max(1, parseInt(e.target.value) || 1))}

            </div>
            <div className="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">

                <MS name="check" size={14}/> 완료
              </button>
            </div>
          </div>
        </div>
      );

    /* ─── M3 AlarmModal — 종료 임박 알림 ─── */
    const AlarmModal = ({ enrollees, onClose }) => {
      const [channels, setChannels] = useState({ push: true, mail: false });
      // 종료 7일 이내 (2026-05-26 기준)
      const today = new Date('2026-05-26');
      const targets = enrollees.filter(e => {
        if (!e.endDate || e.endDate === '제한 없음') return false;
        const end = new Date(e.endDate);
        const diff = (end - today) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff <= 7;
      });
      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 animate-fadeIn" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-[460px] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>

              <h3 className="text-[15px] font-black text-slate-900 flex items-center gap-2">
                <MS name="notifications_active" size={18} className="text-amber-500"/> 종료 임박 알림
              </h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
            </div>
            <div className="px-6 py-5 space-y-4">
              <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
                <div className="text-[12px] font-bold text-amber-700 mb-1">종료 7일 이내</div>
                <div className="text-[24px] font-black text-amber-700 tabular-nums">{targets.length}<span className="text-[14px] ml-1">명</span></div>
                {targets.length > 0 && (
                  <div className="flex flex-wrap gap-1 mt-2">
                    {targets.slice(0, 8).map(t => (
                      <span key={t.id} className="text-[11px] font-bold text-amber-800 bg-white border border-amber-200 px-1.5 py-0.5 rounded">{t.name}</span>
                    ))}
                    {targets.length > 8 && <span className="text-[11px] font-bold text-amber-600">외 {targets.length - 8}명</span>}
                  </div>
                )}
              </div>
              <div>
                <div className="text-[13px] font-bold text-slate-500 mb-2">알림 채널</div>
                <div className="flex gap-3">
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={channels.push} onChange={() => setChannels(c => ({ ...c, push: !c.push }))} className="accent-indigo-600"/>
                    <span className="text-[14px] font-bold text-slate-700">푸시</span>
                  </label>
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={channels.mail} onChange={() => setChannels(c => ({ ...c, mail: !c.mail }))} className="accent-indigo-600"/>
                    <span className="text-[14px] font-bold text-slate-700">메일</span>
                  </label>
                </div>
              </div>
            </div>
            <div className="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">
              <button onClick={onClose} className="px-5 py-2.5 bg-white border border-slate-300 rounded-xl text-[14px] font-bold text-slate-600 hover:bg-slate-50">취소</button>
              <button onClick={onClose}
                disabled={targets.length === 0 || (!channels.push && !channels.mail)}
                className="px-6 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-200 disabled:text-slate-400 text-white rounded-xl text-[14px] font-bold flex items-center gap-1.5">
                <MS name="send" size={14}/> 발송
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ─── M5 GroupStudyModal — 그룹별 학습량 ─── */
    const GroupStudyModal = ({ groups, formatDuration, onClose }) => {
      const [q, setQ] = useState('');
      const filtered = groups.filter(g => g.group.includes(q));
      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);
      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 animate-fadeIn" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-[760px] max-h-[90vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
            <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
              <h3 className="text-[15px] font-black text-slate-900 flex items-center gap-2">
                <MS name="bar_chart" size={18} className="text-indigo-500"/> 그룹별 학습량
              </h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
            </div>
            <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between gap-2">
              <div className="relative">
                <MS name="search" size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"/>
                <input type="text" value={q} onChange={e => setQ(e.target.value)} placeholder="그룹 검색"
                  className="pl-8 pr-3 py-1.5 text-[13px] border border-slate-200 rounded-lg w-[220px] focus:border-indigo-400 outline-none"/>
              </div>
              <button className="text-[13px] font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 px-3 py-1.5 rounded-lg flex items-center gap-1">
                <MS name="download" size={12}/> 다운로드
              </button>
            </div>
            <div className="flex-1 overflow-y-auto custom-scrollbar">
              <table className="w-full text-[13px]">
                <thead className="bg-slate-50 border-b border-slate-200 sticky top-0">
                  <tr className="text-left text-slate-500 font-bold text-[12px]">
                    <th className="px-4 py-2.5">그룹</th>
                    <th className="px-4 py-2.5 w-[110px] text-right">인원</th>
                    <th className="px-4 py-2.5 w-[140px] text-right">평균 진도율</th>
                    <th className="px-4 py-2.5 w-[140px] text-right">평균 학습시간</th>
                    <th className="px-4 py-2.5 w-[140px] text-right">총 학습시간</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(g => (
                    <tr key={g.group} className="border-t border-slate-100 hover:bg-slate-50">
                      <td className="px-4 py-3 font-bold text-slate-800">{g.group}</td>
                      <td className="px-4 py-3 text-right tabular-nums text-slate-600 font-semibold">{g.count}명</td>
                      <td className="px-4 py-3 text-right">
                        <span className={`tabular-nums font-black ${g.avgProgress >= 75 ? 'text-emerald-600' : g.avgProgress >= 50 ? 'text-indigo-600' : 'text-rose-500'}`}>{g.avgProgress}%</span>
                      </td>
                      <td className="px-4 py-3 text-right tabular-nums text-slate-700 font-bold">{formatDuration(g.avgStudyMin * 60)}</td>
                      <td className="px-4 py-3 text-right tabular-nums text-slate-700 font-bold">{formatDuration(g.totalStudyMin * 60)}</td>
                    </tr>
                  ))}
                  {filtered.length === 0 && (
                    <tr><td colSpan={5} className="text-center py-12 text-slate-400 text-[13px]">검색 결과가 없습니다.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    /* ─── M7 EndCourseModal — 운영 종료 4-액션 분리 ───
       [[project_newcourse_operating_period_rebuttal]] 정책:
         휴면 / 정상 종료 / 긴급 차단 (3-카드 선택) */
    const EndCourseModal = ({ onClose }) => {
      const [selected, setSelected] = useState(null);
      const [confirmText, setConfirmText] = useState('');
      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      const ACTIONS = [
        {
          k: 'pause',
          icon: 'pause_circle',
          color: 'slate',
          title: '휴면',
          tagline: '재개 가능',
          desc: '신규 등록·학습을 일시 중단합니다. 다시 운영 재개할 수 있습니다.',
          impact: '신규 등록 ✕ · 기존 학습 ✕ · 재개 가능 ◯',
          requireConfirm: false,
        },
        {
          k: 'normal-end',
          icon: 'event_busy',
          color: 'indigo',
          title: '정상 종료',
          tagline: '신규 등록만 마감',
          desc: '신규 등록을 막고, 기존 학습자는 수강 기간 안에서 학습을 마칠 수 있습니다.',
          impact: '신규 등록 ✕ · 기존 학습 ◯ (수강 기간 내)',
          requireConfirm: false,
          recommended: true,
        },
        {
          k: 'force-block',
          icon: 'block',
          color: 'rose',
          title: '긴급 차단',
          tagline: '즉시 학습 중단',
          desc: '신규 등록과 기존 학습자의 학습을 즉시 중단합니다. 사고·법적 이슈 등 비상 상황에서만 사용합니다.',
          impact: '신규 등록 ✕ · 기존 학습 ✕ (즉시) · 재개 불가',
          requireConfirm: true,
        },
      ];

      const COLOR_MAP = {
        slate:  { bg: 'bg-slate-50',  text: 'text-slate-600',  border: 'border-slate-300',  ring: 'ring-slate-400',  btn: 'bg-slate-600 hover:bg-slate-700' },
        indigo: { bg: 'bg-indigo-50', text: 'text-indigo-600', border: 'border-indigo-300', ring: 'ring-indigo-400', btn: 'bg-indigo-600 hover:bg-indigo-700' },
        rose:   { bg: 'bg-rose-50',   text: 'text-rose-600',   border: 'border-rose-300',   ring: 'ring-rose-400',   btn: 'bg-rose-500 hover:bg-rose-600' },
      };

      const chosen = ACTIONS.find(a => a.k === selected);
      const co     = chosen ? COLOR_MAP[chosen.color] : null;
      const canSubmit = chosen && (!chosen.requireConfirm || confirmText === '긴급 차단');

      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 animate-fadeIn" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-[680px] max-h-[92vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>

            {/* 헤더 */}
            <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0">
              <h3 className="text-[15px] font-black text-slate-900 flex items-center gap-2">
                <MS name="stop_circle" size={18} className="text-slate-500"/> 코스 운영 종료
              </h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
            </div>

            {/* 안내 */}
            <div className="px-6 pt-5 pb-3 shrink-0">
              <p className="text-[13px] text-slate-500 leading-relaxed">
                상황에 맞는 종료 방식을 선택하세요.
              </p>
            </div>

            {/* 3-카드 */}
            <div className="px-6 pb-4 flex-1 overflow-y-auto custom-scrollbar">
              <div className="space-y-2.5">
                {ACTIONS.map(a => {
                  const ac = COLOR_MAP[a.color];
                  const isSel = selected === a.k;
                  return (
                    <button key={a.k} onClick={() => { setSelected(a.k); setConfirmText(''); }}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-3
                        ${isSel ? `${ac.border} ${ac.bg} ring-2 ${ac.ring} ring-opacity-30` : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                      <div className={`w-10 h-10 rounded-xl ${ac.bg} ${isSel ? 'ring-1 ring-white' : ''} flex items-center justify-center shrink-0`}>
                        <MS name={a.icon} size={20} className={ac.text}/>
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-[15px] font-black text-slate-900">{a.title}</span>
                          <span className={`text-[11px] font-bold ${ac.text} ${ac.bg} px-1.5 py-0.5 rounded`}>{a.tagline}</span>
                          {a.recommended && <span className="text-[10px] font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded">권장</span>}
                          {a.requireConfirm && <span className="text-[10px] font-bold text-rose-700 bg-rose-50 border border-rose-200 px-1.5 py-0.5 rounded">2차 확인</span>}
                        </div>
                        <p className="text-[12.5px] text-slate-600 leading-relaxed mb-1.5">{a.desc}</p>
                        <p className="text-[11.5px] font-bold text-slate-400 tabular-nums">{a.impact}</p>
                      </div>
                      <div className={`w-5 h-5 rounded-full border-2 shrink-0 mt-1 flex items-center justify-center ${isSel ? `${ac.border} ${ac.bg}` : 'border-slate-300 bg-white'}`}>
                        {isSel && <div className={`w-2.5 h-2.5 rounded-full ${ac.btn.split(' ')[0]}`}/>}
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* 2차 확인 (긴급 차단) */}
              {chosen?.requireConfirm && (
                <div className="mt-4 bg-rose-50 border border-rose-200 rounded-xl p-4">
                  <div className="flex items-center gap-2 mb-2">
                    <MS name="warning" size={15} className="text-rose-600"/>
                    <span className="text-[13px] font-black text-rose-700">긴급 차단 확인</span>
                  </div>
                  <p className="text-[12.5px] text-rose-700 mb-2.5 leading-relaxed">
                    학습자가 즉시 학습을 못 합니다. 재개도 불가합니다. 진행하려면 아래 칸에 <span className="font-black">긴급 차단</span> 을 입력하세요.
                  </p>
                  <input type="text" value={confirmText} onChange={e => setConfirmText(e.target.value)}
                    placeholder="긴급 차단"
                    className="w-full border border-rose-300 rounded-lg px-3 py-2 text-[13px] font-mono focus:border-rose-500 outline-none bg-white"/>
                </div>
              )}
            </div>

            {/* 풋터 */}
            <div className="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2 shrink-0">
              <button onClick={onClose} className="px-5 py-2.5 bg-white border border-slate-300 rounded-xl text-[14px] font-bold text-slate-600 hover:bg-slate-50">취소</button>
              <button onClick={onClose}
                disabled={!canSubmit}
                className={`px-6 py-2.5 rounded-xl text-[14px] font-bold flex items-center gap-1.5 transition-colors
                  ${canSubmit ? `${co.btn} text-white` : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                <MS name={chosen?.icon || 'check'} size={14}/>
                {chosen ? `${chosen.title} 실행` : '방식 선택'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
