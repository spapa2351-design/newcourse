    const {

      BookOpen, QrCode, Eye, GripVertical, Settings, Filter, ImageIcon, FileText,
      MessageSquare, Play, BarChart2, User,
    } = Lucide;

    /* ══════════════════════════════════════
       더미 데이터 (오프라인 코스 전용)
    ══════════════════════════════════════ */
    const COURSES = [
      { id: 1, title: '2026 직무교육 — 프로젝트 관리 심화', status: 'active', thumb: '', instructor: '김민준', creator: 'jiyoungkim', category: '직무 역량', registeredAt: '2026/04/08 14:28', enrollMethod: 'self',
        totalEnrolled: 55, totalCapacity: 60,

        totalEnrolled: 0, totalCapacity: 120,
        packages: [
          { name: 'A반 (초급)', startDate: '2026-05-12', endDate: '2026-05-12', place: '판교 연수원', capacity: 40, enrolled: 0, sessions: 3 },
          { name: 'B반 (중급)', startDate: '2026-05-13', endDate: '2026-05-13', place: '판교 연수원', capacity: 40, enrolled: 0, sessions: 3 },
          { name: 'C반 (심화)', startDate: '2026-05-14', endDate: '2026-05-14', place: '강남 교육장', capacity: 40, enrolled: 0, sessions: 2 },

        totalEnrolled: 120, totalCapacity: 150,
        packages: [

          { name: '2기 (4/14~4/18)', startDate: '2026-04-14', endDate: '2026-04-18', place: '한샘 HQ 대교육장', capacity: 30, enrolled: 30, sessions: 5 },
          { name: '3기 (4/21~4/25)', startDate: '2026-04-21', endDate: '2026-04-25', place: '판교 연수원', capacity: 30, enrolled: 30, sessions: 5 },
          { name: '4기 (4/28~4/30)', startDate: '2026-04-28', endDate: '2026-04-30', place: '판교 연수원', capacity: 30, enrolled: 20, sessions: 3 },
          { name: '5기 (5/7~5/9)', startDate: '2026-05-07', endDate: '2026-05-09', place: '강남 교육장', capacity: 30, enrolled: 10, sessions: 3 },
        ]},
      { id: 11, title: '신임 팀장 리더십 캠프', status: 'active', thumb: '', instructor: '최예진', otherInstructors: ['정현우','한지민'], creator: 'jaewan.na', category: '리더십', registeredAt: '2026/04/05 11:20', enrollMethod: 'self',
        totalEnrolled: 38, totalCapacity: 50,
        packages: [
          { name: '1차 워크숍', startDate: '2026-05-20', endDate: '2026-05-20', place: '한샘 HQ 세미나룸', capacity: 25, enrolled: 20, sessions: 2 },
          { name: '2차 워크숍', startDate: '2026-06-10', endDate: '2026-06-10', place: '한샘 HQ 세미나룸', capacity: 25, enrolled: 18, sessions: 2 },
        ]},
      { id: 12, title: '영업 전략 부트캠프 (5기)', status: 'draft', thumb: '', instructor: '김도윤', creator: 'jiyoungkim', category: '영업', registeredAt: '2026/04/06 13:10', enrollMethod: 'self',
        totalEnrolled: 0, totalCapacity: 100,
        packages: [
          { name: '집합교육 1주차', startDate: '2026-06-02', endDate: '2026-06-06', place: '판교 연수원', capacity: 25, enrolled: 0, sessions: 5 },
          { name: '집합교육 2주차', startDate: '2026-06-15', endDate: '2026-06-19', place: '판교 연수원', capacity: 25, enrolled: 0, sessions: 5 },
          { name: '집합교육 3주차', startDate: '2026-07-01', endDate: '2026-07-03', place: '강남 교육장', capacity: 25, enrolled: 0, sessions: 3 },
          { name: '최종 발표', startDate: '2026-07-31', endDate: '2026-07-31', place: '한샘 HQ 대교육장', capacity: 100, enrolled: 0, sessions: 1 },
        ]},
      { id: 14, title: '하반기 신입사원 온보딩 (7월)', status: 'scheduled', thumb: '', instructor: '박지훈', creator: 'jiyoungkim', category: '공통/온보딩', registeredAt: '2026/04/28 09:00', enrollMethod: 'assign',
        scheduledAt: '2026-05-01T09:00',
        totalEnrolled: 0, totalCapacity: 80,
        packages: [
          { name: '1기 (7/1~7/3)', startDate: '2026-07-01', endDate: '2026-07-03', place: '판교 연수원', capacity: 40, enrolled: 0, sessions: 3 },
          { name: '2기 (7/7~7/9)', startDate: '2026-07-07', endDate: '2026-07-09', place: '판교 연수원', capacity: 40, enrolled: 0, sessions: 3 },
        ]},
    ];

    const CATEGORIES = [
      { id: 'all', label: '전체', children: [] },
      { id: 'work', label: 'WORK', children: [
        { id: 'job', label: '직무 역량' },
        { id: 'leader', label: '리더십' },
        { id: 'sales', label: '영업' },
      ]},
      { id: 'common', label: '공통/온보딩', children: [] },
      { id: 'it', label: 'IT', children: [] },
      { id: 'dx', label: 'DX', children: [] },
    ];

    /* ── 설정 맵 ── */
    const STATUS_CFG = {
      active:    { label: '운영중',   bg: 'bg-indigo-50',  text: 'text-indigo-600',  dot: 'bg-indigo-500' },
      published: { label: '운영중',   bg: 'bg-indigo-50',  text: 'text-indigo-600',  dot: 'bg-indigo-500' },
      scheduled: { label: '공개예약', bg: 'bg-violet-50',  text: 'text-violet-600',  dot: 'bg-violet-400 animate-pulse' },
      draft:     { label: '임시저장', bg: 'bg-slate-100',  text: 'text-slate-500',   dot: 'bg-slate-400' },
      saved:     { label: '임시저장', bg: 'bg-slate-100',  text: 'text-slate-500',   dot: 'bg-slate-400' },
      closed:    { label: '종료',     bg: 'bg-slate-50',   text: 'text-slate-400',   dot: 'bg-slate-300' },
    };

    const TODAY = '2026-04-28';

    const fmtDate = (d) => d ? d.replace(/-/g, '.').slice(5) : '';
    const fmtRange = (s, e) => {
      if (!s) return '-';
      const fs = fmtDate(s);
      return e && e !== s ? `${fs} ~ ${fmtDate(e)}` : fs;
    };

    /* ══════════════════════════════════════
       App
    ══════════════════════════════════════ */
    const App = () => {
      const [coverImages, setCoverImages] = useState({});
      const [courses, setCourses] = useState(COURSES);

      useEffect(() => {
        const map = {};
        COURSES.forEach(c => {
          const saved = localStorage.getItem('lms_cover_' + c.id);
          if (saved) {
            try { map[c.id] = JSON.parse(saved); } catch(e) {}
          }
        });
        setCoverImages(map);
      }, []);
      const [statusFilter, setStatusFilter] = useState('all');
      const [search, setSearch] = useState('');
      const [expandedIds, setExpandedIds] = useState(new Set());
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [catFilter, setCatFilter] = useState('all');
      const [expandedCats, setExpandedCats] = useState(new Set(['work']));
      const [activeFilters, setActiveFilters] = useState([]);
      const [filterPopup, setFilterPopup] = useState(null); // null | 'select' | fieldKey
      const [filterInput, setFilterInput] = useState('');

      const FILTER_FIELDS = [
        { key: 'instructor', label: '강사명' },
        { key: 'place',      label: '장소' },
        { key: 'enrollMethod', label: '수강 방식', options: [{ val:'self',label:'자율 수강' },{ val:'assign',label:'강제 할당' }] },
      ];

      const addFilter = (field, value) => {
        if (!value.trim()) return;
        setActiveFilters(prev => {
          const without = prev.filter(f => f.key !== field.key);
          return [...without, { key: field.key, label: field.label, value }];
        });
        setFilterPopup(null);
        setFilterInput('');
      };
      const removeFilter = (key) => setActiveFilters(prev => prev.filter(f => f.key !== key));

      const toggleExpand = (id) => setExpandedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
      const toggleSelect = (id) => setSelectedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
      const toggleCatExpand = (id) => setExpandedCats(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });

      /* ── 상태별 카운트 ── */
      const statusCounts = useMemo(() => ({
        all:       courses.length,
        active:    courses.filter(c => c.status === 'active' || c.status === 'published').length,
        scheduled: courses.filter(c => c.status === 'scheduled').length,
        draft:     courses.filter(c => c.status === 'draft' || c.status === 'saved').length,
        closed:    courses.filter(c => c.status === 'closed').length,
      }), [courses]);

      const filtered = useMemo(() => {
        let list = courses;
        if (statusFilter === 'active')    list = list.filter(c => c.status === 'active' || c.status === 'published');
        else if (statusFilter === 'scheduled') list = list.filter(c => c.status === 'scheduled');
        else if (statusFilter === 'draft') list = list.filter(c => c.status === 'draft' || c.status === 'saved');
        else if (statusFilter === 'closed') list = list.filter(c => c.status === 'closed');
        if (catFilter !== 'all') list = list.filter(c => c.category === catFilter);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          list = list.filter(c => c.title.toLowerCase().includes(q) || c.instructor.toLowerCase().includes(q));
        }
        activeFilters.forEach(f => {
          if (f.key === 'instructor') list = list.filter(c => c.instructor.toLowerCase().includes(f.value.toLowerCase()));
          if (f.key === 'place') list = list.filter(c => c.packages.some(p => p.place?.toLowerCase().includes(f.value.toLowerCase())));
          if (f.key === 'enrollMethod') list = list.filter(c => c.enrollMethod === f.value);
        });
        return list;
      }, [courses, statusFilter, catFilter, search, activeFilters]);

      const allSelected = filtered.length > 0 && filtered.every(c => selectedIds.has(c.id));
      const toggleAll = () => {
        if (allSelected) setSelectedIds(new Set());
        else setSelectedIds(new Set(filtered.map(c => c.id)));
      };

      const [deleteModal, setDeleteModal] = useState(null); // null | { type:'single', course } | { type:'bulk', courses:[] }
      const [deleteInput, setDeleteInput] = useState('');

      const handleDelete = (id) => {
        const course = courses.find(c => c.id === id);
        setDeleteInput('');
        setDeleteModal({ type: 'single', course });
      };

      const handleBulkDelete = () => {
        if (selectedIds.size === 0) return;
        const targets = courses.filter(c => selectedIds.has(c.id));
        setDeleteInput('');
        setDeleteModal({ type: 'bulk', courses: targets });
      };

      const executeDelete = () => {
        if (deleteModal.type === 'single') {
          setCourses(prev => prev.filter(c => c.id !== deleteModal.course.id));
          setSelectedIds(prev => { const n = new Set(prev); n.delete(deleteModal.course.id); return n; });
        } else {
          const ids = new Set(deleteModal.courses.map(c => c.id));
          setCourses(prev => prev.filter(c => !ids.has(c.id)));
          setSelectedIds(new Set());
        }
        setDeleteModal(null);
        setDeleteInput('');
      };

      /* ── 코스의 날짜 범위 요약 ── */
      const getDateRange = (course) => {
        if (course.packages.length === 0) return '-';
        const starts = course.packages.map(p => p.startDate).filter(Boolean).sort();
        const ends = course.packages.map(p => p.endDate).filter(Boolean).sort();
        if (starts.length === 0) return '-';
        return fmtRange(starts[0], ends[ends.length - 1]);
      };

      /* ── 장소 요약 ── */
      const getPlaceSummary = (course) => {
        const places = [...new Set(course.packages.map(p => p.place).filter(Boolean))];
        if (places.length === 0) return '';
        if (places.length === 1) return places[0];
        return `${places[0]} 외 ${places.length - 1}곳`;
      };

      /* ── 총 회차 수 ── */
      const getTotalSessions = (course) => course.packages.reduce((s, p) => s + (p.sessions || 0), 0);

      /* ── D-day ── */
      const getDday = (course) => {
        const today = new Date(TODAY);
        const upcoming = course.packages
          .map(p => p.startDate).filter(d => d && d >= TODAY).sort();
        if (upcoming.length === 0) return null;
        const diff = Math.round((new Date(upcoming[0]) - today) / 86400000);
        return diff === 0 ? 'D-Day' : `D-${diff}`;
      };

      const SIDEBAR_MENUS = [
        { id: 'member', label: '회원', icon: Users, hasChildren: true },
        { id: 'course', label: '코스', icon: BookOpen, hasChildren: true, children: [
          { id: 'course-main', label: '코스' },
          { id: 'course-plus', label: 'PLUS 코스' },
        ]},
        /* 오프라인/온라인 코스는 '코스v2' children으로 이동 (NEW_MENUS 참조) */
        { id: 'content', label: '콘텐츠', icon: Copy, hasChildren: true },
        { id: 'ttube', label: 'T튜브', icon: Monitor, hasChildren: true },
        { id: 'ai-quiz', label: 'AI 퀴메이커', icon: Star, badge: 'N' },
        { id: 'translation', label: 'Translation', icon: List, hasChildren: true },
        { id: 'question-bank', label: '문제 은행', icon: Archive },
        { id: 'opinion', label: '의견', icon: AlertCircle },
        { id: 'gamification', label: '게이미피케이션', icon: Grid3X3, hasChildren: true },
        { id: 'live', label: '라이브 스트리밍', icon: Eye, hasChildren: true },
        { id: 'touch', label: '터치투게더', icon: Users },
        { id: 'attendance', label: '출석 체크', icon: CheckCircle },
        { id: 'ai-chat', label: 'AI 챗봇', icon: Monitor, badge: 'N' },
        { id: 'stats', label: '통계', icon: Filter },
        { id: 'notice', label: '공지사항', icon: Archive },
        { id: 'popup', label: '팝업', icon: Layers },
      ];

      /* ── 코스v2 (newcourse 전통 LMS) ──
         기존 SIDEBAR의 오프라인/온라인 코스를 children으로 흡수. 이 페이지는 오프라인 코스 active.
         블렌디드는 Phase 2 — 사이드바·모달 양쪽 숨김.
      */
      const NEW_MENUS = [
        { id: 'course-v2', label: '코스v2', icon: BarChart2, isHighlight: true, badge: 'N', hasChildren: true, children: [
          { id: 'online-course',   label: '온라인 코스',   icon: Monitor, href: 'online-list.html',  tooltip: '영상 중심, 진도율 정확히 추적.' },
          { id: 'offline-course',  label: '오프라인 코스', icon: MapPin,  href: 'offline-list.html', active: true, tooltip: '오프라인 일정·출석 기반 코스.' },
        ]},
      ];

      const [sideExpanded, setSideExpanded] = useState(new Set(['course', 'course-v2']));
      const [showCreateModal, setShowCreateModal] = useState(false);

      React.useEffect(() => {
        if (!showCreateModal) return;
        const onKey = (e) => { if (e.key === 'Escape') setShowCreateModal(false); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [showCreateModal]);

      const goBuilder = (type) => {
        window.location.href = type === 'online' ? 'online-builder.html' : 'offline-builder.html';
      };
      const toggleSideMenu = (id) => setSideExpanded(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });

      /* ── 상태 필터 탭 정의 ── */
      const STATUS_TABS = [
        { key: 'all',       label: '전체' },
        { key: 'active',    label: '운영중' },
        { key: 'scheduled', label: '공개예약' },
        { key: 'draft',     label: '임시저장' },
        { key: 'closed',    label: '종료' },
      ];

      return (
        <div className="min-h-screen flex">

          {/* ══ 글로벌 좌측 사이드바 ══ */}
          <aside className="w-[200px] bg-white border-r border-slate-200 flex flex-col shrink-0 h-screen sticky top-0 overflow-y-auto custom-scrollbar">
            {/* 로고 */}
            <div className="px-4 py-4 flex items-center gap-2.5">
              <div className="w-7 h-7 rounded-lg bg-emerald-500 flex items-center justify-center shrink-0 shadow-sm">
                <svg viewBox="0 0 14 14" fill="none" className="w-4 h-4"><path d="M7 2L2 5v7h4V9h2v3h4V5L7 2z" fill="white"/></svg>
              </div>
              <span className="text-[13px] font-black text-slate-900 tracking-tight leading-tight">TOUCH<br/>CLASS</span>
            </div>
            <div className="h-px bg-slate-100 mx-3 mb-2"/>
            {/* 메뉴 */}
            <nav className="flex-1 px-3 pb-6 space-y-0.5">
              {SIDEBAR_MENUS.map(menu => (
                <React.Fragment key={menu.id}>
                  <div>
                    <button
                      onClick={() => menu.hasChildren && toggleSideMenu(menu.id)}
                      className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[14px] font-semibold transition-colors

                              {/* 상태 */}
                              <td className="px-3 py-3">
                                <span className={`inline-flex items-center gap-1 px-2 py-1 rounded text-[11px] font-bold whitespace-nowrap ${statusCfg.bg} ${statusCfg.text}`}>
                                  <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${statusCfg.dot}`}/>
                                  {statusCfg.label}
                                </span>
                              </td>
                              {/* 표지 썸네일 */}
                              <td className="px-3 py-2 text-center">
                                {coverImages[course.id] ? (
                                  <img src={coverImages[course.id].dataUrl} alt="표지"
                                    className="w-8 h-[53px] object-cover rounded border border-slate-200 inline-block"/>
                                ) : (
                                  <div className="w-8 h-[53px] bg-slate-100 border border-slate-200 rounded inline-flex items-center justify-center">
                                    <ImageIcon size={12} className="text-slate-300"/>
                                  </div>
                                )}
                              </td>
                              {/* 코스명 */}
                              <td className="px-3 py-3">
                                <div className="flex items-center gap-2">
                                  <a href={`offline-builder.html?courseId=${course.id}`} className="text-[14px] font-bold text-slate-800 hover:text-indigo-600 transition-colors leading-snug">
                                    {course.title}
                                  </a>
                                  {hasPackages && (
                                    <span className="shrink-0 text-[10px] font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">{course.packages.length}개 반</span>
                                  )}
                                </div>
                                {hasPackages && (
                                  <div className="text-[11px] text-slate-400 mt-0.5 flex items-center gap-1">
                                    <MapPin size={9}/> {getPlaceSummary(course)}
                                  </div>
                                )}
                                <div className="text-[11px] text-slate-400 mt-0.5 flex items-center gap-1">
                                  <User size={9} className="text-slate-300"/> {course.instructor}
                                  {course.otherInstructors && course.otherInstructors.length > 0 && (
                                    <span className="text-slate-500 font-semibold" title={course.otherInstructors.join(', ')}>외 {course.otherInstructors.length}명</span>
                                  )}
                                </div>
                              </td>
                              {/* 수강관리 */}
                              <td className="px-3 py-3 text-center" data-feature-id="A1-08">
                                {(isActive || course.status === 'closed') ? (
                                  <a href={`offline-view.html?id=${course.id}`} className="inline-flex items-center gap-1 bg-indigo-500 text-white px-2.5 py-1 rounded-md text-[11px] font-bold hover:bg-indigo-600 transition-colors whitespace-nowrap shadow-sm">
                                    <Users size={10}/> 수강관리
                                  </a>
                                ) : (
                                  <span className="inline-flex items-center gap-1 bg-slate-50 text-slate-300 border border-slate-200 px-2.5 py-1 rounded-md text-[11px] font-bold cursor-not-allowed whitespace-nowrap" title="퍼블리싱 후 이용 가능">
                                    <Users size={10}/> 수강관리
                                  </span>
                                )}
                              </td>
                              {/* 차수 */}
                              <td className="px-3 py-3">
                                <button onClick={() => toggleExpand(course.id)} className="inline-flex items-center gap-1 bg-violet-50 text-violet-600 border border-violet-200 px-2.5 py-1 rounded-md text-[11px] font-bold hover:bg-violet-100 transition-colors whitespace-nowrap">
                                  <Calendar size={10}/> {course.packages.length}개 · {totalSessions}회차
                                </button>
                              </td>
                              {/* 분류 */}
                              <td className="px-3 py-3">
                                <span className="inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[11px] font-bold">{course.category}</span>
                              </td>
                              {/* 교육 기간 */}
                              <td className="px-3 py-3 text-[12px] text-slate-600 font-medium" data-feature-id={dday ? 'A1-06' : (course.status === 'scheduled' ? 'A1-09' : undefined)}>
                                {getDateRange(course)}
                                {dday && (
                                  <span className={`ml-1.5 text-[10px] font-black px-1.5 py-0.5 rounded
                                    ${dday === 'D-Day'
                                      ? 'bg-rose-100 text-rose-600'
                                      : 'bg-amber-50 text-amber-600'}`}>
                                    {dday}
                                  </span>
                                )}
                                {course.status === 'scheduled' && course.scheduledAt && (
                                  <div className="text-[10px] text-violet-500 font-bold mt-0.5 flex items-center gap-0.5">
                                    <Clock size={9}/> {new Date(course.scheduledAt).toLocaleString('ko-KR', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})} 공개
                                  </div>
                                )}
                              </td>
                              {/* 수강 인원 */}
                              <td className="px-3 py-3 text-right">
                                <span className="text-[13px] font-black text-slate-800">{course.totalEnrolled}</span>
                                {course.totalCapacity > 0 && (
                                  <span className="text-[12px] text-slate-400 font-medium">/{course.totalCapacity}</span>
                                )}
                                {isFull && <span className="block text-[10px] font-bold text-rose-500">마감</span>}
                              </td>
                              {/* 등록일 */}
                              <td className="px-3 py-3 text-[12px] text-slate-500 font-medium">{course.registeredAt}</td>
                              {/* 생성자 */}
                              <td className="px-3 py-3 text-[12px] text-slate-500 font-medium">{course.creator}</td>
                              {/* 관리 */}
                              <td className="px-3 py-3">
                                <div className="flex items-center justify-center gap-0.5">
                                  <button className="p-1 text-slate-400 hover:text-indigo-600 transition-colors"><Link2 size={14}/></button>
                                  <a href={`offline-builder.html?courseId=${course.id}`} className="p-1 text-slate-400 hover:text-indigo-600 transition-colors"><Edit3 size={14}/></a>
                                  <button onClick={() => handleDelete(course.id)} className="p-1 text-slate-400 hover:text-rose-500 transition-colors"><Trash2 size={14}/></button>
                                </div>
                              </td>
                            </tr>

                            {/* ── 확장 행: 차수 상세 ── */}
                            {isExpanded && hasPackages && (
                              <tr className="animate-fadeIn">
                                <td colSpan="12" className="px-0 py-0">
                                  <div className="bg-[#f8f9fd] border-b border-slate-200 px-12 py-4">
                                    <div className="flex items-center gap-2 mb-3">
                                      <span className="text-[12px] font-bold text-slate-500">차수 상세</span>
                                      <span className="text-[11px] text-slate-400 font-medium">— {course.packages.length}개 차수 / 총 {totalSessions}회차</span>
                                    </div>
                                    <table className="w-full">
                                      <thead>
                                        <tr className="text-[11px] font-bold text-slate-400 border-b border-slate-200">
                                          <th className="text-left py-2 pr-4">차수명</th>
                                          <th className="text-left py-2 pr-4">기간</th>
                                          <th className="text-left py-2 pr-4">장소</th>
                                          <th className="text-center py-2 pr-4">회차</th>
                                          <th className="text-right py-2 pr-4">정원</th>
                                          <th className="text-right py-2 pr-4">신청</th>
                                          <th className="text-right py-2">잔여</th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {course.packages.map((pkg, i) => {
                                          const remaining = pkg.capacity - pkg.enrolled;
                                          const pctFull = pkg.capacity > 0 ? Math.round(pkg.enrolled / pkg.capacity * 100) : 0;
                                          return (
                                            <tr key={i} className="text-[12px] border-b border-slate-100 last:border-0">
                                              <td className="py-2 pr-4 font-bold text-slate-700">{pkg.name}</td>
                                              <td className="py-2 pr-4 text-slate-600">{fmtRange(pkg.startDate, pkg.endDate)}</td>
                                              <td className="py-2 pr-4 text-slate-500 flex items-center gap-1"><MapPin size={10} className="text-slate-300"/> {pkg.place}</td>
                                              <td className="py-2 pr-4 text-center text-slate-600">{pkg.sessions}회</td>
                                              <td className="py-2 pr-4 text-right text-slate-600">{pkg.capacity}명</td>
                                              <td className="py-2 pr-4 text-right font-bold text-slate-800">{pkg.enrolled}명</td>
                                              <td className="py-2 text-right">
                                                <span className={`font-bold ${remaining <= 0 ? 'text-rose-500' : remaining <= 5 ? 'text-amber-600' : 'text-emerald-600'}`}>
                                                  {remaining <= 0 ? '마감' : `${remaining}석`}
                                                </span>
                                                {remaining > 0 && pctFull >= 80 && (
                                                  <span className="text-[10px] text-amber-500 font-bold ml-1">임박</span>
                                                )}
                                              </td>
                                            </tr>
                                          );
                                        })}
                                      </tbody>
                                    </table>
                                    <div className="mt-3 flex items-center gap-2">
                                      <a href={`offline-builder.html?courseId=${course.id}`} className="text-[11px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1">
                                        <Edit3 size={10}/> 차수 편집
                                      </a>
                                      {(isActive || course.status === 'closed') ? (
                                        <a href={`offline-view.html?id=${course.id}`} className="text-[11px] font-bold text-white bg-indigo-500 px-3 py-1.5 rounded-lg hover:bg-indigo-600 transition-colors flex items-center gap-1 shadow-sm">
                                          <Users size={10}/> 수강관리
                                        </a>
                                      ) : (
                                        <span className="text-[11px] font-bold text-slate-300 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg flex items-center gap-1 cursor-not-allowed" title="퍼블리싱 후 이용 가능">
                                          <Users size={10}/> 수강관리
                                        </span>
                                      )}
                                    </div>
                                  </div>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>

                  {filtered.length === 0 && (
                    <div className="py-20 text-center">
                      <Search size={32} className="text-slate-200 mx-auto mb-3"/>
                      <div className="text-[14px] font-bold text-slate-400">검색 결과가 없습니다</div>
                    </div>
                  )}
                </div>
              </div>
            </main>
          </div>

          </div>{/* 메인 영역 끝 */}

          {/* ══ 삭제 확인 모달 ══ */}
          {deleteModal && (() => {
            const isBulk = deleteModal.type === 'bulk';
            const courseName = isBulk ? null : deleteModal.course.title;
            const totalEnrolled = isBulk
              ? deleteModal.courses.reduce((s, c) => s + (c.totalEnrolled || 0), 0)
              : (deleteModal.course.totalEnrolled || 0);
            const canConfirm = deleteInput === '삭제';
            return (
              <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/40 animate-fadeIn" onClick={e => { if(e.target === e.currentTarget) { setDeleteModal(null); setDeleteInput(''); } }}>
                <div className="bg-white rounded-2xl shadow-2xl w-[440px] overflow-hidden animate-slideUp" data-feature-id="A1-11">
                  {/* 상단 아이콘 + 타이틀 */}
                  <div className="px-8 pt-8 pb-5 text-center">
                    <div className="w-14 h-14 bg-rose-500 rounded-full flex items-center justify-center mx-auto mb-4">
                      <svg viewBox="0 0 24 24" fill="none" className="w-7 h-7"><path d="M5 13l4 4L19 7" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </div>
                    <h2 className="text-[18px] font-black text-slate-900 mb-1.5">정말 삭제하시겠습니까?</h2>
                    <p className="text-[13px] text-slate-500 leading-relaxed">
                      선택한 코스와 관련된 모든 데이터가 삭제되며,<br/>삭제 후에는 복구할 수 없습니다.
                    </p>
                  </div>

                  <div className="px-8 pb-6 space-y-4">
                    {/* 삭제 대상 코스명 */}
                    <div className="bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 flex items-center gap-2">
                      <svg viewBox="0 0 24 24" fill="none" className="w-4 h-4 text-rose-400 shrink-0"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                      <span className="text-[13px] text-rose-700 font-medium">
                        {isBulk ? `삭제할 코스: ${deleteModal.courses.length}개 선택됨` : `삭제할 코스: ${courseName}`}
                      </span>
                    </div>

                    {/* 수강생 경고 */}
                    {totalEnrolled > 0 && (
                      <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5 flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="none" className="w-4 h-4 text-amber-500 shrink-0"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                        <span className="text-[13px] text-amber-700 font-semibold">{totalEnrolled}명의 수강생 데이터가 함께 삭제됩니다.</span>
                      </div>
                    )}

                    {/* 삭제 항목 목록 */}
                    <ul className="space-y-1.5 pl-1">
                      {[
                        '수강생 등록 정보 (수강생 목록, 출석 기록 등)',
                        '차수·회차 일정 / 정원 / 장소',
                        '코스 통계',
                      ].map((item, i) => (
                        <li key={i} className="flex items-start gap-2 text-[13px] text-slate-600">
                          <span className="mt-1.5 w-1 h-1 rounded-full bg-slate-400 shrink-0"/>
                          {item}
                        </li>
                      ))}
                    </ul>

                    {/* 텍스트 입력 확인 */}
                    <div>
                      <div className="flex items-center gap-1.5 mb-2">
                        <svg viewBox="0 0 24 24" fill="none" className="w-3.5 h-3.5 text-indigo-500"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><polyline points="22 4 12 14.01 9 11.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        <span className="text-[13px] font-semibold text-slate-700">계속하려면 <strong className="text-slate-900">삭제</strong>를 입력하세요.</span>
                      </div>
                      <input
                        type="text"
                        value={deleteInput}
                        onChange={e => setDeleteInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && canConfirm && executeDelete()}
                        placeholder="삭제"
                        autoFocus
                        className="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-[14px] outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 placeholder-slate-300"
                      />
                    </div>

                    {/* 버튼 */}
                    <div className="flex gap-3 pt-1">
                      <button
                        onClick={() => { setDeleteModal(null); setDeleteInput(''); }}
                        className="flex-1 py-2.5 border border-slate-200 rounded-xl text-[14px] font-semibold text-slate-600 hover:bg-slate-50 transition-colors"
                      >취소</button>
                      <button
                        onClick={executeDelete}
                        disabled={!canConfirm}
                        className={`flex-1 py-2.5 rounded-xl text-[14px] font-bold transition-colors ${canConfirm ? 'bg-rose-500 text-white hover:bg-rose-600' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}
                      >확인</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ══ 코스 만들기 모달 (코스v2 진입) ══ */}
          {showCreateModal && (
            <div
              className="fixed inset-0 z-[100] bg-slate-900/40 flex items-center justify-center p-6"
              onClick={() => setShowCreateModal(false)}
            >
              <div
                className="bg-[#f7f9fc] rounded-3xl shadow-2xl w-[1100px] max-w-[95vw] max-h-[92vh] overflow-y-auto p-12 relative"
                onClick={e => e.stopPropagation()}
              >
                <button
                  onClick={() => setShowCreateModal(false)}
                  className="absolute top-5 right-5 w-9 h-9 rounded-full flex items-center justify-center text-slate-400 hover:bg-slate-100 hover:text-slate-700 transition-colors"
                  aria-label="닫기"
                >
                  <X size={18}/>
                </button>

                <h1 className="text-[34px] font-black text-center text-slate-900 mb-14">어떤 코스를 개설하시겠어요?</h1>

                <div className="grid grid-cols-2 gap-6 max-w-[820px] mx-auto">
                  <button
                    onClick={() => goBuilder('online')}
                    className="group text-left bg-white rounded-2xl p-7 border border-slate-200 hover:border-indigo-300 hover:shadow-lg transition-all relative overflow-hidden"
                  >
                    <div className="w-14 h-14 rounded-xl bg-indigo-50 flex items-center justify-center mb-5">
                      <Monitor size={26} className="text-indigo-600"/>
                    </div>
                    <h3 className="text-[19px] font-black text-slate-900 mb-2.5">온라인 코스</h3>
                    <p className="text-[14.5px] text-slate-500 leading-relaxed mb-5">
                      비대면·자기주도 학습 과정을 설계합니다.<br/>VOD, 문서, 시험을 자유롭게 조합하세요.
                    </p>
                    <div className="flex flex-wrap gap-1.5">
                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">VOD</span>
                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">문서</span>
                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">시험/퀴즈</span>
                    </div>
                  </button>

                  <button
                    onClick={() => goBuilder('offline')}
                    className="group text-left bg-white rounded-2xl p-7 border border-slate-200 hover:border-rose-300 hover:shadow-lg transition-all relative overflow-hidden"
                  >
                    <div className="w-14 h-14 rounded-xl bg-rose-50 flex items-center justify-center mb-5">
                      <MapPin size={26} className="text-rose-600"/>
                    </div>
                    <h3 className="text-[19px] font-black text-slate-900 mb-2.5">오프라인 코스</h3>
                    <p className="text-[14.5px] text-slate-500 leading-relaxed mb-5">
                      집합 교육과 출석 관리에 최적화된 플로우입니다.<br/>QR 출석 및 회차 관리를 지원합니다.
                    </p>
                    <div className="flex flex-wrap gap-1.5">
                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">회차 관리</span>
                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">QR 출석</span>
                      <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-[12px] font-semibold rounded">수기 처리</span>
                    </div>
                  </button>
                </div>

                <p className="text-center text-[12.5px] text-slate-400 mt-12">등록 후에도 코스 유형 일부 설정은 변경 가능합니다</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
  <script src="feature-highlight.js"></script>
</body>
</html>
