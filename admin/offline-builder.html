        if (first) { const [y,m] = first.date.split('-').map(Number); return { year:y, month:m-1 }; }
        const n = new Date(); return { year:n.getFullYear(), month:n.getMonth() };
      });
      const [editId, setEditId] = React.useState(null);

      const { year, month } = mcDate;
      const today = new Date();
      const firstDay = new Date(year, month, 1).getDay();
      const dim = new Date(year, month + 1, 0).getDate();
      const OC = ['#6366f1','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4'];
      const MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

      const myByDay = {};
      opt.sessions.forEach(s => {
        if (!s.date) return;
        const [sy,sm,sd] = s.date.split('-').map(Number);
        if (sy===year && sm===month+1) myByDay[sd] = s;
      });
      const otherByDay = {};
      options.forEach((o,oi) => {
        if (o.id === opt.id) return;
        (o.sessions||[]).forEach(s => {
          if (!s.date) return;
          const [sy,sm,sd] = s.date.split('-').map(Number);
          if (sy===year && sm===month+1) { if (!otherByDay[sd]) otherByDay[sd]=[]; otherByDay[sd].push(OC[oi%OC.length]); }
        });
      });

      const cells = [];
      for (let i=0;i<firstDay;i++) cells.push(null);
      for (let d=1;d<=dim;d++) cells.push(d);
      while (cells.length%7!==0) cells.push(null);

      const onDay = (d) => {
        const ex = myByDay[d];
        if (ex) { setEditId(editId===ex.id ? null : ex.id); }
        else {
          const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          onAddSession(opt.id, ds);
        }
      };
      const isToday = d => today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;

      return (
        <div className="fixed inset-0 bg-slate-900/70 z-[300] flex items-center justify-center" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-[90vw] max-w-[1300px] h-[85vh] flex flex-col overflow-hidden" onClick={e=>e.stopPropagation()}>
            {/* 헤더 */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 shrink-0">
              <div>
                <div className="text-[16px] font-black text-slate-900">{opt.name}</div>
                <div className="text-[12px] text-slate-500 mt-0.5">수업 날짜를 확인하고 편집할 수 있어요</div>
              </div>
              <button onClick={onClose} className="p-2 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors"><X size={18}/></button>
            </div>
            {/* 바디 */}
            <div className="flex flex-1 min-h-0">
              {/* 좌: 캘린더 */}
              <div className="w-[500px] border-r border-slate-100 px-6 py-5 shrink-0 flex flex-col">
                <div className="flex items-center justify-between mb-4">
                  <button onClick={()=>setMcDate(p=>{const d=new Date(p.year,p.month-1,1);return{year:d.getFullYear(),month:d.getMonth()}})} className="p-1.5 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors"><ChevronLeft size={15}/></button>
                  <div className="font-bold text-slate-800 text-[15px]">{year}년 {MN[month]}</div>
                  <button onClick={()=>setMcDate(p=>{const d=new Date(p.year,p.month+1,1);return{year:d.getFullYear(),month:d.getMonth()}})} className="p-1.5 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors"><ChevronRight size={15}/></button>
                </div>
                <div className="grid grid-cols-7 text-center text-[11px] font-bold text-slate-400 mb-2">
                  {['일','월','화','수','목','금','토'].map(d=><div key={d}>{d}</div>)}
                </div>
                <div className="grid grid-cols-7 flex-1 auto-rows-fr">
                  {cells.map((d,i) => {
                    if (d===null) return <div key={i}/>;
                    const my = myByDay[d];
                    const others = otherByDay[d]||[];
                    const td = isToday(d);
                    const isEd = my && editId===my.id;
                    return (
                      <div key={i} className="flex flex-col items-center justify-start pt-1.5 cursor-pointer group rounded-lg hover:bg-slate-50 transition-colors" onClick={()=>onDay(d)}>
                        <div className={`w-8 h-8 flex items-center justify-center rounded-full text-[13px] font-semibold transition-all
                          ${my ? (isEd?'bg-indigo-600 text-white ring-2 ring-indigo-300':'bg-indigo-100 text-indigo-700 hover:bg-indigo-200')
                            : td?'ring-2 ring-indigo-400 text-indigo-600 font-bold':'text-slate-600 group-hover:bg-slate-100'}`}>
                          {d}
                        </div>
                        {my && <div className="text-[9px] text-indigo-400 font-bold mt-0.5 leading-none">{my.startTime}</div>}
                        {others.length>0 && (
                          <div className="flex gap-0.5 mt-0.5">
                            {others.slice(0,3).map((c,j)=><div key={j} style={{background:c}} className="w-1 h-1 rounded-full opacity-40"/>)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="mt-3 flex items-center gap-4 text-[10px] text-slate-400 shrink-0">
                  <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-indigo-100 border border-indigo-200"/><span>이 차수</span></div>
                  <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-violet-400 opacity-50"/><span>다른 차수</span></div>
                  <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full border-2 border-indigo-400"/><span>오늘</span></div>
                  <span className="ml-auto text-slate-300">빈 날짜 클릭 → 회차 추가</span>
                </div>
              </div>
              {/* 우: 회차 목록 */}
              <div className="flex-1 flex flex-col min-h-0">
                <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100 shrink-0">
                  <div className="text-[13px] font-bold text-slate-700">총 <span className="text-indigo-600">{opt.sessions.length}</span>개 회차</div>
                  <button onClick={()=>onAddSession(opt.id,'')} className="flex items-center gap-1 text-[12px] font-bold text-white bg-indigo-500 hover:bg-indigo-600 px-3 py-1.5 rounded-lg transition-colors shadow-sm">
                    <Plus size={12}/> 회차 추가
                  </button>
                </div>
                <div className="flex-1 overflow-y-auto custom-scrollbar px-4 py-3 space-y-2">
                  {opt.sessions.length===0 ? (
                    <div className="text-center text-[13px] text-slate-400 py-10">
                      <CalendarDays size={32} className="mx-auto mb-2 opacity-30"/>
                      <div>왼쪽 캘린더에서 날짜를 클릭하거나</div>
                      <div className="mt-0.5">+ 회차 추가 버튼을 누르세요</div>
                    </div>
                  ) : opt.sessions.map((s,idx) => {
                    const isEd = editId===s.id;
                    return (
                      <div key={s.id} className={`border rounded-xl overflow-hidden transition-all ${isEd?'border-indigo-300 shadow-sm':'border-slate-200'}`}>
                        <div className={`flex items-center gap-3 px-4 py-2.5 cursor-pointer transition-colors ${isEd?'bg-indigo-50':'bg-white hover:bg-slate-50'}`}
                          onClick={()=>setEditId(isEd?null:s.id)}>
                          <div className={`w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold shrink-0 ${isEd?'bg-indigo-500 text-white':'bg-indigo-100 text-indigo-600'}`}>{idx+1}</div>
                          <div className="flex-1 min-w-0">
                            <div className="text-[13px] font-bold text-slate-800">{s.name||`${idx+1}회차`}</div>
                            <div className="text-[11px] text-slate-500 mt-0.5">{s.date||'날짜 미설정'}{s.startTime&&` · ${s.startTime}~${s.endTime}`}</div>
                          </div>
                          <button onClick={e=>{e.stopPropagation();onRemoveSession(s.id,opt.id);}} className="p-1 rounded text-slate-300 hover:text-red-500 transition-colors"><Trash2 size={13}/></button>
                        </div>
                        {isEd && (
                          <div className="px-4 pb-4 pt-3 bg-indigo-50 border-t border-indigo-100 space-y-2.5">
                            <div>
                              <label className="block text-[11px] font-bold text-slate-600 mb-1">회차명</label>
                              <input value={s.name||''} onChange={e=>onSessionChange(s.id,'name',e.target.value,opt.id)} className="w-full border border-indigo-200 rounded-lg px-3 py-1.5 text-[13px] outline-none focus:border-indigo-400 bg-white"/>
                            </div>
                            <div className="grid grid-cols-2 gap-2.5">
                              <div>
                                <label className="block text-[11px] font-bold text-slate-600 mb-1">날짜</label>
                                <input type="date" value={s.date||''} onChange={e=>onSessionChange(s.id,'date',e.target.value,opt.id)} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>
                              <div>
                                <label className="block text-[11px] font-bold text-slate-600 mb-1">장소 (선택)</label>
                                <input value={s.place||''} onChange={e=>onSessionChange(s.id,'place',e.target.value,opt.id)} placeholder={opt.place||'기본 장소'} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>
                            </div>
                            <div className="grid grid-cols-2 gap-2.5">
                              <div>
                                <label className="block text-[11px] font-bold text-slate-600 mb-1">시작 시간</label>
                                <input type="time" value={s.startTime||''} onChange={e=>onSessionChange(s.id,'startTime',e.target.value,opt.id)} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>
                              <div>
                                <label className="block text-[11px] font-bold text-slate-600 mb-1">종료 시간</label>
                                <input type="time" value={s.endTime||''} onChange={e=>onSessionChange(s.id,'endTime',e.target.value,opt.id)} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ── Main App ── */
    const App = () => {
      const [sideExpanded, setSideExpanded] = useState(new Set(['course']));
      const toggleSideMenu = (id) => setSideExpanded(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });

      const _editData = isEditMode ? COURSE_EDIT_DATA[Number(courseId)] : null;
      const [courseInfo, setCourseInfo] = useState(_editData ? _editData.info : {
        title: '', category: '', instructor: '', instructorDesc: '', intro: '', location: '', address: '', traffic: ''
      });

      const [detailTop, setDetailTop] = useState('cover'); // 'cover' | 'images'
      const [detailImages, setDetailImages] = useState([]);

      const [regPeriod, setRegPeriod] = useState({ start: '2026-04-10T09:00', end: '2026-04-25T18:00' });
      const [cancelPolicy, setCancelPolicy] = useState({ enabled: false, mode: 'allowed', relativeValue: 3, relativeUnit: 'day' });
      // mode: 'allowed' = 기한부 취소 가능 | 'blocked' = 취소 불가
      const [changePolicy, setChangePolicy] = useState({ enabled: false, relativeValue: 5, relativeUnit: 'day' });
      const [isSelfEnroll, setIsSelfEnroll] = useState(true);
      const [isPreviewOpen, setIsPreviewOpen] = useState(false);
      const [isStructureOpen, setIsStructureOpen] = useState(false);
      const [optionSettingsId, setOptionSettingsId] = useState(null);
      const [mapQuery, setMapQuery] = useState('');
      const [selectionRule, setSelectionRule] = useState('single');
      const [minSelect, setMinSelect] = useState(2);
      const [maxSelect, setMaxSelect] = useState(3);
      const [selectedMobileOptions, setSelectedMobileOptions] = useState([]);
      const [timeSlotTip, setTimeSlotTip] = useState(null);
      const [sessGroupDropdownId, setSessGroupDropdownId] = useState(null);
      const [collapsedOpts, setCollapsedOpts] = useState({});
      const toggleCollapse = (optId) => setCollapsedOpts(prev => ({ ...prev, [optId]: !prev[optId] }));
      const [calModeOptId, setCalModeOptId] = useState(null);

      /* ── 코스 상태 & 퍼블리싱 ── */
      const [coverImage, setCoverImage] = useState(null); // null | { dataUrl, fileName }
      const coverInputRef = useRef(null);

      const [courseStatus, setCourseStatus] = useState(_editData ? _editData.status : 'draft'); // draft | saved | scheduled | published
      const [lastSavedAt, setLastSavedAt] = useState(null);
      const [showPublishModal, setShowPublishModal] = useState(false);
      const [publishType, setPublishType] = useState('now'); // now | scheduled
      const [publishSchedule, setPublishSchedule] = useState('');
      const [scheduledAt, setScheduledAt] = useState(null); // 예약 확정 시 datetime string 저장
      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);
      const scheduleCheckRef = useRef(null);
      const [secOpen, setSecOpen] = useState({ s1: true, s2: true, s3: true, s4: true });
      const [eligibleGroups, setEligibleGroups] = useState([]);
      const [eligGrpDrop, setEligGrpDrop] = useState(false);

      const statusLabel = { draft: '임시저장', saved: '임시저장', scheduled: '공개 예약됨', published: '퍼블리싱됨' };
      const statusColor = { draft: 'bg-amber-50 text-amber-700 border-amber-200', saved: 'bg-amber-50 text-amber-700 border-amber-200', scheduled: 'bg-violet-50 text-violet-700 border-violet-300', published: 'bg-emerald-50 text-emerald-700 border-emerald-200' };

      const dismissToast = () => {
        setToast(prev => prev ? { ...prev, dismissing: true } : null);
        setTimeout(() => setToast(null), 200);
      };

      const showToast = (message, icon = '✅', duration = 3000) => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ type: 'info', message, icon, dismissing: false });
        toastTimer.current = setTimeout(dismissToast, duration);
      };

      useEffect(() => {
        if (courseId) {
          const saved = localStorage.getItem('lms_cover_' + courseId);
          if (saved) setCoverImage(JSON.parse(saved));
        }
      }, []);

      const handleCoverFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
          alert('파일 크기는 5MB 이하여야 합니다.');
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          const data = { dataUrl: ev.target.result, fileName: file.name };
          setCoverImage(data);
          if (courseId) localStorage.setItem('lms_cover_' + courseId, JSON.stringify(data));
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const removeCoverImage = () => {
        setCoverImage(null);
        if (courseId) localStorage.removeItem('lms_cover_' + courseId);
      };

      const applyMapAddress = () => {
        const q = courseInfo.address.trim();
        if (q) setMapQuery(q);
      };

      const handleSaveDraft = () => {
        const isFirstSave = courseStatus === 'draft';
        setCourseStatus('saved');
        setLastSavedAt(new Date());

        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ type: isFirstSave ? 'first' : 'repeat', dismissing: false });

        if (!isFirstSave) {
          toastTimer.current = setTimeout(dismissToast, 3000);
        }
      };

      const getValidation = () => [
        { label: '코스명 입력', ok: !!courseInfo.title.trim() },
        { label: '담당 강사 지정', ok: !!courseInfo.instructor.trim() },
        { label: '교육 장소 설정', ok: !!courseInfo.location.trim() },
        { label: '신청 기간 설정', ok: !!regPeriod.start && !!regPeriod.end },
        { label: '최소 1개 차수 생성', ok: options.length > 0 },
        { label: '모든 차수에 회차 존재', ok: options.every(o => o.sessions.length > 0) },
        { label: '모든 회차 날짜/시간 설정', ok: options.every(o => o.sessions.every(s => s.date && s.startTime && s.endTime)) },
        { label: '수료 조건 최소 1개 설정', ok: completionRules.length > 0 },
      ];

      const handlePublish = () => {
        const checks = getValidation();
        if (checks.some(c => !c.ok)) return;
        if (publishType === 'scheduled' && publishSchedule) {
          const schedDt = new Date(publishSchedule);
          if (schedDt <= new Date()) {
            // 이미 지난 시간이면 즉시 퍼블리싱
            setCourseStatus('published');
            setScheduledAt(null);
            showToast('예약 시간이 이미 지나 즉시 퍼블리싱됩니다', '🚀');
          } else {
            setCourseStatus('scheduled');
            setScheduledAt(publishSchedule);
            // 예약 시간 도달 시 자동 published 전환 시뮬레이션
            if (scheduleCheckRef.current) clearTimeout(scheduleCheckRef.current);
            scheduleCheckRef.current = setTimeout(() => {
              setCourseStatus('published');
              setScheduledAt(null);
              showToast('예약된 시간이 되어 코스가 공개됐습니다', '🎉', 5000);
            }, schedDt - new Date());
            showToast(`${schedDt.toLocaleString('ko-KR', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}에 공개 예약됐습니다`, '📅', 4000);
          }
        } else {
          setCourseStatus('published');
          setScheduledAt(null);
          showToast('코스가 즉시 공개됐습니다', '🚀');
        }
        setShowPublishModal(false);
        setLastSavedAt(new Date());
      };

      const handleCancelSchedule = () => {
        if (scheduleCheckRef.current) clearTimeout(scheduleCheckRef.current);
        setCourseStatus('saved');
        setScheduledAt(null);
        showToast('예약 공개가 취소됐습니다', '↩️');
      };

      // 더미 그룹 목록 (실제 환경에서는 API 연동)
      const allGroups = [
        { id: 'g1', name: '개발팀', count: 12 },
        { id: 'g2', name: '디자인팀', count: 8 },
        { id: 'g3', name: '마케팅팀', count: 15 },
        { id: 'g4', name: '영업팀', count: 20 },
        { id: 'g5', name: '인사팀', count: 6 },
        { id: 'g6', name: '재무팀', count: 9 },
        { id: 'g7', name: '기획팀', count: 11 },
      ];
      const [groupDropdownOptId, setGroupDropdownOptId] = useState(null); // 드롭다운 열린 optId
      useEffect(() => {
        const close = () => { setGroupDropdownOptId(null); setEligGrpDrop(false); };
        document.addEventListener('click', close);
        return () => document.removeEventListener('click', close);
      }, []);

      const handleAddGroup = (optId, group) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          if ((opt.groups || []).find(g => g.id === group.id)) return opt;
          const newGroups = [...(opt.groups || []), { ...group, limit: 0 }];
          return { ...opt, groups: newGroups };
        }));
        setGroupDropdownOptId(null);
      };
      const handleRemoveGroup = (optId, groupId) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          const newGroups = (opt.groups || []).filter(g => g.id !== groupId);
          return { ...opt, groups: newGroups };
        }));
      };
      const handleGroupLimitChange = (optId, groupId, val) => {
        const num = Math.max(0, parseInt(val) || 0);
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          return { ...opt, groups: (opt.groups || []).map(g => g.id === groupId ? { ...g, limit: num } : g) };
        }));
      };

      const addEligGrp = grp => {
        if (eligibleGroups.find(g => g.id === grp.id)) return;
        setEligibleGroups(p => [...p, grp]);
        setEligGrpDrop(false);
      };
      const remEligGrp = gid => setEligibleGroups(p => p.filter(g => g.id !== gid));

      const categories = [
        { group: '직무/전문 역량', items: ['직무 역량', '기술/IT', '영업/마케팅', '기획/전략'] },
        { group: '리더십/매니지먼트', items: ['리더십', '조직 관리', '팀 빌딩'] },
        { group: '공통/필수', items: ['공통/온보딩', '컴플라이언스', '인권/안전'] },
        { group: '조직문화/복지', items: ['조직문화', '워크라이프밸런스', '복지'] },
        { group: '외부/자격증', items: ['외부 교육', '자격증/어학'] },
      ];

      const todayStr = new Date().toISOString().slice(0, 10);
      const [options, setOptions] = useState(_editData ? _editData.options : [
        { id: 1, name: '새 차수', capacity: 30, enrolled: 0, startDate: todayStr, endDate: todayStr, place: '', groups: [], sessionSelect: false,
          sessions: [{ id: 101, name: '1회차', date: todayStr, startTime: '09:00', endTime: '18:00', place: '', capacity: null, groups: null }] },
      ]);

      /* ── 출석 정책 ── */
      const [lateMinutes, setLateMinutes] = useState(10);
      const [lateEnabled, setLateEnabled] = useState(true);

      /* ── 수료 조건 ── */
      const [completionRules, setCompletionRules] = useState([
        { id: 'attendance', slot_type: 'attendance', label: '오프라인 출석', required: true, fixed: true,
          condition: { type: 'any_status', minType: 'all', minCount: 1 } }
      ]);
      const updateAttendanceCond = (minType, minCount) => {
        const maxCount = options.length || 1;
        const clamped = Math.min(maxCount, Math.max(1, minCount));
        setCompletionRules(prev => prev.map(r => r.id === 'attendance'
          ? { ...r, condition: { ...r.condition, minType, minCount: clamped } } : r));
        const label = minType === 'all' ? '모든 차수 출석' : `${clamped}개 차수 이상 출석`;
        showToast(`수료 조건 변경 — ${label}`, '✅');
      };

      const [activeOptionId, setActiveOptionId] = useState(1);
      const [showBatchForm, setShowBatchForm] = useState(null); // null | optId
      const [batchData, setBatchData] = useState({ startDate: '', endDate: '', days: [], startTime: '09:00', endTime: '18:00', place: '' });

      /* ── 차수 드래그앤드롭 ── */
      const dragOptId = useRef(null);
      const dragOverOptId = useRef(null);
      const [draggingOpt, setDraggingOpt] = useState(null);
      const [dragOverOpt, setDragOverOpt] = useState(null);

      const onOptDragStart = (e, id) => { dragOptId.current = id; setDraggingOpt(id); e.dataTransfer.effectAllowed = 'move'; };
      const onOptDragOver = (e, id) => { e.preventDefault(); dragOverOptId.current = id; setDragOverOpt(id); };
      const onOptDrop = (e) => {
        e.preventDefault();
        const from = dragOptId.current, to = dragOverOptId.current;
        if (!from || !to || from === to) { setDraggingOpt(null); setDragOverOpt(null); return; }
        const arr = [...options];
        const fi = arr.findIndex(o => o.id === from), ti = arr.findIndex(o => o.id === to);
        const [rem] = arr.splice(fi, 1); arr.splice(ti, 0, rem);
        setOptions(arr);
        dragOptId.current = null; dragOverOptId.current = null;
        setDraggingOpt(null); setDragOverOpt(null);
      };
      const onOptDragEnd = () => { setDraggingOpt(null); setDragOverOpt(null); dragOptId.current = null; dragOverOptId.current = null; };

      /* ── 회차 드래그앤드롭 ── */
      const dragSessId = useRef(null);
      const dragOverSessId = useRef(null);
      const [draggingSess, setDraggingSess] = useState(null);
      const [dragOverSess, setDragOverSess] = useState(null);

      // dragSessId stores { sessId, optId } to know which package the dragged session belongs to
      const onSessDragStart = (e, sessId, optId) => { dragSessId.current = { sessId, optId }; setDraggingSess(sessId); e.dataTransfer.effectAllowed = 'move'; };
      const onSessDragOver = (e, sessId) => { e.preventDefault(); dragOverSessId.current = sessId; setDragOverSess(sessId); };
      const onSessDrop = (e, targetOptId) => {
        e.preventDefault();
        const drag = dragSessId.current;
        const to = dragOverSessId.current;
        if (!drag || !to || drag.sessId === to || drag.optId !== targetOptId) { setDraggingSess(null); setDragOverSess(null); return; }
        setOptions(options.map(opt => {
          if (opt.id !== drag.optId) return opt;
          const arr = [...opt.sessions];
          const fi = arr.findIndex(s => s.id === drag.sessId), ti = arr.findIndex(s => s.id === to);
          const [rem] = arr.splice(fi, 1); arr.splice(ti, 0, rem);
          return { ...opt, sessions: arr };
        }));
        dragSessId.current = null; dragOverSessId.current = null;
        setDraggingSess(null); setDragOverSess(null);
      };
      const onSessDragEnd = () => { setDraggingSess(null); setDragOverSess(null); dragSessId.current = null; dragOverSessId.current = null; };

      /* ── 옵션 CRUD ── */
      const handleAddOption = () => {
        const newId = Date.now();
        setOptions([...options, { id: newId, name: '새로운 드롭다운 옵션', capacity: 30, enrolled: 0, startDate: '', endDate: '', place: '', groups: [], sessionSelect: false, sessions: [] }]);
        setActiveOptionId(newId);
      };
      const handleRemoveOption = (id) => {
        if (options.length === 1) return alert('최소 1개의 옵션은 필요합니다.');
        const removed = options.find(o => o.id === id);
        const next = options.filter(o => o.id !== id);
        setOptions(next);
        if (activeOptionId === id) setActiveOptionId(next[0].id);
        showToast(`"${removed?.name}" 차수가 삭제됐습니다`, '🗑');
      };
      const handleDuplicateOption = (opt) => {
        const newId = Date.now();
        setOptions([...options, { ...opt, id: newId, name: `${opt.name} - 복사본`, sessions: opt.sessions.map((s, i) => ({ ...s, id: newId + i + 1 })) }]);
        setActiveOptionId(newId);
      };
      const handleOptionChange = (id, field, val) => setOptions(options.map(o => o.id === id ? { ...o, [field]: val } : o));

      /* ── 세션 CRUD (optId 명시) ── */
      const handleAddSession = (optId) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          const last = opt.sessions[opt.sessions.length - 1];
          return { ...opt, sessions: [...opt.sessions, { id: Date.now(), name: `${opt.sessions.length + 1}회차`, date: '', startTime: last ? last.startTime : '09:00', endTime: last ? last.endTime : '18:00', place: '', capacity: null, groups: null }] };
        }));
      };
      const handleAddSessionWithDate = (optId, dateStr) => {
        setOptions(prev => prev.map(opt => {
          if (opt.id !== optId) return opt;
          const last = opt.sessions[opt.sessions.length - 1];
          return { ...opt, sessions: [...opt.sessions, { id: Date.now(), name: `${opt.sessions.length+1}회차`, date: dateStr, startTime: last?.startTime||'09:00', endTime: last?.endTime||'18:00', place:'', capacity:null, groups:null }]};
        }));
      };
      const handleRemoveSession = (sid, optId) => {
        const opt = options.find(o => o.id === optId);
        const sess = opt?.sessions.find(s => s.id === sid);
        setOptions(options.map(o => o.id === optId ? { ...o, sessions: o.sessions.filter(s => s.id !== sid) } : o));
        showToast(`"${sess?.name || '회차'}"가 삭제됐습니다`, '🗑');
      };
      const handleSessionChange = (sid, field, val, optId) => setOptions(options.map(opt => opt.id === optId ? { ...opt, sessions: opt.sessions.map(s => s.id === sid ? { ...s, [field]: val } : s) } : opt));
      const handleAddTimeSlot = (optId, refSess) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          const insertIdx = opt.sessions.findIndex(s => s.id === refSess.id) + 1;
          const newSess = { id: Date.now(), name: `${opt.sessions.length + 1}회차`, date: refSess.date, startTime: refSess.endTime || '13:00', endTime: '18:00', place: refSess.place || '', capacity: null, groups: null };
          const next = [...opt.sessions];
          next.splice(insertIdx, 0, newSess);
          return { ...opt, sessions: next };
        }));
      };

      /* ── 회차별 정원·그룹 오버라이드 ── */
      const handleSessionGroupsInit = (sessId, optId, defaultGroups, defaultCap) => {
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, capacity: defaultCap, groups: defaultGroups.map(g => ({ ...g })) })
        }));
      };
      const handleSessionGroupsReset = (sessId, optId) => {
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, capacity: null, groups: null })
        }));
      };
      const handleSessionCapacityChange = (sessId, optId, val) => {
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, capacity: Math.max(0, parseInt(val)||0) })
        }));
      };
      const handleSessionGroupAdd = (sessId, optId, group) => {
        setSessGroupDropdownId(null);
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, groups: [...(s.groups || []), { ...group, limit: 0 }] })
        }));
      };
      const handleSessionGroupRemove = (sessId, optId, groupId) => {
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, groups: (s.groups || []).filter(g => g.id !== groupId) })
        }));
      };
      const handleSessionGroupLimitChange = (sessId, optId, groupId, val) => {
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, groups: (s.groups || []).map(g => g.id !== groupId ? g : { ...g, limit: parseInt(val)||0 }) })
        }));
      };

      /* ── 일괄 생성 ── */
      const toggleBatchDay = (day) => setBatchData(prev => ({ ...prev, days: prev.days.includes(day) ? prev.days.filter(d => d !== day) : [...prev.days, day] }));
      const handleBatchGenerateSessions = () => {
        const start = new Date(batchData.startDate), end = new Date(batchData.endDate);
        const dayMap = { '일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6 };
        const targetDays = batchData.days.map(d => dayMap[d]);
        if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end || targetDays.length === 0) return alert('유효한 기간과 요일을 설정해주세요.');
        const generated = [];
        let curr = new Date(start);
        while (curr <= end) {
          if (targetDays.includes(curr.getDay())) {
            const y = curr.getFullYear(), m = String(curr.getMonth()+1).padStart(2,'0'), d = String(curr.getDate()).padStart(2,'0');
            generated.push({ date:`${y}-${m}-${d}`, startTime: batchData.startTime, endTime: batchData.endTime, place: batchData.place });
          }
          curr.setDate(curr.getDate() + 1);
        }
        if (generated.length === 0) return alert('선택한 요일이 기간 내에 없습니다.');
        const batchOptId = showBatchForm;
        setOptions(options.map(opt => opt.id === batchOptId ? { ...opt, sessions: [...opt.sessions, ...generated.map((d, i) => ({ id: Date.now() + i, name: `${opt.sessions.length + i + 1}회차`, capacity: null, groups: null, ...d }))] } : opt));
        setShowBatchForm(null);
      };

      const activeOption = options.find(o => o.id === activeOptionId) || options[0];

      const secStatus = (sec) => {
        if (sec === 1) {
          const n = [courseInfo.title, courseInfo.instructor, courseInfo.location].filter(v => v && v.trim()).length;
          return n === 3 ? 'done' : n > 0 ? 'partial' : 'empty';
        }
        if (sec === 2) {
          return (regPeriod.start && regPeriod.end) ? 'done' : (regPeriod.start || regPeriod.end) ? 'partial' : 'empty';
        }
        if (sec === 3) {
          if (!options.length) return 'empty';
          const ok = options.every(o => o.sessions.length > 0 && o.sessions.every(s => s.date && s.startTime && s.endTime));
          return ok ? 'done' : 'partial';
        }
        return completionRules.length > 0 ? 'done' : 'empty';
      };
      const canPublish = getValidation().every(v => v.ok);

      return (
        <div className="min-h-screen flex">
          {/* ══ 글로벌 좌측 사이드바 ══ */}
          <aside className="w-[200px] bg-white border-r border-slate-200 flex flex-col shrink-0 h-screen sticky top-0 overflow-y-auto custom-scrollbar">
            <div className="px-4 py-4 flex items-center gap-2.5">
              <div className="w-7 h-7 rounded-lg bg-emerald-500 flex items-center justify-center shrink-0">
                <svg viewBox="0 0 14 14" fill="none" className="w-4 h-4"><path d="M7 2L2 5v7h4V9h2v3h4V5L7 2z" fill="white"/></svg>
              </div>
              <span className="text-[13px] font-black text-slate-900 tracking-tight leading-tight">TOUCH<br/>CLASS</span>
            </div>
            <div className="h-px bg-slate-100 mx-3 mb-2"/>
            <nav className="flex-1 px-3 pb-6 space-y-0.5">
              {SIDEBAR_MENUS.map(menu => (
                <div key={menu.id}>
                  <button onClick={() => menu.hasChildren && toggleSideMenu(menu.id)} className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[14px] font-semibold transition-colors ${menu.active ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-600 hover:bg-slate-50'}`}>
                    {React.createElement(menu.icon, { size: 16, className: menu.active ? 'text-indigo-600' : 'text-slate-400' })}
                    <span className="flex-1 text-left">{menu.label}</span>
                    {menu.badge && <span className="w-4 h-4 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">{menu.badge}</span>}
                    {menu.hasChildren && <span className="text-slate-400">{sideExpanded.has(menu.id) ? <ChevronDown size={14}/> : <ChevronRight size={14}/>}</span>}
                  </button>
                  {menu.children && sideExpanded.has(menu.id) && (
                    <div className="ml-7 mt-0.5 space-y-0.5">
                      {menu.children.map(sub => (
                        <a key={sub.id} href="#" className={`block px-3 py-1.5 rounded-md text-[13px] transition-colors ${sub.active ? 'text-indigo-700 font-bold' : 'text-slate-500 hover:bg-slate-50 font-medium'}`}>{sub.label}</a>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </nav>
          </aside>
          <div className="flex-1 flex flex-col h-screen overflow-hidden bg-[#f2f5f9]">

          {/* ── 글로벌 탑 네비게이션 ── */}
          <div className="h-[52px] bg-white border-b border-slate-200 flex items-center justify-between px-5 shrink-0 sticky top-0 z-40">
            <div className="flex items-center gap-3">
              <button className="flex items-center gap-1.5 text-slate-600 text-[13px] font-semibold hover:text-slate-800 transition-colors">
                <Star size={14} className="text-amber-400 fill-amber-400"/> 즐겨찾기 <ChevronDown size={13} className="text-slate-400"/>
              </button>
              <div className="w-px h-4 bg-slate-200"/>
              <button className="flex items-center gap-1.5 bg-indigo-50 text-indigo-700 border border-indigo-200 px-3 py-1.5 rounded-full text-[12px] font-bold hover:bg-indigo-100 transition-colors">
                <Users size={12}/> 관리자 가이드
              </button>
            </div>
            <div className="flex items-center gap-0.5">
              <button className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 transition-colors">
                <svg viewBox="0 0 20 20" fill="none" className="w-5 h-5"><circle cx="10" cy="10" r="8" stroke="#7c3aed" strokeWidth="1.5"/><circle cx="10" cy="10" r="3.5" fill="#7c3aed"/></svg>
              </button>
              <button className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-500 transition-colors"><MessageSquare size={16}/></button>
              <button className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-500 transition-colors"><Play size={15} className="ml-0.5"/></button>
              <button className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-500 transition-colors"><BarChart2 size={16}/></button>
              <button className="relative w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-500 transition-colors">
                <Filter size={15}/>
                <span className="absolute top-0.5 right-0.5 min-w-[14px] h-[14px] bg-rose-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center leading-none px-0.5">0</span>
              </button>
              <button className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-500 transition-colors"><Settings size={16}/></button>
              <div className="w-px h-5 bg-slate-200 mx-1.5"/>
              <button className="flex items-center gap-1.5 hover:bg-slate-50 pl-0.5 pr-2 py-1 rounded-lg transition-colors">
                <div className="w-7 h-7 rounded-full bg-gradient-to-br from-slate-400 to-slate-600 flex items-center justify-center text-white text-[11px] font-bold shrink-0">조</div>
                <span className="text-[13px] font-semibold text-slate-700">조찬현</span>
                <ChevronDown size={13} className="text-slate-400"/>
              </button>
            </div>
          </div>

          {/* 페이지 서브 헤더 */}
          <header className="shrink-0">
            <div className="px-8 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <a href="index.html" className="w-8 h-8 bg-slate-100 text-slate-500 rounded-lg flex items-center justify-center hover:bg-slate-200 transition-colors" title="코스 목록">
                  <ChevronLeft size={18}/>
                </a>
                <div className="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center font-bold shadow-sm"><MapPin size={18}/></div>
                <div>
                  <h1 className="text-lg font-extrabold text-slate-900 leading-none mb-1">{isEditMode ? '오프라인 코스 편집' : '오프라인 코스 개설'}</h1>
                </div>
                <span className={`ml-2 px-3 py-1 rounded-full text-[12px] font-bold border flex items-center gap-1.5 ${statusColor[courseStatus]}`}>
                  <CircleDot size={10}/>
                  {statusLabel[courseStatus]}
                </span>
                {courseStatus === 'scheduled' && scheduledAt && (
                  <div className="ml-1 flex items-center gap-1.5 bg-violet-50 border border-violet-200 rounded-full px-3 py-1">
                    <Clock size={11} className="text-violet-500"/>
                    <span className="text-[11px] font-bold text-violet-700">
                      {new Date(scheduledAt).toLocaleString('ko-KR', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })}
                    </span>
                    <button onClick={handleCancelSchedule} className="text-violet-400 hover:text-red-500 transition-colors ml-0.5" title="예약 취소"><X size={11}/></button>
                  </div>
                )}
              </div>
              <div className="flex items-center gap-2">
                {lastSavedAt && (
                  <span className="text-[12px] text-slate-400 font-medium mr-1">
                    마지막 저장: {lastSavedAt.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' })}
                  </span>
                )}
                <button data-feature-id="A2-13" onClick={handleSaveDraft} className="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors flex items-center gap-2 shadow-sm">
                  <Save size={15}/> 임시저장
                </button>
                <button data-feature-id="A2-16" onClick={() => setIsPreviewOpen(true)} className="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm font-bold hover:bg-slate-600 transition-colors flex items-center gap-1.5 shadow-sm">
                  <Eye size={15}/> 미리보기
                </button>
                <button data-feature-id="A2-14" onClick={() => setShowPublishModal(true)} disabled={!canPublish} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-sm transition-colors ${canPublish ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                  <Send size={15}/> 퍼블리싱
                </button>
              </div>
            </div>
          </header>

          <div className="flex-1 flex overflow-hidden">

            {/* Main */}
            <main className="flex-1 overflow-y-auto custom-scrollbar py-10 space-y-8 animate-fadeIn pb-32">
              <div className="w-[800px] mx-auto px-0 space-y-8">

              {/* 섹션 1: 기본 정보 */}
              <section className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden" data-feature-id="A2-01">
                <div className="bg-slate-50 border-b border-slate-100 px-6 py-4 flex items-center gap-2 cursor-pointer select-none" onClick={() => setSecOpen(p => ({...p, s1: !p.s1}))}>
                  <div className="w-6 h-6 bg-slate-800 text-white rounded-full flex items-center justify-center text-xs font-bold">1</div>
                  <h2 className="text-base font-bold text-slate-800">코스 기본 정보</h2>
                  <div className="ml-auto flex items-center gap-2"><SecStatus status={secStatus(1)}/><ChevronDown size={16} className={`text-slate-400 transition-transform ${secOpen.s1 ? '' : '-rotate-90'}`}/></div>
                </div>
                <div className={`p-6 space-y-6 ${!secOpen.s1 ? 'hidden' : ''}`}>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1.5">코스명 <span className="text-red-500">*</span></label>
                    <input type="text" value={courseInfo.title} onChange={e => setCourseInfo({...courseInfo, title: e.target.value})} className="w-full border border-slate-300 rounded-lg p-3 text-[15px] focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" placeholder="예: 2026 직무교육 — 프로젝트 관리 심화"/>
                  </div>
                  {/* ── 커버 이미지 ── */}
                  <div data-feature-id="A2-02">
                    <label className="block text-sm font-bold text-slate-700 mb-1.5">
                      커버 이미지 <span className="text-red-500">*</span>
                      <span className="text-slate-400 font-normal ml-2 text-[12px]">코스 목록에 표시되는 대표 이미지</span>
                    </label>
                    <div className="flex items-start gap-4">
                      {/* 미리보기 / 업로드존 */}
                      {coverImage ? (
                        <div className="relative w-[90px] h-[150px] rounded-lg overflow-hidden border border-slate-200 shrink-0 bg-slate-100">
                          <img src={coverImage.dataUrl} alt="커버" className="w-full h-full object-cover"/>
                          <button onClick={removeCoverImage} className="absolute top-1 right-1 w-5 h-5 bg-slate-900/60 hover:bg-red-500 text-white rounded-full flex items-center justify-center transition-colors">
                            <X size={10}/>
                          </button>
                        </div>
                      ) : (
                        <button onClick={() => coverInputRef.current?.click()}
                          className="w-[90px] h-[150px] rounded-lg border-2 border-dashed border-slate-300 hover:border-indigo-400 hover:bg-indigo-50 flex flex-col items-center justify-center gap-1.5 transition-colors shrink-0 group">
                          <ImageIcon size={22} className="text-slate-300 group-hover:text-indigo-400 transition-colors"/>
                          <span className="text-[11px] text-slate-400 group-hover:text-indigo-500 font-bold">이미지 선택</span>
                        </button>
                      )}
                      {/* 안내 + 버튼 */}
                      <div className="flex flex-col gap-2 pt-1">

                          </div>
                        </label>
                        <label className={`flex items-center gap-2.5 p-3.5 rounded-xl border-2 cursor-pointer transition-all
                          ${publishType === 'scheduled' ? 'border-indigo-500 bg-indigo-50/50' : 'border-slate-200 hover:border-indigo-200'}`}>
                          <input type="radio" name="pubType" checked={publishType === 'scheduled'} onChange={() => setPublishType('scheduled')} className="w-4 h-4 accent-indigo-600"/>
                          <div>
                            <div className="text-[14px] font-bold text-slate-800">예약 공개</div>
                            <div className="text-[12px] text-slate-500 mt-0.5">지정 일시에 자동으로 공개</div>
                          </div>
                        </label>
                      </div>
                      {publishType === 'scheduled' && (
                        <div className="mt-3 bg-violet-50 border border-violet-200 rounded-xl px-4 py-3 animate-fadeIn space-y-2">
                          <label className="block text-[12px] font-bold text-violet-700 mb-1.5 flex items-center gap-1"><Clock size={11}/> 공개 예약 일시</label>
                          <input
                            type="datetime-local"
                            value={publishSchedule}
                            min={new Date().toISOString().slice(0,16)}
                            onChange={e => setPublishSchedule(e.target.value)}
                            className="w-full border border-violet-300 rounded-lg p-2.5 text-[14px] outline-none focus:border-violet-500 text-slate-700 bg-white"
                          />
                          {publishSchedule && (
                            <div className="text-[11px] text-violet-600 font-semibold">
                              📅 {new Date(publishSchedule).toLocaleString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'})} 에 학습자에게 공개됩니다
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}

                  {/* 경고 */}
                  {allPassed && (
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-3.5 flex gap-2.5 animate-fadeIn">
                      <AlertTriangle size={16} className="text-amber-500 mt-0.5 shrink-0"/>
                      <div className="text-[12px] text-amber-800 leading-relaxed">
                        <strong>퍼블리싱 후 주의사항</strong><br/>
                        · 학습자 앱에 즉시 노출되며, 신청이 시작될 수 있습니다.<br/>
                        · 공개 후에도 수정은 가능하나, 이미 신청된 학습자에게 변경 알림이 발송됩니다.<br/>
                        · 차수 삭제 시 해당 신청 건은 자동 취소 처리됩니다.
                      </div>
                    </div>
                  )}
                </div>

                {/* 푸터 */}
                <div className="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                  <button onClick={() => setShowPublishModal(false)} className="px-5 py-2.5 bg-white border border-slate-300 rounded-xl text-[14px] font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                    취소
                  </button>
                  <div className="flex items-center gap-2">
                    <button onClick={() => { handleSaveDraft(); setShowPublishModal(false); }} className="px-5 py-2.5 bg-white border border-slate-300 rounded-xl text-[14px] font-bold text-slate-600 hover:bg-slate-50 transition-colors flex items-center gap-1.5">
                      <Save size={14}/> 임시저장만
                    </button>
                    <button
                      onClick={handlePublish}
                      disabled={!allPassed || (publishType === 'scheduled' && !publishSchedule)}
                      className={`px-6 py-2.5 rounded-xl text-[14px] font-bold flex items-center gap-1.5 transition-all shadow-sm
                        ${allPassed && !(publishType === 'scheduled' && !publishSchedule)
                          ? 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-200'
                          : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                    >
                      <Send size={14}/> {publishType === 'scheduled' ? '예약 퍼블리싱' : '즉시 퍼블리싱'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
            );
          })()}

          {/* ══ 임시저장 토스트 ══ */}
          {toast && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] ${toast.dismissing ? 'toast-out' : 'toast-in'}`}>
              {toast.type === 'first' ? (
                /* ── 첫 저장: 강조 토스트 (자동 소멸 없음) ── */
                <div className="bg-white border border-slate-200 rounded-2xl shadow-card px-6 py-4 flex items-center gap-4 min-w-[420px]">
                  <div className="w-10 h-10 rounded-xl bg-emerald-50 border border-emerald-200 flex items-center justify-center shrink-0">
                    <Check size={20} className="text-emerald-600"/>
                  </div>
                  <div className="flex-1">
                    <div className="text-[14px] font-bold text-slate-800">코스가 임시저장되었습니다</div>
                    <div className="text-[12px] text-slate-400 mt-0.5">목록에서 확인하거나 계속 편집할 수 있습니다.</div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={dismissToast} className="px-3.5 py-2 bg-white border border-slate-200 rounded-lg text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                      계속 편집
                    </button>
                    <a href="index.html" className="px-3.5 py-2 bg-indigo-500 text-white rounded-lg text-[13px] font-bold hover:bg-indigo-600 transition-colors">
                      목록으로 이동
                    </a>
                  </div>
                </div>
              ) : toast.type === 'repeat' ? (
                /* ── 재저장: 가벼운 토스트 (3초 자동 소멸) ── */
                <div
                  className="bg-slate-800 text-white rounded-xl shadow-card px-5 py-3 flex items-center gap-3 min-w-[320px]"
                  onMouseEnter={() => { if (toastTimer.current) clearTimeout(toastTimer.current); }}
                  onMouseLeave={() => { toastTimer.current = setTimeout(dismissToast, 2000); }}
                >
                  <Check size={16} className="text-emerald-400 shrink-0"/>
                  <span className="text-[13px] font-bold flex-1">임시저장 완료</span>
                  <span className="text-[12px] text-slate-400 font-medium">
                    {lastSavedAt && lastSavedAt.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' })}
                  </span>
                  <a href="index.html" className="text-[12px] font-bold text-indigo-300 hover:text-indigo-200 transition-colors ml-1">
                    목록으로 이동
                  </a>
                </div>
              ) : toast.type === 'info' ? (
                /* ── 설정 변경 알림 토스트 ── */
                <div
                  className="bg-slate-800 text-white rounded-xl shadow-card px-5 py-3 flex items-center gap-3 max-w-[420px]"
                  onMouseEnter={() => { if (toastTimer.current) clearTimeout(toastTimer.current); }}
                  onMouseLeave={() => { toastTimer.current = setTimeout(dismissToast, 2000); }}
                >
                  <span className="text-[18px] leading-none shrink-0">{toast.icon}</span>
                  <span className="text-[13px] font-medium flex-1 leading-snug">{toast.message}</span>
                  <button onClick={dismissToast} className="text-slate-500 hover:text-white transition-colors ml-1 shrink-0"><X size={14}/></button>
                </div>
              ) : null}
            </div>
          )}
          </div>{/* flex-1 wrapper 끝 */}

          {/* 시간대 추가 fixed 툴팁 (overflow 짤림 방지) */}
          {timeSlotTip && (
            <div
              style={{ position: 'fixed', right: timeSlotTip.right, top: timeSlotTip.y - 10, transform: 'translateY(-100%)', zIndex: 9999 }}
              className="pointer-events-none bg-slate-800 text-white px-3 py-2 rounded-xl shadow-2xl whitespace-nowrap text-right"
            >
              <div className="text-[12px] font-bold mb-0.5">같은 날짜에 다른 시간대 회차 추가</div>
              <div className="text-[11px] text-slate-300">예: 오전반 09:00~12:00 / 오후반 13:00~17:00</div>
              <div style={{ position: 'absolute', top: '100%', right: 10, width: 0, height: 0, borderLeft: '5px solid transparent', borderRight: '5px solid transparent', borderTop: '5px solid #1e293b' }}/>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
  <script src="feature-highlight.js"></script>
</body>
</html>
