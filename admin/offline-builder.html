      const firstDay = new Date(year, month, 1).getDay();

      const OC = ['#6366f1','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4'];

                  {cells.map((d,i) => {
                    if (d===null) return <div key={i}/>;
                    const my = myByDay[d];
                    const others = otherByDay[d]||[];
                    const td = isToday(d);
                    const isEd = my && editId===my.id;
                    return (
                      <div key={i} className="flex flex-col items-center justify-start pt-1.5 cursor-pointer group rounded-lg hover:bg-slate-50 transition-colors" onClick={()=>onDay(d)}>
                        <div className={`w-8 h-8 flex items-center justify-center rounded-full text-[13px] font-semibold transition-all
                          ${my ? (isEd?'bg-indigo-600 text-white ring-2 ring-indigo-300':'bg-indigo-100 text-indigo-700 hover:bg-indigo-200')
                            : td?'ring-2 ring-indigo-400 text-indigo-600 font-bold':'text-slate-600 group-hover:bg-slate-100'}`}>
                          {d}
                        </div>
                        {my && <div className="text-[9px] text-indigo-400 font-bold mt-0.5 leading-none">{my.startTime}</div>}
                        {others.length>0 && (
                          <div className="flex gap-0.5 mt-0.5">
                            {others.slice(0,3).map((c,j)=><div key={j} style={{background:c}} className="w-1 h-1 rounded-full opacity-40"/>)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="mt-3 flex items-center gap-4 text-[10px] text-slate-400 shrink-0">
                  <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-indigo-100 border border-indigo-200"/><span>이 차수</span></div>
                  <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-violet-400 opacity-50"/><span>다른 차수</span></div>
                  <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full border-2 border-indigo-400"/><span>오늘</span></div>
                  <span className="ml-auto text-slate-300">빈 날짜 클릭 → 회차 추가</span>
                </div>
              </div>
              {/* 우: 회차 목록 */}
              <div className="flex-1 flex flex-col min-h-0">
                <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100 shrink-0">

                    </div>
                  ) : opt.sessions.map((s,idx) => {
                    const isEd = editId===s.id;
                    return (
                      <div key={s.id} className={`border rounded-xl overflow-hidden transition-all ${isEd?'border-indigo-300 shadow-sm':'border-slate-200'}`}>

                          <div className="flex-1 min-w-0">

                        </div>
                        {isEd && (

                              </div>
                              <div>
                                <label className="block text-[11px] font-bold text-slate-600 mb-1">장소 (선택)</label>
                                <input value={s.place||''} onChange={e=>onSessionChange(s.id,'place',e.target.value,opt.id)} placeholder={opt.place||'기본 장소'} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>

                            <div className="grid grid-cols-2 gap-2.5">
                              <div>

                                <input type="time" value={s.startTime||''} onChange={e=>onSessionChange(s.id,'startTime',e.target.value,opt.id)} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>
                              <div>
                                <label className="block text-[11px] font-bold text-slate-600 mb-1">종료 시간</label>
                                <input type="time" value={s.endTime||''} onChange={e=>onSessionChange(s.id,'endTime',e.target.value,opt.id)} className="w-full border border-indigo-200 rounded-lg px-2 py-1.5 text-[12px] outline-none focus:border-indigo-400 bg-white"/>
                              </div>
                            </div>
                          </div>

                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ── Main App ── */
    const App = () => {
      const [sideExpanded, setSideExpanded] = useState(new Set(['course']));
      const toggleSideMenu = (id) => setSideExpanded(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });

      const _editData = isEditMode ? COURSE_EDIT_DATA[Number(courseId)] : null;
      const [courseInfo, setCourseInfo] = useState(_editData ? _editData.info : {
        title: '', category: '', instructor: '', instructorDesc: '', intro: '', location: '', address: '', traffic: '', sessionInstructorMode: false, sessionPlaceMode: false
      });

      const [detailTop, setDetailTop] = useState('cover'); // 'cover' | 'images'
      const [detailImages, setDetailImages] = useState([]);

      const [regPeriod, setRegPeriod] = useState({ start: '2026-04-10T09:00', end: '2026-04-25T18:00' });
      const [regNoLimit, setRegNoLimit] = useState(false);   // 신청 기간 제한 없음 — 오프라인은 마감을 차수별 일정·정원에 위임(상시/장기 모집)
      const [cancelPolicy, setCancelPolicy] = useState({ enabled: false, mode: 'allowed', relativeValue: 3, relativeUnit: 'day' });
      // mode: 'allowed' = 기한부 취소 가능 | 'blocked' = 취소 불가
      const [changePolicy, setChangePolicy] = useState({ enabled: false, relativeValue: 5, relativeUnit: 'day' });
      const [isSelfEnroll, setIsSelfEnroll] = useState(true);   // 회원이 직접 신청
      const [adminAssign, setAdminAssign] = useState(false);    // 관리자가 등록 — 회원신청과 독립, 둘 다 ON 가능
      const [isPreviewOpen, setIsPreviewOpen] = useState(false);
      const [isStructureOpen, setIsStructureOpen] = useState(false);
      const [optionSettingsId, setOptionSettingsId] = useState(null);
      const [mapQuery, setMapQuery] = useState('');
      const [selectionRule, setSelectionRule] = useState('single');
      const [minSelect, setMinSelect] = useState(2);
      const [maxSelect, setMaxSelect] = useState(3);
      const [selectedMobileOptions, setSelectedMobileOptions] = useState([]);
      const [timeSlotTip, setTimeSlotTip] = useState(null);
      const [collapsedOpts, setCollapsedOpts] = useState({});
      const toggleCollapse = (optId) => setCollapsedOpts(prev => ({ ...prev, [optId]: !prev[optId] }));
      const [calModeOptId, setCalModeOptId] = useState(null);

      /* ── 코스 상태 & 퍼블리싱 ── */
      const [coverImage, setCoverImage] = useState(null); // null | { dataUrl, fileName }
      const coverInputRef = useRef(null);

      const [courseStatus, setCourseStatus] = useState(_editData ? _editData.status : 'draft'); // draft | saved | scheduled | published
      const [lastSavedAt, setLastSavedAt] = useState(null);
      const [showPublishModal, setShowPublishModal] = useState(false);
      // 차수 인원 배정 모달 (수강생 등록 모달 패턴 차용 — 그룹/개인 탭)
      const [assignModalOptId, setAssignModalOptId] = useState(null);
      const [assignSearch, setAssignSearch] = useState('');
      const [assignTemp, setAssignTemp] = useState(new Set());        // 모달 내 임시 선택 (등록 시 확정)
      const [assignPage, setAssignPage] = useState(1);
      const [assignGroupFilter, setAssignGroupFilter] = useState('all');
      const [assignGroupDrop, setAssignGroupDrop] = useState(false);
      // 코스 분류 — 다중 선택 + 검색 체크박스 트리 (TouchClass 코스 분류 UI)
      const [catPickerOpen, setCatPickerOpen] = useState(false);
      const [catSearch, setCatSearch] = useState('');
      const [catCollapsed, setCatCollapsed] = useState(new Set());
      const [publishType, setPublishType] = useState('now'); // now | scheduled
      const [publishSchedule, setPublishSchedule] = useState('');
      const [scheduledAt, setScheduledAt] = useState(null); // 예약 확정 시 datetime string 저장
      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);
      const scheduleCheckRef = useRef(null);
      const [secOpen, setSecOpen] = useState({ s1: true, s2: true, s3: true, s4: true });
      const [eligibleGroups, setEligibleGroups] = useState([]);
      const [eligGrpDrop, setEligGrpDrop] = useState(false);

      const statusLabel = { draft: '임시저장', saved: '임시저장', scheduled: '공개 예약됨', published: '퍼블리싱됨' };
      const statusColor = { draft: 'bg-amber-50 text-amber-700 border-amber-200', saved: 'bg-amber-50 text-amber-700 border-amber-200', scheduled: 'bg-violet-50 text-violet-700 border-violet-300', published: 'bg-emerald-50 text-emerald-700 border-emerald-200' };

      const dismissToast = () => {
        setToast(prev => prev ? { ...prev, dismissing: true } : null);
        setTimeout(() => setToast(null), 200);
      };

      const showToast = (message, icon = '✅', duration = 3000) => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ type: 'info', message, icon, dismissing: false });
        toastTimer.current = setTimeout(dismissToast, duration);
      };

      useEffect(() => {
        if (courseId) {
          const saved = localStorage.getItem('lms_cover_' + courseId);
          if (saved) setCoverImage(JSON.parse(saved));
        }
      }, []);

      const handleCoverFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
          alert('파일 크기는 5MB 이하여야 합니다.');
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          const data = { dataUrl: ev.target.result, fileName: file.name };
          setCoverImage(data);
          if (courseId) localStorage.setItem('lms_cover_' + courseId, JSON.stringify(data));
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const removeCoverImage = () => {
        setCoverImage(null);

        if (q) setMapQuery(q);
      };

      const handleSaveDraft = () => {
        const isFirstSave = courseStatus === 'draft';
        setCourseStatus('saved');
        setLastSavedAt(new Date());

        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ type: isFirstSave ? 'first' : 'repeat', dismissing: false });

        if (!isFirstSave) {
          toastTimer.current = setTimeout(dismissToast, 3000);
        }
        setIsDirty(false);

      /* ─── 나가기 가드 ─── */

      const [isDirty, setIsDirty] = useState(true); // 빌더 진입 = 작업 중으로 간주, 임시저장 시 false

      useEffect(() => { setIsDirty(true); }, [courseInfo, regPeriod, options]);
      const exitToList = () => {
        isDirtyRef.current = false; // 이동 직전 동기 해제 → beforeunload 가드 무력화

      const tryExit = (e) => {

        exitToList();

        exitToList();

        if (!showExitModal) return;
        const h = (e) => { if (e.key === 'Escape') setShowExitModal(false); };
        window.addEventListener('keydown', h);

      }, [showExitModal]);
      useEffect(() => {
        const h = (e) => { if (isDirtyRef.current) { e.preventDefault(); e.returnValue = ''; } };
        window.addEventListener('beforeunload', h);
        return () => window.removeEventListener('beforeunload', h);
      }, []);

      const getValidation = () => [
        { label: '코스명 입력', ok: !!courseInfo.title.trim() },
        { label: '담당 강사 지정', ok: !!courseInfo.instructor.trim() },
        { label: '교육 장소 설정', ok: !!courseInfo.location.trim() },
        { label: '등록 방식 1개 이상', ok: isSelfEnroll || adminAssign },
        { label: '신청 기간 설정', ok: !isSelfEnroll || regNoLimit || (!!regPeriod.start && !!regPeriod.end) },
        { label: '최소 1개 차수 생성', ok: options.length > 0 },
        { label: '모든 차수에 회차 존재', ok: options.every(o => o.sessions.length > 0) },
        { label: '모든 회차 날짜/시간 설정', ok: options.every(o => o.sessions.every(s => s.date && s.startTime && s.endTime)) },
        { label: '다중 조합형 차수 일정 미겹침', ok: selectionRule !== 'multiple' || !hasOptionOverlap },
        { label: '배정 인원 일정 겹침 없음 (지정등록)', ok: !adminAssign || !hasPersonOverlap },
        { label: '수료 조건 최소 1개 설정', ok: completionRules.length > 0 },
      ];

      const handlePublish = () => {
        const checks = getValidation();
        if (checks.some(c => !c.ok)) return;
        if (publishType === 'scheduled' && publishSchedule) {
          const schedDt = new Date(publishSchedule);
          if (schedDt <= new Date()) {
            // 이미 지난 시간이면 즉시 퍼블리싱
            setCourseStatus('published');
            setScheduledAt(null);
            showToast('예약 시간이 이미 지나 즉시 퍼블리싱됩니다', '🚀');

            setCourseStatus('scheduled');

            scheduleCheckRef.current = setTimeout(() => {
              setCourseStatus('published');
              setScheduledAt(null);
              showToast('예약된 시간이 되어 코스가 공개됐습니다', '🎉', 5000);
            }, schedDt - new Date());
            showToast(`${schedDt.toLocaleString('ko-KR', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}에 공개 예약됐습니다`, '📅', 4000);
          }
        } else {
          setCourseStatus('published');
          setScheduledAt(null);
          showToast('코스가 즉시 공개됐습니다', '🚀');

      const addOptEligGrp = (optId, grp) => setOptions(options.map(o => o.id === optId ? { ...o, eligGroups: (o.eligGroups||[]).find(g=>g.id===grp.id) ? o.eligGroups : [...(o.eligGroups||[]), { id: grp.id, name: grp.name }] } : o));
      const remOptEligGrp = (optId, gid) => setOptions(options.map(o => o.id === optId ? { ...o, eligGroups: (o.eligGroups||[]).filter(g=>g.id!==gid) } : o));

      const categories = [

      /* ── 회차 집계 & 차수 간 일정 겹침 검사 (다중 조합형 가드 + 수료 출석 기준) ── */
      // 출석/수료 판정 단위는 항상 '회차(session)'. 차수는 등록 단위일 뿐 판정 단위가 아니다.
      const totalSessionCount = options.reduce((sum, o) => sum + o.sessions.length, 0);
      const _toMin = (t) => { const [h, m] = (t || '0:0').split(':').map(Number); return (h || 0) * 60 + (m || 0); };
      const _sessConflict = (a, b) => a.date && b.date && a.date === b.date

      const overlapPairs = (() => {

      // 차수 일정이 겹치면 다중 조합형은 성립 불가 → 단일 선택형으로 자동 복귀
      useEffect(() => {

      // A안: 다중 조합형에선 회차선택형 사용 불가(회차 분기는 차수 분리로 표현).
      // 다중 전환 시 회차선택형 차수를 전체일정으로 자동 전환 + 안내(조용히 바꾸지 않음).

      // 관리자배정 ON 시 회차선택형 사용 불가(배정 시 회차까지 지정 불가 → 차수 분리로 표현).
      useEffect(() => {
        if (!adminAssign) return;

        if (converted.length === 0) return;
        setOptions(prev => prev.map(o => o.sessionSelect ? { ...o, sessionSelect: false } : o));
        showToast(`관리자배정에선 회차선택형을 쓸 수 없어 ${converted.length}개 차수를 전체일정으로 변경했습니다`, '📅');
      }, [adminAssign]);

      const [activeOptionId, setActiveOptionId] = useState(1);
      const [showBatchForm, setShowBatchForm] = useState(null); // null | optId
      const [batchData, setBatchData] = useState({ startDate: '', endDate: '', days: [], startTime: '09:00', endTime: '18:00', place: '' });

      /* ── 차수 드래그앤드롭 ── */

      const dragOverOptId = useRef(null);
      const [draggingOpt, setDraggingOpt] = useState(null);
      const [dragOverOpt, setDragOverOpt] = useState(null);

      const onOptDragStart = (e, id) => { dragOptId.current = id; setDraggingOpt(id); e.dataTransfer.effectAllowed = 'move'; };

      const onOptDrop = (e) => {

        const arr = [...options];
        const fi = arr.findIndex(o => o.id === from), ti = arr.findIndex(o => o.id === to);
        const [rem] = arr.splice(fi, 1); arr.splice(ti, 0, rem);
        setOptions(arr);
        dragOptId.current = null; dragOverOptId.current = null;
        setDraggingOpt(null); setDragOverOpt(null);
      };
      const onOptDragEnd = () => { setDraggingOpt(null); setDragOverOpt(null); dragOptId.current = null; dragOverOptId.current = null; };

      /* ── 회차 드래그앤드롭 ── */
      const dragSessId = useRef(null);
      const dragOverSessId = useRef(null);
      const [draggingSess, setDraggingSess] = useState(null);

        setOptions(options.map(opt => {

      /* ── 세션 CRUD (optId 명시) ── */
      const handleAddSession = (optId) => {
        setOptions(options.map(opt => {

      };
      const handleSessionChange = (sid, field, val, optId) => setOptions(options.map(opt => opt.id === optId ? { ...opt, sessions: opt.sessions.map(s => s.id === sid ? { ...s, [field]: val } : s) } : opt));
      /* ── 강사 상속 (대표 → 차수 → 회차) ── */
      // 차수가 2개 이상일 때만 차수 강사 칸을 노출/적용한다. 1개면 대표 → 회차 2단으로 동작.
      const cohortInstrOn = options.length > 1;
      // 회차강사를 비웠을 때 상속될 강사명(차수강사 → 대표강사). placeholder 안내용.
      const inheritedInstr = (opt) => (cohortInstrOn && (opt.instructor || '').trim())
        ? (opt.instructor || '').trim()
        : ((courseInfo.instructor || '').trim() || '대표 강사 미설정');
      // 학습 시간: startTime~endTime 자동 계산(분). studyMinOverride 있으면 그 값 우선.
      const sessMin = (s) => { if(!s.startTime||!s.endTime) return 0; const [a,b]=s.startTime.split(':').map(Number),[c,d]=s.endTime.split(':').map(Number); return Math.max(0,(c*60+d)-(a*60+b)); };
      const fmtDurB = (m) => { if(!m) return '-'; const h=Math.floor(m/60),mm=m%60; return (h&&mm)?`${h}시간 ${mm}분`:h?`${h}시간`:`${mm}분`; };
      const handleAddTimeSlot = (optId, refSess) => {

          const next = [...opt.sessions];

      };

      /* ── 회차별 정원·그룹 오버라이드 ── */
      const handleSessionGroupsInit = (sessId, optId, defaultGroups, defaultCap) => {
        // groups: [] = 개별 정원 ON 플래그(hasIndividual). 그룹별 좌석지정은 회원별 배정(명단 관리)으로 대체되어 제거
        setOptions(options.map(opt => opt.id !== optId ? opt : {

      const handleSessionGroupsReset = (sessId, optId) => {

      const handleSessionCapacityChange = (sessId, optId, val) => {
        setOptions(options.map(opt => opt.id !== optId ? opt : {
          ...opt, sessions: opt.sessions.map(s => s.id !== sessId ? s : { ...s, capacity: Math.max(0, parseInt(val)||0) })
        }));

      /* ── 일괄 생성 ── */
      const toggleBatchDay = (day) => setBatchData(prev => ({ ...prev, days: prev.days.includes(day) ? prev.days.filter(d => d !== day) : [...prev.days, day] }));
      const handleBatchGenerateSessions = () => {
        const start = new Date(batchData.startDate), end = new Date(batchData.endDate);
        const dayMap = { '일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6 };

        const generated = [];
        let curr = new Date(start);
        while (curr <= end) {
          if (targetDays.includes(curr.getDay())) {
            const y = curr.getFullYear(), m = String(curr.getMonth()+1).padStart(2,'0'), d = String(curr.getDate()).padStart(2,'0');

          }
          curr.setDate(curr.getDate() + 1);
        }
        if (generated.length === 0) return alert('선택한 요일이 기간 내에 없습니다.');
        const batchOptId = showBatchForm;
        setOptions(options.map(opt => opt.id === batchOptId ? { ...opt, sessions: [...opt.sessions, ...generated.map((d, i) => ({ id: Date.now() + i, name: `${opt.sessions.length + i + 1}회차`, capacity: null, groups: null, ...d }))] } : opt));
        setShowBatchForm(null);

          const n = [courseInfo.title, courseInfo.instructor, courseInfo.location].filter(v => v && v.trim()).length;
          return n === 3 ? 'done' : n > 0 ? 'partial' : 'empty';
        }
        if (sec === 2) {
          if (!isSelfEnroll && !adminAssign) return 'empty';   // 등록 방식 없음
          if (!isSelfEnroll) return 'done';                    // 관리자 등록만 → 신청기간 불필요
          if (regNoLimit) return 'done';
          return (regPeriod.start && regPeriod.end) ? 'done' : (regPeriod.start || regPeriod.end) ? 'partial' : 'empty';
        }
        if (sec === 3) {
          if (!options.length) return 'empty';
          const ok = options.every(o => o.sessions.length > 0 && o.sessions.every(s => s.date && s.startTime && s.endTime));
          return ok ? 'done' : 'partial';

        return completionRules.length > 0 ? 'done' : 'empty';

                  </div>

                  <div>

                              <th className="px-3 py-2 text-left font-semibold">날짜</th>
                              <th className="px-3 py-2 text-left font-semibold">시간</th>
                              <th className="px-3 py-2 text-left font-semibold">장소</th>
                              <th className="px-3 py-2 text-right font-semibold">정원</th>
                            </tr>
                          </thead>
                          <tbody>
                            {opt.sessions.map((s, si) => (
                              <tr key={s.id} className="border-t border-slate-100 hover:bg-slate-50">
                                <td className="px-4 py-2.5 text-slate-400 font-bold">{si+1}</td>
                                <td className="px-3 py-2.5 font-semibold text-slate-700">{s.name}</td>
                                <td className="px-3 py-2.5 text-slate-500">{s.date || '—'}</td>
                                <td className="px-3 py-2.5 text-slate-500 tabular-nums">
                                  {s.startTime ? `${s.startTime}${s.endTime ? ` ~ ${s.endTime}` : ''}` : '—'}

                                <td className="px-3 py-2.5 text-slate-400 truncate max-w-[120px]">{s.place || opt.place || '—'}</td>

                                    : <span className="text-slate-400 text-[11px]">차수 따름</span>
                                  }
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── 캘린더 모드 모달 ── */}
          {calModeOptId && (() => {
            const calOpt = options.find(o => o.id === calModeOptId);
            if (!calOpt) return null;
            return (
              <CalendarModeModal
                key={calModeOptId}
                opt={calOpt}
                options={options}
                onClose={() => setCalModeOptId(null)}
                onSessionChange={handleSessionChange}
                onAddSession={handleAddSessionWithDate}
                onRemoveSession={handleRemoveSession}
              />
            );
          })()}

          {/* ── 나가기 가드 모달 (뒤로가기 클릭 시) ── */}
          {/* ══ 차수 인원 배정 모달 (수강생 등록 모달 패턴 — 그룹/개인 탭) ══ */}
          {assignModalOptId && (() => {
            const aopt = options.find(o => o.id === assignModalOptId);
            if (!aopt) return null;
            const dupIds = new Set(personOverlapPairs.filter(p => p.a === aopt.name || p.b === aopt.name).map(p => p.pid));
            const filtered = ALL_PERSONS.filter(m =>
              (assignGroupFilter === 'all' || (m.groups || []).some(gn => gn === assignGroupFilter)) &&
              (!assignSearch || m.name.includes(assignSearch) || (m.loginId || '').includes(assignSearch)));
            const PAGE = 10;
            const pageCount = Math.max(1, Math.ceil(filtered.length / PAGE));
            const curPage = Math.min(assignPage, pageCount);
            const pageRows = filtered.slice((curPage - 1) * PAGE, curPage * PAGE);
            const pageAllOn = pageRows.length > 0 && pageRows.every(m => assignTemp.has(m.id));
            const toggle = id => setAssignTemp(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
            const togglePageAll = () => setAssignTemp(prev => { const n = new Set(prev); if (pageAllOn) pageRows.forEach(m => n.delete(m.id)); else pageRows.forEach(m => n.add(m.id)); return n; });
            const selList = [...assignTemp];
            const overCap = selList.length > aopt.capacity;
            const pageNums = []; for (let i = 1; i <= Math.min(5, pageCount); i++) pageNums.push(i);
            return (
              <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center animate-fadeIn p-6" onClick={() => setAssignModalOptId(null)}>
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-[1100px] h-[88vh] flex flex-col" onClick={e => e.stopPropagation()}>
                  {/* 헤더 */}
                  <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                    <div className="text-[18px] font-black text-slate-900">회원 선택 <span className="text-[13px] font-bold text-slate-400">· {aopt.name} (정원 {aopt.capacity}명)</span></div>
                    <button onClick={() => setAssignModalOptId(null)} className="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-500"><X size={18}/></button>
                  </div>
                  <div className="flex-1 flex min-h-0">
                    {/* 좌측: 그룹 필터 + 검색 + 테이블 + 페이지 */}

                      <div className="px-6 pt-5 pb-3">
                        <div className="relative">
                          <button onClick={e => { e.stopPropagation(); setAssignGroupDrop(d => !d); }}
                            className="w-full flex items-center justify-between border border-indigo-200 rounded-xl px-4 py-2.5 text-[14px] bg-white">
                            <span className="font-bold text-indigo-700">{assignGroupFilter === 'all' ? '그룹: 전체' : `그룹: ${assignGroupFilter}`}</span>
                            <ChevronDown size={16} className="text-slate-400"/>
                          </button>
                          {assignGroupDrop && (
                            <div className="absolute left-0 right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-xl shadow-xl max-h-56 overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                              <button onClick={() => { setAssignGroupFilter('all'); setAssignGroupDrop(false); setAssignPage(1); }} className="w-full text-left px-4 py-2 text-[13px] font-bold hover:bg-indigo-50">그룹: 전체</button>
                              {allGroups.map(g => (
                                <button key={g.id} onClick={() => { setAssignGroupFilter(g.name); setAssignGroupDrop(false); setAssignPage(1); }} className="w-full flex justify-between px-4 py-2 text-[13px] hover:bg-indigo-50">
                                  <span className="font-bold text-slate-700">{g.name}</span><span className="text-slate-400">{g.count}명</span>
                                </button>
                              ))}
                            </div>
                          )}
                        </div>
                        <div className="mt-3 flex items-center gap-3">
                          <div className="relative flex-1">
                            <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                            <input value={assignSearch} onChange={e => { setAssignSearch(e.target.value); setAssignPage(1); }} placeholder="이름·아이디 검색..."
                              className="w-full pl-9 pr-3 py-2 text-[13px] border border-slate-200 rounded-lg outline-none focus:border-indigo-400"/>
                          </div>
                          <div className="text-[13px] text-slate-500 shrink-0">검색 결과 <b className="text-slate-800">{filtered.length.toLocaleString()}</b></div>
                        </div>
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar px-6">
                        <table className="w-full text-[13px]">
                          <thead className="sticky top-0 bg-slate-50 z-10">
                            <tr className="text-left text-slate-500 border-b border-slate-200">
                              <th className="py-2.5 w-10 text-center"><input type="checkbox" checked={pageAllOn} onChange={togglePageAll} className="w-4 h-4 accent-indigo-600"/></th>
                              <th className="py-2.5 w-12">사진</th>
                              <th className="py-2.5">이름</th>
                              <th className="py-2.5">아이디</th>
                              <th className="py-2.5">그룹</th>
                              <th className="py-2.5">권한</th>
                            </tr>
                          </thead>
                          <tbody>
                            {pageRows.map(m => {
                              const on = assignTemp.has(m.id);
                              const dup = dupIds.has(m.id);
                              return (
                                <tr key={m.id} onClick={() => toggle(m.id)} className={`border-b border-slate-50 cursor-pointer ${on ? 'bg-indigo-50/50' : 'hover:bg-slate-50'}`}>
                                  <td className="py-2.5 text-center"><input type="checkbox" checked={on} onChange={() => toggle(m.id)} onClick={e => e.stopPropagation()} className="w-4 h-4 accent-indigo-600"/></td>
                                  <td className="py-2.5"><div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><User size={15}/></div></td>
                                  <td className="py-2.5 font-bold text-slate-800">{m.name}{dup && <span className="ml-1 text-[10px] font-bold text-rose-600 bg-rose-50 border border-rose-200 px-1.5 rounded-full">겹침</span>}</td>
                                  <td className="py-2.5 text-slate-500">{m.loginId}</td>
                                  <td className="py-2.5"><div className="flex flex-wrap gap-1">{(m.groups || []).map((gn, gi) => <span key={gi} className="text-[11px] border border-slate-200 rounded px-1.5 py-0.5 text-slate-600">{gn}</span>)}</div></td>
                                  <td className="py-2.5">{m.role && <span className="text-[11px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 rounded px-1.5 py-0.5">{m.role}</span>}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                      <div className="flex items-center justify-center gap-1 px-6 py-3 border-t border-slate-100">
                        <button onClick={() => setAssignPage(p => Math.max(1, p - 1))} className="px-2 py-1 text-slate-400 hover:text-slate-700"><ChevronLeft size={16}/></button>
                        {pageNums.map(n => (
                          <button key={n} onClick={() => setAssignPage(n)} className={`w-8 h-8 rounded-lg text-[13px] font-bold ${n === curPage ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>{n}</button>

                        {pageCount > 5 && <span className="text-slate-400 px-1">… {pageCount}</span>}

                      </div>
                      {(overCap || dupIds.size > 0) && (

                          {overCap && <span className="text-[11px] font-bold text-red-600 bg-red-50 border border-red-200 rounded-lg px-2 py-0.5">정원 초과 {selList.length}/{aopt.capacity}</span>}
                          {dupIds.size > 0 && <span className="text-[11px] font-bold text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-2 py-0.5 flex items-center gap-1"><Info size={9}/> 겹침 중복 {dupIds.size}명</span>}
                        </div>
                      )}
                      <div className="flex-1 overflow-y-auto custom-scrollbar px-5 py-3 space-y-2.5">
                        {selList.length === 0 ? (
                          <div className="text-[13px] text-slate-400 py-4 text-center">선택한 회원이 없습니다</div>
                        ) : selList.map(id => {
                          const dup = dupIds.has(id);
                          return (
                            <div key={id} className="flex items-center justify-between">
                              <span className={`text-[14px] font-bold ${dup ? 'text-rose-600' : 'text-slate-700'}`}>{(PERSON[id] && PERSON[id].name) || id}{dup && ' (겹침)'}</span>
                              <button onClick={() => toggle(id)} className="text-rose-400 hover:text-rose-600"><X size={14}/></button>
                            </div>
                          );
                        })}
                      </div>
                      <div className="px-5 py-4 border-t border-slate-100">
                        <button onClick={() => { handleSetMembers(aopt.id, selList); setAssignModalOptId(null); }}
                          className="w-full flex items-center justify-center gap-1.5 py-3 rounded-xl bg-indigo-600 text-white text-[15px] font-bold hover:bg-indigo-700"><CheckCircle size={16}/> 등록</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {showExitModal && (
            <div className="fixed inset-0 z-[200] bg-slate-900/40 flex items-center justify-center p-6 animate-fadeIn"
              onClick={(e) => { if (e.target === e.currentTarget) setShowExitModal(false); }}>
              <div className="bg-white rounded-3xl shadow-2xl w-[440px] max-w-[92vw] overflow-hidden"
                onClick={(e) => e.stopPropagation()}>
                <div className="px-8 pt-8 pb-5 text-center">
                  <div className="w-14 h-14 bg-rose-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <Save size={28} className="text-white" strokeWidth={2.5}/>
                  </div>
                  <h2 className="text-[18px] font-black text-slate-900 mb-1.5">작성 중인 내용이 있습니다</h2>
                  <p className="text-[13px] text-slate-500 leading-relaxed">저장하지 않으면 입력하신 내용이 사라집니다.</p>
                </div>
                <div className="px-8 pb-7 space-y-2">
                  <button onClick={saveAndExit}
                    className="w-full py-3 rounded-xl bg-rose-600 text-white text-[14px] font-bold hover:bg-rose-700 transition-colors">
                    임시저장하고 나가기
                  </button>
                  <button onClick={discardAndExit}
                    className="w-full py-3 rounded-xl text-[14px] font-semibold text-slate-500 hover:bg-slate-50 transition-colors">
                    저장 안 하고 나가기
                  </button>
                  <button onClick={() => setShowExitModal(false)}
                    className="w-full py-3 rounded-xl border border-slate-200 text-[14px] font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                    취소
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ── 퍼블리싱 모달 ── */}
          {showPublishModal && (() => {
            const checks = getValidation();
            const allPassed = checks.every(c => c.ok);
            const errorCount = checks.filter(c => !c.ok).length;
            return (
            <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center animate-fadeIn p-4" onClick={() => setShowPublishModal(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-[480px] max-h-[90vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                {/* 헤더 */}
                <div className="bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-5 text-white">
                  <div className="flex items-center justify-between">
                    <div>
                      <h3 className="text-[17px] font-black flex items-center gap-2"><Send size={18}/> 코스 퍼블리싱</h3>
                      <p className="text-indigo-200 text-[13px] mt-1">아래 항목을 확인 후 학습자에게 공개합니다.</p>
                    </div>
                    <button onClick={() => setShowPublishModal(false)} className="text-white/60 hover:text-white transition-colors"><X size={22}/></button>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                  {/* 유효성 체크리스트 */}
                  <div>
                    <div className="flex items-center justify-between mb-3">
                      <h4 className="text-[14px] font-bold text-slate-800 flex items-center gap-1.5">
                        <FileText size={14} className="text-slate-400"/> 등록 요건 확인
                      </h4>
                      {allPassed
                        ? <span className="text-[12px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">모두 충족</span>
                        : <span className="text-[12px] font-bold text-rose-600 bg-rose-50 border border-rose-200 px-2 py-0.5 rounded-full">{errorCount}개 미충족</span>
                      }
                    </div>
                    <div className="space-y-1.5">
                      {checks.map((c, i) => (
                        <div key={i} className={`flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] font-semibold transition-colors
                          ${c.ok ? 'bg-emerald-50/60 text-emerald-700' : 'bg-rose-50 text-rose-600'}`}>
                          {c.ok
                            ? <div className="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center shrink-0"><Check size={12} className="text-white"/></div>
                            : <div className="w-5 h-5 bg-rose-400 rounded-full flex items-center justify-center shrink-0"><X size={12} className="text-white"/></div>
                          }
                          {c.label}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 퍼블리싱 방식 */}
                  {allPassed && (
                    <div className="animate-fadeIn">
                      <h4 className="text-[14px] font-bold text-slate-800 mb-3 flex items-center gap-1.5">
                        <Clock size={14} className="text-slate-400"/> 공개 시점
                      </h4>
                      <div className="grid grid-cols-2 gap-3">
                        <label className={`flex items-center gap-2.5 p-3.5 rounded-xl border-2 cursor-pointer transition-all
                          ${publishType === 'now' ? 'border-indigo-500 bg-indigo-50/50' : 'border-slate-200 hover:border-indigo-200'}`}>
                          <input type="radio" name="pubType" checked={publishType === 'now'} onChange={() => setPublishType('now')} className="w-4 h-4 accent-indigo-600"/>
                          <div>
                            <div className="text-[14px] font-bold text-slate-800">즉시 공개</div>
                            <div className="text-[12px] text-slate-500 mt-0.5">저장 즉시 학습자에게 노출</div>
                          </div>
                        </label>
                        <label className={`flex items-center gap-2.5 p-3.5 rounded-xl border-2 cursor-pointer transition-all
                          ${publishType === 'scheduled' ? 'border-indigo-500 bg-indigo-50/50' : 'border-slate-200 hover:border-indigo-200'}`}>
                          <input type="radio" name="pubType" checked={publishType === 'scheduled'} onChange={() => setPublishType('scheduled')} className="w-4 h-4 accent-indigo-600"/>
                          <div>
                            <div className="text-[14px] font-bold text-slate-800">예약 공개</div>
                            <div className="text-[12px] text-slate-500 mt-0.5">지정 일시에 자동으로 공개</div>
                          </div>
                        </label>
                      </div>
                      {publishType === 'scheduled' && (
                        <div className="mt-3 bg-violet-50 border border-violet-200 rounded-xl px-4 py-3 animate-fadeIn space-y-2">
                          <label className="block text-[12px] font-bold text-violet-700 mb-1.5 flex items-center gap-1"><Clock size={11}/> 공개 예약 일시</label>
                          <input
                            type="datetime-local"
                            value={publishSchedule}
                            min={new Date().toISOString().slice(0,16)}
                            onChange={e => setPublishSchedule(e.target.value)}
                            className="w-full border border-violet-300 rounded-lg p-2.5 text-[14px] outline-none focus:border-violet-500 text-slate-700 bg-white"
                          />
                          {publishSchedule && (
                            <div className="text-[11px] text-violet-600 font-semibold">
                              📅 {new Date(publishSchedule).toLocaleString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'})} 에 학습자에게 공개됩니다
                            </div>
                          )}
                        </div>
                      )}
                    </div>

                        · 공개 후에도 수정은 가능하나, 이미 신청된 학습자에게 변경 알림이 발송됩니다.<br/>

                    </button>
                  </div>
                </div>
              </div>
            </div>

          {toast && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] ${toast.dismissing ? 'toast-out' : 'toast-in'}`}>
              {toast.type === 'first' ? (
                /* ── 첫 저장: 강조 토스트 (자동 소멸 없음) ── */
                <div className="bg-white border border-slate-200 rounded-2xl shadow-card px-6 py-4 flex items-center gap-4 min-w-[420px]">
                  <div className="w-10 h-10 rounded-xl bg-emerald-50 border border-emerald-200 flex items-center justify-center shrink-0">
                    <Check size={20} className="text-emerald-600"/>
                  </div>
                  <div className="flex-1">
                    <div className="text-[14px] font-bold text-slate-800">코스가 임시저장되었습니다</div>
                    <div className="text-[12px] text-slate-400 mt-0.5">목록에서 확인하거나 계속 편집할 수 있습니다.</div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={dismissToast} className="px-3.5 py-2 bg-white border border-slate-200 rounded-lg text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                      계속 편집
                    </button>
                    <a href="offline-list.html" className="px-3.5 py-2 bg-indigo-500 text-white rounded-lg text-[13px] font-bold hover:bg-indigo-600 transition-colors">
                      목록으로 이동
                    </a>
                  </div>
                </div>
              ) : toast.type === 'repeat' ? (
                /* ── 재저장: 가벼운 토스트 (3초 자동 소멸) ── */
                <div
                  className="bg-slate-800 text-white rounded-xl shadow-card px-5 py-3 flex items-center gap-3 min-w-[320px]"
                  onMouseEnter={() => { if (toastTimer.current) clearTimeout(toastTimer.current); }}
                  onMouseLeave={() => { toastTimer.current = setTimeout(dismissToast, 2000); }}
                >
                  <Check size={16} className="text-emerald-400 shrink-0"/>
                  <span className="text-[13px] font-bold flex-1">임시저장 완료</span>
                  <span className="text-[12px] text-slate-400 font-medium">
                    {lastSavedAt && lastSavedAt.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' })}
                  </span>
                  <a href="offline-list.html" className="text-[12px] font-bold text-indigo-300 hover:text-indigo-200 transition-colors ml-1">
                    목록으로 이동
                  </a>
                </div>
              ) : toast.type === 'info' ? (
                /* ── 설정 변경 알림 토스트 ── */
                <div
                  className="bg-slate-800 text-white rounded-xl shadow-card px-5 py-3 flex items-center gap-3 max-w-[420px]"
                  onMouseEnter={() => { if (toastTimer.current) clearTimeout(toastTimer.current); }}
                  onMouseLeave={() => { toastTimer.current = setTimeout(dismissToast, 2000); }}
                >
                  <span className="text-[18px] leading-none shrink-0">{toast.icon}</span>
                  <span className="text-[13px] font-medium flex-1 leading-snug">{toast.message}</span>
                  <button onClick={dismissToast} className="text-slate-500 hover:text-white transition-colors ml-1 shrink-0"><X size={14}/></button>
                </div>
              ) : null}
            </div>
          )}

          {/* 시간대 추가 fixed 툴팁 (overflow 짤림 방지) */}
          {timeSlotTip && (
            <div
              style={{ position: 'fixed', right: timeSlotTip.right, top: timeSlotTip.y - 10, transform: 'translateY(-100%)', zIndex: 9999 }}
              className="pointer-events-none bg-slate-800 text-white px-3 py-2 rounded-xl shadow-2xl whitespace-nowrap text-right"
            >
              <div className="text-[12px] font-bold mb-0.5">같은 날짜에 다른 시간대 회차 추가</div>
              <div className="text-[11px] text-slate-300">예: 오전반 09:00~12:00 / 오후반 13:00~17:00</div>
              <div style={{ position: 'absolute', top: '100%', right: 10, width: 0, height: 0, borderLeft: '5px solid transparent', borderRight: '5px solid transparent', borderTop: '5px solid #1e293b' }}/>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
  <script src="feature-highlight.js"></script>
</body>
</html>
